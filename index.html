    var weekStr   = formatDateFull(state.currentWeekStart) + ' - ' + formatDateFull(endDate);
    var todayStr  = new Date().toLocaleDateString('fr-CH');
    var notes     = (document.getElementById('notes') ? document.getElementById('notes').value : '').trim();
    var firstName = (document.getElementById('firstName') ? document.getElementById('firstName').value : '').trim();
    var lastName  = (document.getElementById('lastName')  ? document.getElementById('lastName').value  : '').trim();
    var phone     = (document.getElementById('phone')     ? document.getElementById('phone').value     : '').trim();
    var email     = (document.getElementById('personalEmail') ? document.getElementById('personalEmail').value : '').trim();
    var addr      = (document.getElementById('address')   ? document.getElementById('address').value   : '').trim();
    var city      = (document.getElementById('city')      ? document.getElementById('city').value      : '').trim();
    var postal    = (document.getElementById('postalCode')? document.getElementById('postalCode').value: '').trim();
    var cLegal    = (document.getElementById('companyLegalName') ? document.getElementById('companyLegalName').value : '').trim();
    var cAddr     = (document.getElementById('companyAddress')   ? document.getElementById('companyAddress').value   : '').trim();
    var cPhone    = (document.getElementById('companyPhone')     ? document.getElementById('companyPhone').value     : '').trim();
    var cEmail    = (document.getElementById('companyEmail')     ? document.getElementById('companyEmail').value     : '').trim();
    var fullName  = [firstName, lastName].filter(Boolean).join(' ');
    var cityLine  = [postal, city].filter(Boolean).join(' ');

    var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    var PW = 210, ML = 12, MR = 12, CW = PW - ML - MR, PH = 297;

    // Palette
    var ACC   = [220, 50, 60];
    var DARK  = [28, 28, 38];
    var MID   = [100, 100, 115];
    var LGREY = [245, 246, 250];
    var MGREY = [195, 195, 205];
    var WHITE = [255, 255, 255];
    var SPEC  = [250, 248, 255];
    var HDARK = [38, 38, 52];

    // Helpers
    var fillR  = function(x,y,w,h,c) { doc.setFillColor(c[0],c[1],c[2]); doc.rect(x,y,w,h,'F'); };
    var hL     = function(y,x1,x2,c,lw) { doc.setDrawColor(c[0],c[1],c[2]); doc.setLineWidth(lw||0.18); doc.line(x1,y,x2,y); };
    var vL     = function(x,y1,y2,c,lw) { doc.setDrawColor(c[0],c[1],c[2]); doc.setLineWidth(lw||0.12); doc.line(x,y1,x,y2); };
    var t      = function(s,x,y,o)      { if(s) doc.text(String(s),x,y,o||{}); };
    var trunc  = function(s,mw)         { if(!s) return ''; while(s.length>1 && doc.getTextWidth(s)>mw) s=s.slice(0,-1); return s; };
    var isV    = function(v)            { return v && v !== '--:--'; };

    // Footer
    function drawFooter(pn, tot) {
        fillR(0, PH-8, PW, 8, [235,235,240]);
        hL(PH-8, 0, PW, MGREY, 0.25);
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(MID[0],MID[1],MID[2]);
        t('MesHeures', ML, PH-3);
        t('Page ' + pn + ' / ' + tot, PW/2, PH-3, {align:'center'});
        t('Edite le ' + todayStr, PW-MR, PH-3, {align:'right'});
    }

    // Bandeau entreprise
    fillR(0, 0, PW, 24, DARK);
    doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(255,255,255);
    t(company.toUpperCase(), ML, 13);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(190,192,210);
    t("FEUILLE D'HEURES HEBDOMADAIRE", PW-MR, 9, {align:'right'});
    doc.setTextColor(160,163,185);
    t('Semaine ' + weekStr, PW-MR, 15, {align:'right'});

    var y = 29;

    // Bloc employe + entreprise
    var BH = (cLegal || cAddr || cPhone || cEmail) ? 20 : 11;
    fillR(ML, y, CW, BH, LGREY);
    doc.setDrawColor(MGREY[0],MGREY[1],MGREY[2]); doc.setLineWidth(0.25); doc.rect(ML,y,CW,BH,'S');
    fillR(ML, y, 2.5, BH, ACC);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]);
    t('EMPLOYE', ML+5, y+5.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    var empStr = name + (fullName && fullName !== name ? '  (' + fullName + ')' : '');
    t(empStr, ML+30, y+5.5);
    if (phone || email) { doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]); t([phone,email].filter(Boolean).join('   '), ML+30, y+9.5); }
    if (cLegal || cAddr || cPhone || cEmail) {
        hL(y+11.5, ML+2.5, ML+CW, MGREY, 0.2);
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]);
        t('ENTREPRISE', ML+5, y+16);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        var cLeft = [cLegal, cAddr].filter(Boolean).join(', ');
        t(trunc(cLeft, CW*0.6), ML+30, y+16);
        if (cPhone||cEmail) t(trunc([cPhone,cEmail].filter(Boolean).join('  '), CW*0.35), ML+CW-2, y+16, {align:'right'});
    }
    y += BH + 5;

    // Colonnes tableau
    // JOUR | PERIODE | CLIENT | DESCRIPTION | HORAIRE | H | KM | FRAIS
    var COL = { jour:34, per:20, cli:38, desc:30, hor:24, heu:14, km:11, fr:15 };
    // 34+20+38+30+24+14+11+15 = 186 = CW exact
    var xJ   = ML;
    var xP   = xJ  + COL.jour;
    var xC   = xP  + COL.per;
    var xD   = xC  + COL.cli;
    var xH   = xD  + COL.desc;
    var xHeu = xH  + COL.hor;
    var xKm  = xHeu + COL.heu;
    var xFr  = xKm  + COL.km;
    var xEnd = xFr  + COL.fr;
    var ROW_H = 11, HEAD_H = 9, FOOT_H = 12;
    var pageNum = 1;

    // Jour + date sur UNE SEULE ligne : "Lun. 03/03"
    var JOURS_ABBR = {'Lundi':'Lun.','Mardi':'Mar.','Mercredi':'Mer.','Jeudi':'Jeu.','Vendredi':'Ven.','Samedi':'Sam.','Dimanche':'Dim.'};

    function drawHeader(yh) {
        fillR(ML, yh, CW, HEAD_H, HDARK);
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(255,255,255);
        var hy = yh + 6;
        t('JOUR / DATE', xJ+3, hy);
        t('PERIODE',     xP+2, hy);
        t('CLIENT',      xC+2, hy);
        t('DESCRIPTION', xD+2, hy);
        t('HORAIRE',     xH+2, hy);
        t('H',     xHeu+COL.heu/2, hy, {align:'center'});
        t('KM',    xKm+COL.km/2,   hy, {align:'center'});
        t('FRAIS', xFr+COL.fr/2,   hy, {align:'center'});
        return yh + HEAD_H;
    }
    function newPage() {
        doc.addPage(); pageNum++;
        y = 14; y = drawHeader(y);
    }

    // Construire les lignes
    var rows = [];
    for (var i = 0; i < 7; i++) {
        var date   = new Date(state.currentWeekStart); date.setDate(date.getDate() + i);
        var vhEl3  = document.getElementById('vehicule_' + i);
        var kmTotal = vhEl3 ? Array.from(vhEl3.querySelectorAll('[data-km-amount]'))
            .reduce(function(s,inp){ return s + (parseFloat(inp.value)||0); }, 0) : 0;
        var _rActPdf = document.getElementById('repasActive_' + i);
        var _rAmtPdf = _rActPdf && _rActPdf.checked ? (parseFloat((document.getElementById('repasAmount_'+i)||{value:0}).value)||0) : 0;
        var isFirst = true;

        // Entrées AM + PM
        var _pdfWkBlks = [];
        ['am','pm'].forEach(function(per) { var c = document.getElementById('entries_'+per+'_'+i); if(c) c.querySelectorAll('.entry-block[data-entry-id]').forEach(function(b){_pdfWkBlks.push(b);}); });
        var _wkRaw=0;
        _pdfWkBlks.forEach(function(b2){var s2=(document.getElementById('start_'+i+'_'+b2.dataset.entryId)||{value:''}).value,e2=(document.getElementById('end_'+i+'_'+b2.dataset.entryId)||{value:''}).value;if(isV(s2)&&isV(e2)){var m=timeToMinutes(e2)-timeToMinutes(s2);if(m>0)_wkRaw+=m;}});
        var _wkActive=(document.getElementById('pauseActive_'+i)||{}).checked;
        var _wkPL=_wkActive?Math.min(_getDayPauseMins(i),_wkRaw):0;
        _pdfWkBlks.forEach(function(block) {
                var eid    = block.dataset.entryId;
                var client = (document.getElementById('client_'+i+'_'+eid)||{value:''}).value.trim();
                var start  = (document.getElementById('start_' +i+'_'+eid)||{value:''}).value;
                var end    = (document.getElementById('end_'   +i+'_'+eid)||{value:''}).value;
                var desc   = (document.getElementById('desc_'  +i+'_'+eid)||{value:''}).value.trim();
                var loc    = (document.getElementById('location_'+i+'_'+eid)||{value:''}).value.trim();
                if (!client && !isV(start) && !desc) return;
                var mins = 0;
                if (isV(start) && isV(end)) { mins = timeToMinutes(end) - timeToMinutes(start); if (mins<0) mins+=1440; }
                if (mins>0&&_wkPL>0){mins=Math.max(0,mins-_wkPL);_wkPL=0;}
                var hStr    = mins > 0 ? (Math.floor(mins/60) + 'h' + String(mins%60).padStart(2,'0')) : '';
                var horaire = isV(start) && isV(end) ? (start + ' - ' + end) : '';
                var descFull = [desc, loc].filter(Boolean).join(' | ');
                rows.push({ jourStr: C.DAYS_FR[date.getDay()], dateStr: formatDate(date),
                    period: '', client: client, desc: descFull,
                    horaire: horaire, hStr: hStr, km: isFirst && kmTotal>0 ? kmTotal+' km' : '',
                    frais: '', repas: false, isNew: isFirst, isSpec: false, dayIdx: i });
                isFirst = false;
        });

        // Frais (fournitures + divers)
        ['fournitures'].forEach(function(dtype) {
            var dCt = document.getElementById(dtype + '_' + i);
            if (!dCt) return;
            dCt.querySelectorAll('.depense-item').forEach(function(item) {
                var txts = item.querySelectorAll('input[type="text"]');
                var cv   = (txts[0] ? txts[0].value : '').trim();
                var dv   = (txts[1] ? txts[1].value : '').trim();
                var av   = (item.querySelector('input[type="number"]') ? item.querySelector('input[type="number"]').value : '').trim();
                if (!dv && !av) return;
                rows.push({ jourStr: C.DAYS_FR[date.getDay()], dateStr: formatDate(date),
                    period:'Frais', client: dv, clientFacture: cv, desc:'', horaire:'', hStr:'', km:'',
                    frais: av ? parseFloat(av).toFixed(2)+' CHF' : '', repas:false, isNew:isFirst, isSpec:true, dayIdx:i });
                isFirst = false;
            });
        });

        // Repas
        if (_rActPdf && _rActPdf.checked) {
            var _rClPdf = (document.getElementById('repasClient_'+i)||{value:''}).value.trim();
            rows.push({ jourStr: C.DAYS_FR[date.getDay()], dateStr: formatDate(date),
                period:'Repas', client:_rClPdf, desc:'', horaire:'', hStr:'', km:'',
                frais: _rAmtPdf>0 ? _rAmtPdf.toFixed(2)+' CHF' : 'Oui',
                repas:true, isNew:isFirst, isSpec:true, dayIdx:i });
        }

    }

    // Alternance couleur par jour
    var dayBg = {}; var colorTgl = 0;
    rows.forEach(function(row) {
        if (!(row.dayIdx in dayBg)) { dayBg[row.dayIdx] = colorTgl; colorTgl = 1 - colorTgl; }
    });
    var bgColors = [WHITE, LGREY];

    y = drawHeader(y);

    if (rows.length === 0) {
        fillR(ML, y, CW, ROW_H*2, LGREY);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(MID[0],MID[1],MID[2]);
        t('Aucune donnee pour cette semaine.', ML+CW/2, y+ROW_H, {align:'center'});
        y += ROW_H*2;
    }

    rows.forEach(function(row, idx) {
        var isLast = idx === rows.length - 1;
        if (y + ROW_H + 2 > PH - FOOT_H) newPage();

        var bg = row.isSpec ? SPEC : bgColors[dayBg[row.dayIdx] || 0];
        fillR(ML, y, CW, ROW_H, bg);
        if (row.isNew) fillR(ML, y, 2, ROW_H, ACC);

        // Séparateurs verticaux
        [xP, xC, xD, xH, xHeu, xKm, xFr].forEach(function(xv) { vL(xv, y, y+ROW_H, MGREY, 0.1); });
        hL(y+ROW_H, ML, xEnd, [218,218,228], 0.15);

        var ty = y + ROW_H/2 + 1.5; // centre vertical

        // Jour + date sur UNE SEULE ligne : "Lun. 03/03/26"
        var jourAbbr = JOURS_ABBR[row.jourStr] || row.jourStr;
        var jourLine = jourAbbr + (row.dateStr ? ' ' + row.dateStr : '');
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        t(jourLine, xJ+3, ty);

        // Période
        if (row.isSpec) {
            doc.setFont('helvetica','italic'); doc.setFontSize(7); doc.setTextColor(110,100,140);
        } else {
            doc.setFont('helvetica', row.period==='Matin'?'bold':'normal'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        }
        t(row.period, xP+2, ty);

        // Client
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
        if (row.repas) {
            doc.setFont('helvetica','italic'); doc.setTextColor(MID[0],MID[1],MID[2]);
            t('Repas rembourse', xC+2, ty);
        } else if (row.isSpec && row.clientFacture) {
            doc.setTextColor(DARK[0],DARK[1],DARK[2]);
            t(trunc(row.client, COL.cli * 0.55), xC+2, ty);
            doc.setFontSize(6.5); doc.setTextColor(ACC[0],ACC[1],ACC[2]);
            t(trunc(row.clientFacture, COL.cli * 0.42), xC+2+doc.getTextWidth(trunc(row.client, COL.cli * 0.55))+2, ty);
        } else {
            doc.setTextColor(DARK[0],DARK[1],DARK[2]);
            t(trunc(row.client, COL.cli - 4), xC+2, ty);
        }

        // Description
        if (row.desc) {
            doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]);
            t(trunc(row.desc, COL.desc - 4), xD+2, ty);
        }

        // Horaire
        if (row.horaire) {
            doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
            t(row.horaire, xH+2, ty);
        }

        // Heures
        if (row.hStr) {
            doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(ACC[0],ACC[1],ACC[2]);
            t(row.hStr, xHeu+COL.heu/2, ty, {align:'center'});
        }

        // KM
        if (row.km) {
            doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]);
            t(row.km, xKm+COL.km/2, ty, {align:'center'});
        }

        // Frais / Repas
        var fraisVal = row.frais || (row.repas ? 'Oui' : '');
        if (fraisVal) {
            doc.setFont('helvetica','bold'); doc.setFontSize(7);
            doc.setTextColor(row.repas ? 60 : ACC[0], row.repas ? 130 : ACC[1], row.repas ? 80 : ACC[2]);
            t(fraisVal, xFr+COL.fr-2, ty, {align:'right'});
        }

        y += ROW_H;
    });

    // Ligne de fermeture tableau
    hL(y, ML, xEnd, DARK, 0.35);
    y += 8;

    // Totaux
    if (y + 38 > PH - FOOT_H) newPage();
    var BW = 76, BX = ML + CW - BW;
    fillR(BX, y, BW, 7.5, DARK);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
    t('RECAPITULATIF', BX+BW/2, y+5, {align:'center'});
    y += 7.5;
    var totLines = [
        ['Total heures',    document.getElementById('weekHours')    ? document.getElementById('weekHours').textContent     : '0h00'],
        ['Kilometres',      (document.getElementById('weekKm')      ? document.getElementById('weekKm').textContent        : '0') + ' km'],
        ['Total frais',     (document.getElementById('weekExpenses')? document.getElementById('weekExpenses').textContent  : '0.00') + ' CHF'],
    ];
    var ty0 = y;
    totLines.forEach(function(pair, idx) {
        fillR(BX, y, BW, 6, idx%2===0 ? LGREY : WHITE);
        hL(y+6, BX, BX+BW, MGREY, 0.12);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(MID[0],MID[1],MID[2]);
        t(pair[0], BX+4, y+4.2);
        doc.setFont('helvetica','bold'); doc.setTextColor(ACC[0],ACC[1],ACC[2]);
        t(pair[1], BX+BW-3, y+4.2, {align:'right'});
        y += 6;
    });
    doc.setDrawColor(DARK[0],DARK[1],DARK[2]); doc.setLineWidth(0.3);
    doc.rect(BX, ty0-7.5, BW, totLines.length*6+7.5, 'S');
    y += 8;

    // Notes
    if (notes) {
        var noteLines = doc.splitTextToSize(notes, CW - 10);
        var noteH = noteLines.length * 5 + 12;
        if (y + noteH > PH - FOOT_H) newPage();
        fillR(ML, y, CW, noteH, [248,248,252]);
        doc.setDrawColor(MGREY[0],MGREY[1],MGREY[2]); doc.setLineWidth(0.25); doc.rect(ML,y,CW,noteH,'S');
        fillR(ML, y, 2.5, noteH, [100,110,180]);
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        t('NOTES', ML+6, y+5.5);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        t(noteLines, ML+6, y+11);
    }

    // Pieds de page
    var totalPages = doc.internal.getNumberOfPages();
    for (var p = 1; p <= totalPages; p++) { doc.setPage(p); drawFooter(p, totalPages); }

    var fileName = company.replace(/\s+/g,'_') + '_' + name.replace(/\s+/g,'_') + '_' + formatDateFull(state.currentWeekStart).replace(/\./g,'-') + '.pdf';
    var pdfBlob  = doc.output('blob');
    var pdfFile  = new File([pdfBlob], fileName, { type: 'application/pdf' });
    var btn      = null;
    try { btn = event && event.target ? event.target.closest('.btn-pdf') : null; } catch(e) {}
    var _feedback = function() { if(btn){ var o=btn.textContent; btn.textContent='Ok'; setTimeout(function(){btn.textContent=o;},1500); } };

    if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
        navigator.share({ files:[pdfFile], title:'Rapport '+company, text:'Rapport semaine '+weekStr })
            .then(_feedback)
            .catch(function(err){ if(err.name!=='AbortError'){ doc.save(fileName); _feedback(); } });
    } else {
        doc.save(fileName); _feedback();
    }
}



// ── Export Excel mois ────────────────────────────────────────────
function _exportMonthExcel() {
    if (!window.XLSX) { _ensureXLSX(_exportMonthExcel); return; }
    if (typeof XLSX === 'undefined') { showToast('⚠️ Export Excel indisponible hors-ligne'); return; }
    const month = state.calendarViewMonth.getMonth();
    const year  = state.calendarViewMonth.getFullYear();
    const monthName = C.MONTHS_FR[month];
    const company = (document.getElementById('companyName')?.value || 'Entreprise').trim();
    const name    = (document.getElementById('employeeName')?.value || 'Employe').trim();
    const sHeader = { font:{bold:true,sz:14,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'FD636B'}},alignment:{horizontal:'left',vertical:'center'} };
    const sColHead= { font:{bold:true,sz:9,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'222222'}},alignment:{horizontal:'center',vertical:'center'} };
    const sDayA   = { font:{sz:9},fill:{fgColor:{rgb:'FFFFFF'}},alignment:{vertical:'center'} };
    const sDayB   = { font:{sz:9},fill:{fgColor:{rgb:'F7F7F7'}},alignment:{vertical:'center'} };
    const sTotHead= { font:{bold:true,sz:10,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'222222'}} };
    const sTotLbl = { font:{bold:true,sz:9},fill:{fgColor:{rgb:'F0F0F0'}} };
    const sTotVal = { font:{bold:true,sz:9,color:{rgb:'FD636B'}},fill:{fgColor:{rgb:'F0F0F0'}},alignment:{horizontal:'right'} };
    const sInfo   = { font:{bold:true,sz:9,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'444444'}},alignment:{horizontal:'left'} };
    const sInfoVal= { font:{sz:9,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'444444'}},alignment:{horizontal:'left'} };
    const sSpec   = { font:{sz:9,color:{rgb:'888888'},italic:true},fill:{fgColor:{rgb:'FFF5F5'}},alignment:{vertical:'center'} };

    const weeks = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('week_')) continue;
        try {
            const weekStart = _parseWeekKey(key);
            if (isNaN(weekStart.getTime())) continue;
            const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
            const inMonth = d => d.getMonth() === month && d.getFullYear() === year;
            if (!inMonth(weekStart) && !inMonth(weekEnd)) continue;
            const data = JSON.parse(localStorage.getItem(key));
            if (data && data.days) weeks.push({ weekStart, days: data.days });
        } catch(e) {}
    }
    weeks.sort((a,b) => a.weekStart - b.weekStart);
    if (weeks.length === 0) { showToast('Aucune donnee pour ' + monthName + ' ' + year); return; }

    const wb = XLSX.utils.book_new();
    const COLS = 11;
    const isValid = t => t && t !== '--:--';
    let grandMins = 0, grandKm = 0, grandMeals = 0, grandFrais = 0;

    weeks.forEach(function(wk) {
        const weekStart = wk.weekStart;
        const days = wk.days;
        const ws = {};
        let r = 0;
        const endDate = new Date(weekStart); endDate.setDate(endDate.getDate() + 6);
        const setCell = function(row,col,value,style) {
            const addr = XLSX.utils.encode_cell({r:row,c:col});
            ws[addr] = {v:value, t:typeof value==='number'?'n':'s', s:style};
        };
        const merge = function(r1,c1,r2,c2) {
            if (!ws['!merges']) ws['!merges']=[];
            ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});
        };
        setCell(r,0,company,sHeader); merge(r,0,r,COLS-1); r++;
        setCell(r,0,'Employe',sInfo); setCell(r,1,name,sInfoVal); merge(r,1,r,5);
        setCell(r,6,'Semaine',sInfo);
        setCell(r,7,formatDateFull(weekStart)+' - '+formatDateFull(endDate),sInfoVal);
        merge(r,7,r,COLS-1); r+=2;
        ['Jour','Date','Periode','Client','Debut','Fin','Heures','Description','Lieu','Repas','Frais'].forEach(function(h,c){ setCell(r,c,h,sColHead); });
        r++;
        let wMins=0,wKm=0,wMeals=0,wFrais=0;
        let colorTgl=0;
        for (let di=0; di<7; di++) {
            const date = new Date(weekStart); date.setDate(date.getDate()+di);
            if (date.getMonth()!==month) continue;
            const dayData = days[di]||{};
            const jourStr = C.DAYS_FR[date.getDay()];
            const dateStr = formatDate(date);
            const dep3 = dayData.depenses || {};
            const kmTotal = ((dep3.vehicule||dayData.km)||[]).reduce(function(s,k){return s+(parseFloat(k.amount)||0);},0);
            const sA = colorTgl?sDayB:sDayA;
            colorTgl=1-colorTgl;
            let isFirst=true; wKm+=kmTotal;
            var _xmE=_normalizeDayEntries(dayData).filter(function(e){return (e.client||'').trim()||isValid(e.start);});
            var _xmRaw=_xmE.reduce(function(s,e){if(isValid(e.start)&&isValid(e.end)){var m=timeToMinutes(e.end)-timeToMinutes(e.start);return s+(m>0?m:0);}return s;},0);
            var _xmPL=dayData.pauseActive?Math.min(dayData.pauseMins||0,_xmRaw):0;
            _xmE.forEach(function(entry, ei) {
                    var client=(entry.client||'').trim();
                    var start=entry.start||''; var end=entry.end||'';
                    if(!client&&!isValid(start)) return;
                    var mins=0;
                    if(isValid(start)&&isValid(end)){mins=timeToMinutes(end)-timeToMinutes(start);if(mins<0)mins+=1440;}
                    if(mins>0&&_xmPL>0){mins=Math.max(0,mins-_xmPL);_xmPL=0;}
                    wMins+=mins; grandMins+=mins;
                    var hStr=mins>0?(Math.floor(mins/60)+'h'+String(mins%60).padStart(2,'0')):'';
                    setCell(r,0,isFirst?jourStr:'',sA);
                    setCell(r,1,isFirst?dateStr:'',sA);
                    setCell(r,2,'',sA); // période libre
                    setCell(r,3,client,sA); setCell(r,4,isValid(start)?start:'',sA);
                    setCell(r,5,isValid(end)?end:'',sA); setCell(r,6,hStr,sA);
                    setCell(r,7,(entry.desc||'').trim(),sA);
                    setCell(r,8,(entry.location||'').trim(),sA);
                    setCell(r,9,'',sA);
                    setCell(r,10,isFirst&&kmTotal>0?(kmTotal+' km'):'',sA);
                    r++; isFirst=false;
                });
            if(dayData.meal){wMeals++;grandMeals++;
                setCell(r,0,isFirst?jourStr:'',sSpec);setCell(r,1,isFirst?dateStr:'',sSpec);
                setCell(r,2,'Repas',sSpec);for(var c=3;c<COLS;c++)setCell(r,c,'',sSpec);
                setCell(r,9,'Oui',sSpec);r++;isFirst=false;}
            if(dayData.repasActive){wMeals++;grandMeals++;
                var _rAmtM3=dayData.repasAmount||0;
                setCell(r,0,isFirst?jourStr:'',sSpec);setCell(r,1,isFirst?dateStr:'',sSpec);
                setCell(r,2,'Repas',sSpec);
                setCell(r,3,(dayData.repasClient||''),sSpec);
                for(var c=4;c<10;c++)setCell(r,c,'',sSpec);
                setCell(r,10,_rAmtM3>0?_rAmtM3.toFixed(2)+' CHF':'Oui',sSpec);r++;isFirst=false;}
            var _allExpenses3 = (dep3.fournitures||[]).concat(dayData.expenses||[]);
            _allExpenses3.forEach(function(exp){
                if(!exp.desc&&!exp.amount)return;
                const fv=parseFloat(exp.amount)||0;wFrais+=fv;grandFrais+=fv;
                const descFrais = exp.client ? (exp.desc||'')+'  ['+exp.client+']' : (exp.desc||'');
                setCell(r,0,isFirst?jourStr:'',sSpec);setCell(r,1,isFirst?dateStr:'',sSpec);
                setCell(r,2,'Frais',sSpec);setCell(r,3,descFrais,sSpec);
                for(var c=4;c<10;c++)setCell(r,c,'',sSpec);
                setCell(r,10,fv>0?fv.toFixed(2)+' CHF':'',sSpec);r++;isFirst=false;
            });
        }
        r++;
        setCell(r,0,'TOTAL',sTotHead);for(let c=1;c<COLS;c++)setCell(r,c,'',sTotHead);r++;
        setCell(r,0,'Heures',sTotLbl);
        setCell(r,1,Math.floor(wMins/60)+'h'+String(wMins%60).padStart(2,'0'),sTotVal);
        if(wKm>0){setCell(r,2,'KM',sTotLbl);setCell(r,3,wKm+' km',sTotVal);}
        if(wMeals>0){setCell(r,4,'Repas',sTotLbl);setCell(r,5,String(wMeals),sTotVal);}
        if(wFrais>0){setCell(r,6,'Frais',sTotLbl);setCell(r,7,wFrais.toFixed(2)+' CHF',sTotVal);}
        ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r,c:COLS-1}});
        ws['!cols']=[{wch:12},{wch:11},{wch:14},{wch:22},{wch:7},{wch:7},{wch:8},{wch:28},{wch:18},{wch:6},{wch:12}];
        XLSX.utils.book_append_sheet(wb,ws,'Sem.'+formatDateFull(weekStart).slice(0,5));
    });

    const fileName = company.replace(/\s+/g,'_')+'_'+name.replace(/\s+/g,'_')+'_'+monthName+'_'+year+'.xlsx';
    const wbBlob = new Blob([XLSX.write(wb,{bookType:'xlsx',type:'array'})],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const xlsxFile = new File([wbBlob],fileName,{type:wbBlob.type});
    if(navigator.canShare&&navigator.canShare({files:[xlsxFile]})){
        navigator.share({files:[xlsxFile],title:'Rapport '+monthName+' '+year+' - '+company})
            .catch(function(err){if(err.name!=='AbortError')XLSX.writeFile(wb,fileName);});
    } else { XLSX.writeFile(wb,fileName); }
    showToast('Export ' + monthName + ' ' + year);
}

// ── Export PDF mois ── v3 complet ────────────────────────────────
function _exportMonthPDF() {
    if (!window.jspdf) { _ensurePDF(_exportMonthPDF); return; }
    const { jsPDF } = window.jspdf;
    const month     = state.calendarViewMonth.getMonth();
    const year      = state.calendarViewMonth.getFullYear();
    const monthName = C.MONTHS_FR[month];
    const name      = (document.getElementById('employeeName')?.value || 'Employe').trim();
    const firstName = (document.getElementById('firstName')?.value  || '').trim();
    const lastName  = (document.getElementById('lastName')?.value   || '').trim();
    const fullName  = (firstName || lastName) ? (firstName+' '+lastName).trim() : name;
    const company   = (document.getElementById('companyName')?.value || 'Entreprise').trim();
    const todayStr  = new Date().toLocaleDateString('fr-CH');

    // ── Collecter tous les jours du mois ────────────────────────────
    const allDays = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('week_')) continue;
        try {
            const weekDate = _parseWeekKey(key);
            if (isNaN(weekDate.getTime())) continue;
            const data = JSON.parse(localStorage.getItem(key));
            if (!data || !data.days) continue;
            for (let d = 0; d < 7; d++) {
                const date = new Date(weekDate); date.setDate(date.getDate() + d);
                if (date.getMonth() === month && date.getFullYear() === year)
                    allDays.push({ date, dayData: data.days[d] || {} });
            }
        } catch(e) {}
    }
    allDays.sort((a, b) => a.date - b.date);
    if (allDays.length === 0) { showToast('Aucune donnee pour ' + monthName + ' ' + year); return; }

    const isValid = t => t && t !== '--:--' && t !== '';
    const fmtDate = d => {
        const jours = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
        return jours[d.getDay()]+'. '+String(d.getDate()).padStart(2,'0')+'.'
              +String(d.getMonth()+1).padStart(2,'0');
    };
    const fmtHoraire = (s, e) => (isValid(s) && isValid(e)) ? s + ' \u2013 ' + e : '';
    const fmtDur = mins => mins > 0 ? Math.floor(mins/60)+'h'+String(mins%60).padStart(2,'0') : '';
    const minsOf = (s, e) => {
        if (!isValid(s) || !isValid(e)) return 0;
        const m = timeToMinutes(e) - timeToMinutes(s);
        return m < 0 ? m + 1440 : m;
    };

    // ── Construire les groupes (un groupe = un jour) ─────────────────
    // Chaque groupe contient des rows de type 'work' ou 'frais'
    const groups = [];
    let totalMins = 0, totalFrais = 0;

    allDays.forEach(function(item) {
        const date    = item.date;
        const dayData = item.dayData;
        const dep     = dayData.depenses || {};
        const rows    = [];

        // Entrees de travail
        { const _pmE=_normalizeDayEntries(dayData).filter(e=>(e.client||'').trim()||isValid(e.start));
        const _pmRaw=_pmE.reduce((s,e)=>s+minsOf(e.start,e.end),0);
        let _pmPL = dayData.pauseActive ? Math.min(dayData.pauseMins||0, _pmRaw) : 0;
        _pmE.forEach(function(entry) {
            const client = (entry.client || '').trim();
            const desc   = (entry.desc   || '').trim();
            let mins = minsOf(entry.start, entry.end);
            if(mins>0&&_pmPL>0){mins=Math.max(0,mins-_pmPL);_pmPL=0;}
            totalMins += mins;
            rows.push({ type: 'work', client: client || '\u2014', desc: desc,
                horaire: fmtHoraire(entry.start, entry.end),
                hStr: fmtDur(mins), fraisStr: '' });
        }); }

        // Frais vehicule (km)
        ((dep.vehicule || dayData.km) || []).forEach(function(k) {
            const amt = parseFloat(k.amount) || 0;
            if (!amt && !(k.desc || k.client)) return;
            const fStr = amt > 0 ? amt.toFixed(0)+' km' : '';
            totalFrais += 0; // km pas en CHF dans ce contexte
            rows.push({ type: 'frais', client: k.client || '', desc: k.desc || 'Deplacement vehicule',
                horaire: '', hStr: '', fraisStr: fStr });
        });

        // Fournitures
        (dep.fournitures || []).forEach(function(exp) {
            if (!exp.desc && !exp.amount) return;
            const amt = parseFloat(exp.amount) || 0;
            totalFrais += amt;
            rows.push({ type: 'frais', client: exp.client || '', desc: exp.desc || 'Fournitures',
                horaire: '', hStr: '', fraisStr: amt > 0 ? amt.toFixed(2)+' CHF' : '' });
        });

        // Legacy expenses
        (dayData.expenses || []).forEach(function(exp) {
            if (!exp.desc && !exp.amount) return;
            const amt = parseFloat(exp.amount) || 0;
            totalFrais += amt;
            rows.push({ type: 'frais', client: exp.client || '', desc: exp.desc || 'Frais',
                horaire: '', hStr: '', fraisStr: amt > 0 ? amt.toFixed(2)+' CHF' : '' });
        });

        // Repas
        if (dayData.repasActive) {
            const rAmt = dayData.repasAmount || 0;
            if (rAmt > 0) totalFrais += rAmt;
            rows.push({ type: 'frais', client: dayData.repasClient || '', desc: 'Repas',
                horaire: '', hStr: '', fraisStr: rAmt > 0 ? rAmt.toFixed(2)+' CHF' : 'Oui' });
        } else if (dayData.meal) {
            // Migration legacy
            rows.push({ type: 'frais', client: '', desc: 'Repas',
                horaire: '', hStr: '', fraisStr: '' });
        }

        if (rows.length > 0) groups.push({ dateLabel: fmtDate(date), rows });
    });

    if (groups.length === 0) { showToast('Aucune donnee pour ' + monthName + ' ' + year); return; }

    const totalHStr = Math.floor(totalMins/60)+'h'+String(totalMins%60).padStart(2,'0');

    // ── jsPDF setup ─────────────────────────────────────────────────
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const PW=210, PH=297, ML=12, MR=12, CW=PW-ML-MR;

    // Palette
    const INK     = [22, 24, 32];
    const MID     = [95, 98,112];
    const LIGHT   = [155,158,170];
    const WHITE   = [255,255,255];
    const ACCENT  = [40, 55,130];   // bleu marine
    const ROW_A   = [255,255,255];
    const ROW_B   = [248,249,252];
    const ROW_F   = [243,244,250];  // frais
    const BORDER  = [210,212,222];
    const HDR_BG  = [22, 24, 38];
    const THEAD   = [38, 42, 62];
    const TOTAL_BG= [238,241,255];

    const fill  = (x,y,w,h,rgb)       => { doc.setFillColor(...rgb); doc.rect(x,y,w,h,'F'); };
    const box   = (x,y,w,h,rgb,lw)    => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.2); doc.rect(x,y,w,h,'S'); };
    const hline = (y,x1,x2,rgb,lw)    => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.12); doc.line(x1,y,x2,y); };
    const vline = (x,y1,y2,rgb,lw)    => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.12); doc.line(x,y1,x,y2); };
    const t     = (str,x,y,opts)      => { if(str!=null&&str!=='') doc.text(String(str),x,y,opts||{}); };
    const trunc = (str,maxW) => {
        if (!str) return '';
        let s = String(str);
        while (s.length > 1 && doc.getTextWidth(s) > maxW) s = s.slice(0,-1);
        return s.length < String(str).length ? s+'\u2026' : s;
    };

    // Colonnes (mm) : Date | Client | Description | Horaire | Heures | Frais
    const W_DATE = 22;
    const W_HOR  = 26;
    const W_HEU  = 14;
    const W_FR   = 22;
    const W_CLI  = 28;
    const W_DESC = CW - W_DATE - W_CLI - W_HOR - W_HEU - W_FR; // ~50mm
    const xDate = ML;
    const xCli  = xDate + W_DATE;
    const xDesc = xCli  + W_CLI;
    const xHor  = xDesc + W_DESC;
    const xHeu  = xHor  + W_HOR;
    const xFr   = xHeu  + W_HEU;
    const xEnd  = xFr   + W_FR;

    const ROW_H   = 7;
    const HEAD_H  = 8;
    const FOOT_H  = 8;
    const HDR_H   = 28;
    const MARGIN_BOTTOM = FOOT_H + 38; // 38 = bloc totaux + signatures

    // ── En-tete ──────────────────────────────────────────────────────
    fill(0, 0, PW, HDR_H, HDR_BG);
    fill(0, HDR_H-1.5, PW, 1.5, ACCENT);

    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...WHITE);
    t(company.toUpperCase(), ML, 11);

    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(170,175,200);
    t("FEUILLE D'HEURES MENSUELLE", ML, 18);

    // Info droite
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(190,194,215);
    t(fullName, ML+CW, 11, {align:'right'});
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...WHITE);
    t(monthName.toUpperCase()+' '+year, ML+CW, 21, {align:'right'});

    let y = HDR_H + 6;
    let pageNum = 1;

    function drawTableHeader(yh) {
        fill(ML, yh, CW, HEAD_H, THEAD);
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(...WHITE);
        const hy = yh + 5.2;
        t('DATE',        xDate+2, hy);
        t('CLIENT',      xCli+2,  hy);
        t('DESCRIPTION', xDesc+2, hy);
        t('HORAIRE',     xHor+2,  hy);
        t('HEURES',      xHeu+W_HEU/2, hy, {align:'center'});
        t('FRAIS',       xFr+W_FR/2,   hy, {align:'center'});
        return yh + HEAD_H;
    }

    function drawFooter(pn, tot) {
        const fy = PH - FOOT_H;
        fill(0, fy, PW, FOOT_H, [244,245,250]);
        hline(fy, 0, PW, BORDER, 0.2);
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...LIGHT);
        t('MesHeures', ML, fy+5);
        t('Page '+pn+' / '+tot, PW/2, fy+5, {align:'center'});
        t('Genere le '+todayStr, ML+CW, fy+5, {align:'right'});
    }

    function newPage() {
        doc.addPage(); pageNum++;
        y = 14;
        y = drawTableHeader(y);
    }

    y = drawTableHeader(y);

    // ── Rendu des groupes ─────────────────────────────────────────────
    let altColor = 0;
    groups.forEach(function(group) {
        // Eviter coupure de groupe < 3 lignes en bas de page
        if (group.rows.length <= 3 && y + group.rows.length * ROW_H > PH - MARGIN_BOTTOM) newPage();

        const bg0 = altColor === 0 ? ROW_A : ROW_B;
        altColor  = 1 - altColor;

        group.rows.forEach(function(row, ri) {
            if (y + ROW_H > PH - MARGIN_BOTTOM) newPage();

            const bg = row.type === 'frais' ? ROW_F : bg0;
            fill(ML, y, CW, ROW_H, bg);
            hline(y + ROW_H, ML, xEnd, BORDER, 0.1);

            // Barre gauche accent sur 1ere ligne du groupe
            if (ri === 0) fill(ML, y, 2.2, ROW_H, ACCENT);

            const ty = y + ROW_H - 2.2;

            // DATE (1ere ligne seulement)
            if (ri === 0) {
                doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
                t(group.dateLabel, xDate+3.5, ty);
            }

            // Separateurs verticaux
            vline(xCli,  y, y+ROW_H, BORDER, 0.12);
            vline(xDesc, y, y+ROW_H, BORDER, 0.12);
            vline(xHor,  y, y+ROW_H, BORDER, 0.12);
            vline(xHeu,  y, y+ROW_H, BORDER, 0.12);
            vline(xFr,   y, y+ROW_H, BORDER, 0.12);

            if (row.type === 'frais') {
                // Badge "Frais" discret
                doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(...ACCENT);
                t('FRAIS', xCli+2, ty-1.5);
                doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...MID);
                t(trunc(row.client, W_CLI-4), xCli+2, ty+1);
                doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...MID);
                t(trunc(row.desc, W_DESC-4), xDesc+2, ty);
                if (row.fraisStr) {
                    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
                    t(row.fraisStr, xFr+W_FR-2, ty, {align:'right'});
                }
            } else {
                // Ligne de travail
                doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...INK);
                t(trunc(row.client, W_CLI-4), xCli+2, ty);
                doc.setFont('helvetica','normal'); doc.setFontSize(6.8); doc.setTextColor(...MID);
                t(trunc(row.desc, W_DESC-4), xDesc+2, ty);
                doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...MID);
                t(row.horaire, xHor+2, ty);
                if (row.hStr) {
                    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
                    t(row.hStr, xHeu+W_HEU/2, ty, {align:'center'});
                }
            }

            y += ROW_H;
        });
    });

    // ── Bloc Totaux + Signatures ─────────────────────────────────────
    // Forcer sur meme page si assez de place, sinon nouvelle page
    if (y + 38 > PH - FOOT_H - 4) newPage();
    y += 5;

    // Totaux
    const TOT_H = 14;
    fill(ML, y, CW, TOT_H, TOTAL_BG);
    box(ML, y, CW, TOT_H, ACCENT, 0.4);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...ACCENT);
    t('RECAPITULATIF '+monthName.toUpperCase()+' '+year, ML+5, y+6);

    // Total heures
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MID);
    t('Total heures :', ML+5, y+11.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
    t(totalHStr, ML+5+doc.getTextWidth('Total heures :')+3, y+11.5);

    // Total frais
    if (totalFrais > 0) {
        const fLabel = 'Total frais :';
        const fVal   = totalFrais.toFixed(2)+' CHF';
        const fLabelX = ML + 80;
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MID);
        t(fLabel, fLabelX, y+11.5);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
        t(fVal, fLabelX+doc.getTextWidth(fLabel)+3, y+11.5);
    }

    // Date edition
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...LIGHT);
    t('Edite le '+todayStr, ML+CW, y+11.5, {align:'right'});

    y += TOT_H + 8;

    // Signatures
    const SIG_W = (CW - 10) / 2;
    const SIG_H = 14;

    // Employe
    fill(ML, y, SIG_W, SIG_H, [250,250,253]);
    box(ML, y, SIG_W, SIG_H, BORDER, 0.3);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...LIGHT);
    t('Signature employe', ML+3, y+4.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...MID);
    t(fullName, ML+3, y+10);

    // Direction
    const sigX2 = ML + SIG_W + 10;
    fill(sigX2, y, SIG_W, SIG_H, [250,250,253]);
    box(sigX2, y, SIG_W, SIG_H, BORDER, 0.3);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...LIGHT);
    t('Validation direction', sigX2+3, y+4.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...MID);
    t(company, sigX2+3, y+10);

    // ── Footers ──────────────────────────────────────────────────────
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) { doc.setPage(p); drawFooter(p, totalPages); }

    // ── Export / partage ─────────────────────────────────────────────
    const fileName = company.replace(/\s+/g,'_')+'_'+fullName.replace(/\s+/g,'_')+'_'+monthName+'_'+year+'.pdf';
    const pdfBlob  = doc.output('blob');
    const pdfFile  = new File([pdfBlob], fileName, {type:'application/pdf'});
    if (navigator.canShare && navigator.canShare({files:[pdfFile]})) {
        navigator.share({files:[pdfFile], title:'Rapport '+monthName+' '+year+' - '+company})

function _aggregateClients() {
    var month = state.calendarViewMonth.getMonth();
    var year  = state.calendarViewMonth.getFullYear();
    var clients = {};
    for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (!key || !key.startsWith('week_')) continue;
        try {
            var pts = key.replace('week_','').split('-');
            var ws  = new Date(+pts[0], +pts[1]-1, +pts[2]);
            if (isNaN(ws)) continue;
            var we  = new Date(ws); we.setDate(ws.getDate()+6);
            var inM = function(d){ return d.getMonth()===month && d.getFullYear()===year; };
            if (!inM(ws) && !inM(we)) continue;
            var data = JSON.parse(localStorage.getItem(key));
            if (!data || !data.days) continue;
            data.days.forEach(function(day, di) {
                var dd = new Date(ws); dd.setDate(ws.getDate()+di);
                if (dd.getMonth()!==month || dd.getFullYear()!==year) return;
                // Heures (v1 + v2 via _normalizeDayEntries)
                function addClientRow(name, start, end, desc, loc) {
                    if (!name || !name.trim() || !start || !end || start==='--:--' || end==='--:--') return;
                    var min = timeToMinutes(end) - timeToMinutes(start);
                    if (min <= 0) return;
                    var n = name.trim();
                    if (!clients[n]) clients[n] = { minutes:0, rows:[], expenses:[] };
                    clients[n].minutes += min;
                    clients[n].rows.push({ date:new Date(dd), start:start, end:end, desc:desc||'', loc:loc||'', min:min });
                }
                _normalizeDayEntries(day).forEach(function(entry) {
                    addClientRow(entry.client, entry.start, entry.end, entry.desc, entry.location);
                });
                // Frais liés à un client
                (day.expenses||[]).forEach(function(exp) {
                    if (!exp.client || !exp.client.trim()) return;
                    var n = exp.client.trim();
                    if (!clients[n]) clients[n] = { minutes:0, rows:[], expenses:[] };
                    clients[n].expenses.push({ date:new Date(dd), desc:exp.desc||'', amount:parseFloat(exp.amount)||0 });
                });
            });
        } catch(e){}
    }
    var names = Object.keys(clients).sort(function(a,b){ return clients[b].minutes-clients[a].minutes; });
    return { clients:clients, names:names, month:month, year:year };
}

function _exportClientExcel(filterName) {
    if (!window.XLSX) { _ensureXLSX(function(){ _exportClientExcel(filterName); }); return; }
    if (!window.XLSX)  { _ensureXLSX(function(){ _exportClientExcel(filterName); }); return; }
    if (typeof XLSX === 'undefined') { showToast('Export Excel indisponible hors-ligne'); return; }
    var agg = _aggregateClients();
    if (filterName) { agg.names = agg.names.filter(function(n){ return n === filterName; }); }
    if (!agg.names.length) { showToast('Aucune donnee client pour ' + C.MONTHS_FR[agg.month] + ' ' + agg.year); return; }
    var company   = (document.getElementById('companyName')  ? document.getElementById('companyName').value  : 'Entreprise').trim() || 'Entreprise';
    var empName   = (document.getElementById('employeeName') ? document.getElementById('employeeName').value : 'Employe').trim()    || 'Employe';
    var monthName = C.MONTHS_FR[agg.month];
    var DAYS_S    = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    var MONTHS_S  = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
    var sHdr  = { font:{bold:true,sz:13,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'DC3240'}}, alignment:{horizontal:'left'} };
    var sInfo = { font:{bold:true,sz:8,color:{rgb:'FFFFFF'}},  fill:{fgColor:{rgb:'282838'}}, alignment:{horizontal:'left'} };
    var sIVal = { font:{sz:8,color:{rgb:'FFFFFF'}},            fill:{fgColor:{rgb:'282838'}}, alignment:{horizontal:'left'} };
    var sCH   = { font:{bold:true,sz:9,color:{rgb:'FFFFFF'}},  fill:{fgColor:{rgb:'1C1C2E'}}, alignment:{horizontal:'center'} };
    var sCli  = { font:{bold:true,sz:10,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'DC3240'}}, alignment:{horizontal:'left'} };
    var sRowA = { font:{sz:9}, fill:{fgColor:{rgb:'FFFFFF'}} };
    var sRowB = { font:{sz:9}, fill:{fgColor:{rgb:'F7F7F7'}} };
    var sExp  = { font:{sz:9,italic:true,color:{rgb:'884444'}}, fill:{fgColor:{rgb:'FFF5F5'}} };
    var sTot  = { font:{bold:true,sz:9,color:{rgb:'DC3240'}}, fill:{fgColor:{rgb:'F0F0F0'}}, alignment:{horizontal:'right'} };
    var sTotL = { font:{bold:true,sz:9}, fill:{fgColor:{rgb:'F0F0F0'}} };
    var wb = XLSX.utils.book_new(); var ws = {}; var COLS = 7; var r = 0;
    var setCell = function(row,col,val,sty){ var a=XLSX.utils.encode_cell({r:row,c:col}); ws[a]={v:val,t:typeof val==='number'?'n':'s',s:sty}; };
    var merge   = function(r1,c1,r2,c2){ if(!ws['!merges'])ws['!merges']=[]; ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}}); };
    setCell(r,0,company,sHdr); merge(r,0,r,COLS-1); r++;
    setCell(r,0,'Employe',sInfo); setCell(r,1,empName,sIVal); merge(r,1,r,2);
    setCell(r,3,'Periode',sInfo); setCell(r,4,monthName+' '+agg.year,sIVal); merge(r,4,r,COLS-1); r+=2;
    ['Date','Debut','Fin','Heures','Description','Lieu','Frais CHF'].forEach(function(h,c){ setCell(r,c,h,sCH); }); r++;
    var grandMins = 0, grandFrais = 0;
    agg.names.forEach(function(name) {
        var c = agg.clients[name];
        setCell(r,0,name,sCli); merge(r,0,r,COLS-1); r++;
        var tgl=0;
        c.rows.forEach(function(row) {
            var sRow=tgl?sRowB:sRowA; tgl=1-tgl;
            var dStr = DAYS_S[row.date.getDay()]+' '+String(row.date.getDate()).padStart(2,'0')+' '+MONTHS_S[row.date.getMonth()];
            var hStr = Math.floor(row.min/60)+'h'+String(row.min%60).padStart(2,'0');
            setCell(r,0,dStr,sRow); setCell(r,1,row.start,sRow); setCell(r,2,row.end,sRow);
            setCell(r,3,hStr,sRow); setCell(r,4,row.desc,sRow);  setCell(r,5,row.loc,sRow); setCell(r,6,'',sRow); r++;
        });
        c.expenses.forEach(function(exp) {
            var dStr = DAYS_S[exp.date.getDay()]+' '+String(exp.date.getDate()).padStart(2,'0')+' '+MONTHS_S[exp.date.getMonth()];
            setCell(r,0,dStr,sExp); setCell(r,1,'Frais',sExp); setCell(r,2,'',sExp);
            setCell(r,3,'',sExp); setCell(r,4,exp.desc,sExp); setCell(r,5,'',sExp);
            setCell(r,6,exp.amount>0?exp.amount.toFixed(2):'' ,sExp); r++;
            grandFrais += exp.amount;
        });
        var tStr=Math.floor(c.minutes/60)+'h'+String(c.minutes%60).padStart(2,'0');
        var cFrais=c.expenses.reduce(function(s,e){return s+e.amount;},0);
        setCell(r,0,'Total '+name,sTotL); merge(r,0,r,2); setCell(r,3,tStr,sTot);
        if(cFrais>0){setCell(r,6,cFrais.toFixed(2),sTot);}
        grandMins += c.minutes; r+=2;
    });
    var gStr=Math.floor(grandMins/60)+'h'+String(grandMins%60).padStart(2,'0');
    setCell(r,0,'TOTAL GENERAL',sTotL); merge(r,0,r,2); setCell(r,3,gStr,sTot);
    if(grandFrais>0) setCell(r,6,grandFrais.toFixed(2),sTot);
    ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r,c:COLS-1}});
    ws['!cols'] = [{wch:16},{wch:7},{wch:7},{wch:9},{wch:32},{wch:20},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, 'Clients '+monthName);
    var fileName = company.replace(/\s+/g,'_')+'_Clients_'+monthName+'_'+agg.year+'.xlsx';
    var wbBlob   = new Blob([XLSX.write(wb,{bookType:'xlsx',type:'array'})],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var xlsxFile = new File([wbBlob],fileName,{type:wbBlob.type});
    if (navigator.canShare && navigator.canShare({files:[xlsxFile]})) {
        navigator.share({files:[xlsxFile],title:'Clients '+monthName+' '+agg.year}).catch(function(err){ if(err.name!=='AbortError') XLSX.writeFile(wb,fileName); });
    } else { XLSX.writeFile(wb,fileName); }
    showToast('Export clients '+monthName+' '+agg.year);
}

function _exportClientPDF(filterName) {
    if (!window.jspdf) { _ensurePDF(function(){ _exportClientPDF(filterName); }); return; }
    if (!window.jspdf) { showToast('Librairie PDF non chargee'); return; }
    var agg = _aggregateClients();
    if (filterName) { agg.names = agg.names.filter(function(n){ return n === filterName; }); }
    if (!agg.names.length) { showToast('Aucune donnee client pour ' + C.MONTHS_FR[agg.month] + ' ' + agg.year); return; }
    var jsPDF     = window.jspdf.jsPDF;
    var company   = (document.getElementById('companyName')  ? document.getElementById('companyName').value  : 'Entreprise').trim() || 'Entreprise';
    var empName   = (document.getElementById('employeeName') ? document.getElementById('employeeName').value : 'Employe').trim()    || 'Employe';
    var monthName = C.MONTHS_FR[agg.month];
    var todayStr  = new Date().toLocaleDateString('fr-CH');
    var DAYS_S    = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    var MONTHS_S  = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
    var doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var PW=210, PH=297, ML=14, MR=14, CW=PW-ML-MR;
    var ACC=[220,50,60], DARK=[28,28,46], MID=[110,110,120], LGREY=[245,245,250], MGREY=[200,200,205], WHITE=[255,255,255], PINK=[255,245,245];
    var fillR = function(x,y,w,h,c){ doc.setFillColor(c[0],c[1],c[2]); doc.rect(x,y,w,h,'F'); };
    var hL    = function(yy,c,lw){ doc.setDrawColor(c[0],c[1],c[2]); doc.setLineWidth(lw||0.15); doc.line(ML,yy,ML+CW,yy); };
    var txt   = function(s,x,yy,o){ if(s) doc.text(String(s),x,yy,o||{}); };
    var trunc = function(s,mw){ if(!s)return''; while(s.length>1&&doc.getTextWidth(s)>mw)s=s.slice(0,-1); return s; };
    var y = ML;
    fillR(0,0,PW,22,ACC);
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(255,255,255);
    txt(company, ML, 10);
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    txt('Rapport clients — '+monthName+' '+agg.year, ML, 17);
    txt(empName+'   |   '+todayStr, PW-MR, 17, {align:'right'});
    y = 28;
    var grandMins = 0, grandFrais = 0;
    var ROW=6.5, pageNum=1;
    function checkPage(need){ if(y+need>PH-12){ doc.addPage(); pageNum++; y=ML; } }
    agg.names.forEach(function(name) {
        var c = agg.clients[name];
        checkPage(18);
        var totStr = Math.floor(c.minutes/60)+'h'+String(c.minutes%60).padStart(2,'0');
        var cFrais = c.expenses.reduce(function(s,e){return s+e.amount;},0);
        fillR(ML, y, CW, 8, DARK);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
        txt(name, ML+3, y+5.5);
        txt(totStr+(cFrais>0?' + '+cFrais.toFixed(2)+' CHF frais':''), PW-MR-3, y+5.5, {align:'right'});
        y += 9;
        // En-tête colonnes
        fillR(ML, y, CW, 6, LGREY);
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(MID[0],MID[1],MID[2]);
        var xD=ML+3, xHor=ML+36, xH=ML+70, xDesc=ML+82, xLoc=PW-MR-30, xFr=PW-MR-10;
        txt('Date',        xD,   y+4.2);
        txt('Debut-Fin',   xHor, y+4.2);
        txt('Heures',      xH,   y+4.2);
        txt('Description', xDesc,y+4.2);
        txt('Lieu',        xLoc, y+4.2);
        txt('CHF',         xFr,  y+4.2, {align:'right'});
        y += 7;
        c.rows.forEach(function(row, ri) {
            checkPage(ROW+1);
            if (ri%2===0) fillR(ML,y,CW,ROW,WHITE); else fillR(ML,y,CW,ROW,LGREY);
            hL(y+ROW, MGREY, 0.12);
            var dStr = DAYS_S[row.date.getDay()]+' '+String(row.date.getDate()).padStart(2,'0')+' '+MONTHS_S[row.date.getMonth()];
            var hStr = Math.floor(row.min/60)+'h'+String(row.min%60).padStart(2,'0');
            var ty   = y + ROW - 1.8;
            doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
            txt(dStr,                               xD,   ty);
            txt(row.start+'-'+row.end,              xHor, ty);
            doc.setFont('helvetica','bold'); doc.setTextColor(ACC[0],ACC[1],ACC[2]);
            txt(hStr,                               xH,   ty);
            doc.setFont('helvetica','normal'); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
            txt(trunc(row.desc, xLoc-xDesc-4),      xDesc,ty);
            doc.setTextColor(MID[0],MID[1],MID[2]);
            txt(trunc(row.loc, xFr-xLoc-3),         xLoc, ty);
            y += ROW;
        });
        c.expenses.forEach(function(exp, ei) {
            checkPage(ROW+1);
            fillR(ML,y,CW,ROW,PINK);
            hL(y+ROW, [240,210,210], 0.12);
            var dStr = DAYS_S[exp.date.getDay()]+' '+String(exp.date.getDate()).padStart(2,'0')+' '+MONTHS_S[exp.date.getMonth()];
            var ty   = y + ROW - 1.8;
            doc.setFont('helvetica','italic'); doc.setFontSize(7.5); doc.setTextColor(150,60,60);
            txt(dStr,                          xD,   ty);
            txt('Frais',                       xHor, ty);
            txt(trunc(exp.desc, xFr-xDesc-4),  xDesc,ty);
            doc.setFont('helvetica','bold');
            txt(exp.amount>0?exp.amount.toFixed(2):'', xFr, ty, {align:'right'});
            y += ROW;
        });
        grandMins  += c.minutes;
        grandFrais += cFrais;
        y += 4;
    });
    checkPage(10);
    fillR(ML, y, CW, 8, DARK);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    txt('TOTAL GENERAL', ML+3, y+5.5);
    var gStr = Math.floor(grandMins/60)+'h'+String(grandMins%60).padStart(2,'0');
    txt(gStr+(grandFrais>0?' + '+grandFrais.toFixed(2)+' CHF':''), PW-MR-3, y+5.5, {align:'right'});
    var totalPages = doc.internal.getNumberOfPages();
    for (var p=1; p<=totalPages; p++) {
        doc.setPage(p);
        fillR(0, PH-9, PW, 9, [238,238,240]);
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(MID[0],MID[1],MID[2]);
        txt('MesHeures', ML, PH-3.5);
        txt('Page '+p+' / '+totalPages, PW/2, PH-3.5, {align:'center'});
        txt('Genere le '+todayStr, PW-MR, PH-3.5, {align:'right'});
    }
    var fileName = company.replace(/\s+/g,'_')+'_Clients_'+monthName+'_'+agg.year+'.pdf';
    var pdfBlob  = doc.output('blob');
    var pdfFile  = new File([pdfBlob], fileName, {type:'application/pdf'});
    if (navigator.canShare && navigator.canShare({files:[pdfFile]})) {
        navigator.share({files:[pdfFile], title:'Clients '+monthName+' '+agg.year+' - '+company})
            .catch(function(err){ if(err.name!=='AbortError') doc.save(fileName); });
    } else { doc.save(fileName); }
    showToast('Export PDF clients '+monthName+' '+agg.year);
}

function _syncCursor() {
    const input  = document.getElementById('companyName');
    const cursor = document.getElementById('companyCursor');
    if (!input || !cursor) return;
    const hide = input.value.trim() !== '' || document.activeElement === input;
    cursor.classList.toggle('hidden', hide);
    if (!hide) _positionCursor(input, cursor);
}

function _positionCursor(input, cursor) {
    const style    = window.getComputedStyle(input);
    const fontSize = parseFloat(style.fontSize);              // px réels
    const font     = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
    const c        = document.createElement('canvas');
    const ctx      = c.getContext('2d');
    ctx.font       = font;
    const txtW     = ctx.measureText(input.placeholder || 'Entreprise').width;

    // Horizontal : bord gauche du placeholder, à 4px avant la première lettre
    const left = (input.offsetWidth / 2) - (txtW / 2) - 4;

    // Vertical : centré sur la cap-height de Poppins 800 (ratio 0.73)
    const capH = fontSize * 0.73;
    const top  = (input.offsetTop + input.offsetHeight / 2) - (capH / 2);

    cursor.style.left   = Math.max(0, left) + 'px';
    cursor.style.top    = Math.round(top) + 'px';
    cursor.style.height = Math.round(capH) + 'px';
}

(document.fonts ? document.fonts.ready : Promise.resolve()).then(() => {
    const input  = document.getElementById('companyName');
    const cursor = document.getElementById('companyCursor');
    if (!input || !cursor) return;
    input.addEventListener('focus',  _syncCursor);
    input.addEventListener('blur',   _syncCursor);
    window.addEventListener('resize', () => { if (!cursor.classList.contains('hidden')) _positionCursor(input, cursor); });
    _syncCursor();
});

    // Synchroniser calendarViewMonth avec la semaine actuelle
    state.calendarViewMonth = new Date(state.currentWeekStart);

    // Charger le nom de l'entreprise depuis localStorage
    const savedCompany = localStorage.getItem('companyName');
    if (savedCompany) document.getElementById('companyName').value = savedCompany;

    // Sauvegarde automatique toutes les 2 minutes
    setInterval(() => DataManager.saveWeek(), 120000);

    // Sauvegarde avant fermeture
    window.addEventListener('beforeunload', () => DataManager.saveWeek());

    // Avertissement hors-ligne (une seule fois par session)
    if (!navigator.onLine) {
        setTimeout(() => showToast('📴 Mode hors-ligne — exports Excel/PDF indisponibles'), 2000);
    }

    // Démarrer : tenter de restaurer depuis IndexedDB si localStorage vide,
    // puis afficher la semaine
    _rebuildCalIndex();
    DataManager.idb.restoreIfNeeded().then(wasRestored => {
        const savedCompany2 = localStorage.getItem('companyName');
        if (savedCompany2) document.getElementById('companyName').value = savedCompany2;
        renderWeek();
        // Sync initiale header → champs du bas
        const _cName = document.getElementById('companyName')?.value.trim();
        if (_cName) { const el = document.getElementById('companyLegalName'); if (el && !el.value) el.value = _cName; }
        const _eName = document.getElementById('employeeName')?.value.trim();
        if (_eName) {
            const _parts = _eName.split(/\s+/);
            const _ef = document.getElementById('firstName');
            const _el = document.getElementById('lastName');
            if (_ef && !_ef.value) _ef.value = _parts[0] || '';
            if (_el && !_el.value) _el.value = _parts.length > 1 ? _parts.slice(1).join(' ') : '';
        }
        if (wasRestored) {
            setTimeout(() => showToast('✓ Données récupérées automatiquement'), 800);
        }
    }).catch(() => {
        // Fallback : lancer l'app même si IDB échoue
        renderWeek();
    });

})();



/* ════════════════════════════════════════════════════════════════
   § 13  CLAVIER MOBILE — scroll automatique au-dessus du clavier
   ──────────────────────────────────────────────────────────────
   Problème : quand le clavier virtuel s'ouvre sur iOS/Android,
   il réduit le visualViewport sans scroller la page. Le champ
   actif et les suggestions AC se retrouvent cachés derrière.

   Solution : écouter visualViewport.resize (= clavier ouvert/fermé)
   et scroller pour que le champ actif + ses suggestions soient
   toujours visibles avec une marge confortable au-dessus du clavier.
════════════════════════════════════════════════════════════════ */

(function initKeyboardScroll() {

    // ── Hauteur de marge au-dessus du clavier ─────────────────────
    // 160px : assez pour voir le champ ET une liste de suggestions AC
    const MARGIN = 160;

    let _focused      = null;   // élément actif
    let _rafPending   = false;  // throttle via requestAnimationFrame

    // ── Calculer et appliquer le scroll nécessaire ─────────────────
    function _adjust() {
        _rafPending = false;
        if (!_focused || !window.visualViewport) return;

        const vv   = window.visualViewport;
        const rect = _focused.getBoundingClientRect();

        // rect.bottom est relatif au layout viewport ;
        // on le ramène dans le repère du visual viewport
        const elBottomInVV = rect.bottom - vv.offsetTop;
        const overflow     = elBottomInVV + MARGIN - vv.height;

        if (overflow > 0) {
            // Scroller le document vers le bas pour faire remonter le champ
            window.scrollBy({ top: overflow, behavior: 'smooth' });
        }
    }

    function _scheduleAdjust() {
        if (_rafPending) return;
        _rafPending = true;
        requestAnimationFrame(_adjust);
    }

    // ── Écouter le redimensionnement du viewport visuel ───────────
    // = clavier qui s'ouvre ou se ferme
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', _scheduleAdjust);
        window.visualViewport.addEventListener('scroll', _scheduleAdjust);
    }

    // ── Capturer le focus sur tous les champs éditables ───────────
    document.addEventListener('focusin', e => {
        const el = e.target;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            _focused = el;
            // Double délai : 1er tick pour que le clavier commence à s'ouvrir,
            // 2e tick (400ms) pour que l'animation du clavier soit terminée
            setTimeout(_scheduleAdjust, 150);
            setTimeout(_scheduleAdjust, 450);
        }
    }, true);

    document.addEventListener('focusout', () => {
        _focused = null;
    }, true);

    // ── Cas spécial : ouverture du time picker ─────────────────────
    // Le time picker est readonly → pas de clavier → pas d'action.
    // Mais si un champ texte normal était actif juste avant, on nettoie.

})();
