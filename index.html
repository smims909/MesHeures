/* ════════════════════════════════════════════════════════════════
   § 1  RESET & VARIABLES CSS
   Palette complète, overridée sous html.dark-mode
   Utiliser var(--xxx) partout, jamais de couleur hardcodée
════════════════════════════════════════════════════════════════ */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html { scroll-behavior: smooth; }

/* ── Mode clair (défaut) ── */
:root {
    /* Fonds — 4 niveaux de profondeur */
    --bg-app:      #E8E8ED;          /* fond général de la page */
    --bg-card:     #FFFFFF;          /* cartes, blocs, modals */
    --bg-input:    #F8F8F8;          /* champs de saisie */
    --bg-header:   #FFFFFF;          /* header + nav semaine */
    --bg-section:  #FAFAFA;          /* titres de section (bandeaux) */
    --bg-footer:   rgba(255,255,255,0.97);

    /* Texte — 4 niveaux */
    --text-primary:     #000000;     /* texte principal */
    --text-secondary:   #666666;     /* texte secondaire (dates, labels) */
    --text-muted:       #8E8E93;     /* texte discret */
    --text-placeholder: #C7C7CC;     /* placeholders */

    /* Bordures */
    --border:     #E5E5E5;

    /* Accent — identique clair/sombre */
    --accent:     #FD636B;

    /* Ombres */
    --shadow-sm:  rgba(0,0,0,0.05);
    --shadow-md:  rgba(0,0,0,0.08);

    /* Couleur spéciale titre entreprise */
    --title-color: #2C2C48;
}

/* ── Mode sombre — palette à 4 niveaux inspirée Material Design 3 ── */
html.dark-mode {
    --bg-app:      #1C1C22;          /* gris bleuté profond */
    --bg-card:     #26262D;
    --bg-input:    #32323A;
    --bg-header:   #222229;
    --bg-section:  #2A2A32;
    --bg-footer:   rgba(28,28,34,0.98);

    --text-primary:     #E8E8EE;
    --text-secondary:   #9A9AA6;
    --text-muted:       #65656F;
    --text-placeholder: #505058;

    --border:     #3A3A44;
    --accent:     #FD636B;
    --shadow-sm:  rgba(0,0,0,0.2);
    --shadow-md:  rgba(0,0,0,0.3);
    --title-color: #E4E4E8;
}

/* ── Corps ── Anti-FOUC : body invisible jusqu'à JS body.classList.add('ready') */
body {
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;               /* 16px — rem pour adaptabilité APK */
    color: var(--text-primary);
    background: var(--bg-app);
    padding-bottom: 200px;         /* espace pour le footer fixe */
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.15s ease;
}
body.ready {
    visibility: visible;
    opacity: 1;
}


/* ════════════════════════════════════════════════════════════════
   § 3  LAYOUT GLOBAL
   Header sticky, navigation semaine, raccourcis jours
════════════════════════════════════════════════════════════════ */

/* ── Header ─────────────────────────────────────────────────── */
.header {
    /* ── Header solidarisé ──────────────────────────────────────────
       Position dans le flux normal : le header remonte naturellement
       avec la page lors du scroll, sans JS, sans calcul d'offset.
       Le darkToggle (position:absolute) reste dans ce contexte de pile.
    ──────────────────────────────────────────────────────────────── */
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 16px 20px;
    box-shadow: 0 2px 8px var(--shadow-sm);
    position: relative;   /* flux normal — remonte avec la page */
    z-index: 10;          /* au-dessus des cartes uniquement lors d'un éventuel overlap */
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Wrapper pour le champ "Entreprise" + curseur animé */
.logo-container {
    position: relative;
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
}

/* Champ titre entreprise (grand, bold, transparent) */
#companyName {
    font-family: 'Poppins', sans-serif;
    font-size: 2.25rem;            /* 36px */
    font-weight: 800;
    letter-spacing: 1px;
    text-align: center;
    background: transparent;
    border: none;
    padding: 4px 0;
    width: 100%;
    outline: none;
    color: var(--title-color);
}
#companyName::placeholder { color: #C8C8CC; opacity: 1; }

/* Inputs du header (employeeName) */
.header input:not(#companyName) {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9375rem;          /* 15px */
    font-family: 'Poppins', sans-serif;
    margin-bottom: 10px;
}
.header input::placeholder { color: var(--text-muted); }
.header input:focus {
    outline: none;
    border-color: #FD636B;
    background: var(--bg-card);
}

/* ── Bouton dark mode — disque SVG lune/soleil ─────────────── */
/* position:absolute dans le header sticky → jamais superposé aux cartes */
#darkToggle {
    position: absolute;
    top: 20px;                     /* espace de respiration dans le coin — était 12px */
    right: 20px;                   /* espace de respiration dans le coin — était 12px */
    width: 30px;
    height: 30px;
    /* Zone tactile étendue ≥ 44×44px via padding compensé par margin négatif.
       Le margin négatif n'affecte pas top/right : ceux-ci positionnent le bord
       du box-model (sans margin), donc la sphère visible est bien à 20px du bord. */
    padding: 7px;
    margin: -7px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-card);
    cursor: pointer;
    z-index: 160;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px var(--shadow-sm);
    transition: background 0.2s, border-color 0.2s;
}
#darkToggle svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
}

/* ── Navigation semaine ─────────────────────────────────────── */
.week-nav {
    background: var(--bg-card);
    padding: 14px 20px 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.week-nav button {
    background: transparent;
    color: #FD636B;
    border: none;
    padding: 8px 16px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    /* Zone tactile ≥ 44px */
    min-width: 44px;
    min-height: 44px;
}
.week-nav button:active { opacity: 0.5; }

.week-date {
    font-weight: 500;
    font-size: 1.0625rem;          /* 17px */
    color: var(--text-primary);
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
}

/* ── Raccourcis jours (L M M J V S D) ──────────────────────── */
.day-shortcuts {
    background: var(--bg-card);
    padding: 8px 12px 14px 12px;
    display: flex;
    justify-content: space-between;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    box-shadow: 0 2px 8px var(--shadow-sm);
}
.day-shortcut {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: 'Poppins', sans-serif;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;              /* zone tactile */
}
.day-shortcut:active { background: var(--bg-input); }
.day-shortcut .sc-label {
    font-size: 0.6875rem;          /* 11px */
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.day-shortcut .sc-num {
    font-size: 0.875rem;           /* 14px */
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 1px;
}
.day-shortcut.sc-today .sc-num { color: #FD636B; font-weight: 700; }


/* ════════════════════════════════════════════════════════════════
   § 4  CARTES JOUR & PÉRIODES
   .day-card → .day-title (bandeau) + .day-body (repliable)
════════════════════════════════════════════════════════════════ */

/* ── Carte jour ─────────────────────────────────────────────── */
.day-card {
    background: var(--bg-card);
    margin: 0 12px 12px 12px;
    border-radius: 12px;
    box-shadow: 0 1px 3px var(--shadow-md);
    overflow: hidden;
}

/* ── Bandeau titre jour — CSS GRID (3 colonnes : nom | date | +)
   1fr  = "Dimanche" prend son quart de gauche, élastique
   auto = la date occupe exactement sa propre largeur, AU CENTRE de la grille
   1fr  = le + prend son quart de droite, élastique
   → la colonne centrale (date) est toujours à l'axe mathématique du bandeau,
     peu importe la longueur du nom du jour ("L" vs "Dimanche"). ── */
.day-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;  /* ← true-center : colonnes symétriques */
    align-items: center;
    gap: 0 8px;
    padding: 14px 16px;
    background: var(--bg-section);
    cursor: pointer;
    border-bottom: none;
    user-select: none;
    -webkit-user-select: none;
    min-height: 52px;
}
/* Bordure visible uniquement quand la carte est ouverte */
.day-card.expanded .day-title {
    border-bottom: 1px solid var(--border);
}

.day-name {
    font-size: 1.125rem;           /* 18px */
    font-weight: 600;
    color: #FD636B;
    font-family: 'Poppins', sans-serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    justify-self: start;           /* ancré à gauche dans sa colonne 1fr */
}
.day-date {
    font-size: 0.8125rem;          /* 13px */
    color: var(--text-secondary);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    /* Pas de min-width: 0 ici — la colonne auto laisse la date prendre sa vraie largeur */
}
.day-toggle {
    color: #FD636B;
    font-size: 1.25rem;            /* 20px */
    font-weight: 300;
    line-height: 1;
    transition: transform 0.25s ease;
    user-select: none;
    justify-self: end;             /* ancré à droite dans sa colonne 1fr */
    /* Centrage vertical garanti même si font-size varie */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
}
.day-card.expanded .day-toggle { transform: rotate(45deg); }

/* ── Corps repliable ─────────────────────────────────────────── */
.day-card .day-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
}
.day-card.expanded .day-body {
    max-height: 3000px;
    transition: max-height 0.45s ease;
}

/* ── Période (Matin / Après-midi) ───────────────────────────── */
.period-section {
    background: var(--bg-card);
    padding: 14px 16px;
    border-bottom: 1px solid #F5F5F5;
    overflow: hidden;
    box-sizing: border-box;
    width: 100%;
}
.period-section:last-of-type { border-bottom: none; }

.period-header {
    font-size: 0.875rem;
    font-weight: 600;
    color: #FD636B;
    margin-bottom: 10px;
}
.day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

/* ── Erreurs de validation horaire ─────────────────────────── */
.time-error-slot { overflow: hidden; }
.time-error {
    font-size: 0.75rem;            /* 12px */
    color: #D0323A;
    font-weight: 500;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    padding: 6px 8px;
    margin: 4px 0 2px 0;
    display: none;
    opacity: 0;
    transition: opacity 0.2s ease;
}
.time-error.visible { display: block; opacity: 1; }

/* ── Lignes client / description / lieu ────────────────────── */
.client-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    align-items: center;
}
.client-row input[type="text"] { flex: 1; margin-bottom: 0; }

.desc-row, .location-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    align-items: center;
}
.desc-row input, .location-row input { flex: 1; margin-bottom: 0; height: 44px; }

/* ── Entrée client (multi-clients par période) ──────────────── */
.client-entry {
    padding: 12px 0;
    border-top: 1px solid #F5F5F5;
}
.client-entry .hours-display {
    margin-top: 8px;
    background: linear-gradient(135deg, #3AE8B0 0%, #19AFD0 100%);
}

/* ── Affichage heures (dégradé jaune) ───────────────────────── */
.hours-display {
    background: linear-gradient(135deg, #FFB900 0%, #e0a500 100%);
    color: white;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 8px;
    box-shadow: 0 2px 6px rgba(255,185,0,0.25);
}

/* ── Total semaine ──────────────────────────────────────────── */
.weekly-total {
    background: var(--bg-card);
    margin: 12px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.weekly-total h3 {
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-bottom: 8px;
}
.weekly-total .total {
    font-size: 2rem;               /* 32px */
    font-weight: 500;
    color: #FD636B;
}

/* ── Frais ──────────────────────────────────────────────────── */
.expenses-section {
    background: var(--bg-card);
    padding: 8px 16px;
    border-top: 1px solid var(--border);
}
.expenses-header {
    font-size: 0.875rem;
    font-weight: 500;
    color: #FD636B;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 36px;
    padding: 4px 0;
    margin-bottom: 0;
}
.add-expense-btn, .add-km-btn {
    color: #FD636B;
    font-size: 1.5rem;             /* 24px */
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
}
.add-expense-btn:active, .add-km-btn:active { opacity: 0.4; }

.expense-item {
    display: grid;
    grid-template-columns: 2fr 1fr auto;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 4px;
    align-items: center;
}
.expense-item.hidden { display: none; }
.expense-item input { margin-bottom: 0; padding: 10px 12px; height: 40px; }
.expense-item input[type="number"] { text-align: right; }

.remove-expense-btn {
    background: #FD636B;
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 14px;
    font-size: 1.25rem;
    font-weight: 300;
    /* Centrage rigoureux — même technique que .add-client-btn */
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
}

/* ── KM ─────────────────────────────────────────────────────── */
.km-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
}

/* ── Repas ──────────────────────────────────────────────────── */
.meal-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-input);
    border-radius: 10px;
    margin-bottom: 0;
    min-height: 44px;
}
.meal-checkbox input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg-input);
    border: 2px solid var(--text-muted);
    border-radius: 5px;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
}
.meal-checkbox input[type="checkbox"]:checked {
    background: #FD636B;
    border-color: #FD636B;
}
.meal-checkbox input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
}
.meal-checkbox label {
    flex: 1;
    font-size: 0.875rem;
    cursor: pointer;
    line-height: 1;
}


/* ════════════════════════════════════════════════════════════════
   § 5  FORMULAIRES & INPUTS
   Styles unifiés pour tous les champs de saisie
════════════════════════════════════════════════════════════════ */

/* ── Inputs texte / number / textarea / select ── */
input[type="text"],
input[type="number"],
textarea,
select {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;          /* 15px */
    margin-bottom: 12px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'Poppins', sans-serif;
}
input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #FD636B;
    background: var(--bg-card);
    caret-color: #FD636B;
}

/* ── Champ horaire (time picker personnalisé) ─────────────── */
/* readonly car ouvert via notre picker, pas le natif */
input[data-timepicker] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--bg-input);
    color: var(--text-primary);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    caret-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Poppins', sans-serif;
    margin-bottom: 0;
}
input[data-timepicker]:focus { border-color: #FD636B; background: var(--bg-card); }
input[data-timepicker].invalid {
    border-color: rgba(208,50,58,0.75) !important;
    background: transparent !important;
}

/* ── Labels de groupe horaire ───────────────────────────────── */
.time-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
    width: 100%;
    box-sizing: border-box;
}
.time-group label {
    font-size: 0.75rem;            /* 12px */
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
}

/* ── Boutons d'action inline ────────────────────────────────── */
.copy-morning-btn {
    padding: 8px 12px;
    background: #F0F0F0;
    border: none;
    border-radius: 8px;
    color: #FD636B;
    font-size: 0.8125rem;          /* 13px */
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.copy-morning-btn:active { background: var(--border); }

.add-client-btn {
    /* Dimensions fixes — le bouton est toujours un cercle parfait */
    width: 32px;
    height: 32px;
    border-radius: 16px;
    background: #FD636B;
    color: white;
    border: none;
    font-size: 1.375rem;           /* légèrement agrandi pour mieux remplir le cercle */
    font-weight: 300;
    /* ── Centrage garanti vertical + horizontal ────────────────────
       align-items + justify-content centre le "×" dans le cercle.
       line-height:1 empêche le caractère de décaler verticalement. */
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    /* Retrait du style natif bouton qui ajoute du padding non désiré */
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    flex-shrink: 0;
}
.add-client-btn:active { opacity: 0.7; }

/* Bouton "+ Ajouter un client" discret (tirets) */
.add-client-line-btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    margin-bottom: 4px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1;
    -webkit-appearance: none;
    appearance: none;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.add-client-line-btn span { color: #FD636B; font-size: 1.125rem; font-weight: 400; }
.add-client-line-btn:active { background: var(--bg-input); border-color: #FD636B; }

/* Bouton copier petit (dans client-row) */
.copy-btn-small {
    padding: 12px 14px;
    background: #F0F0F0;
    border: none;
    border-radius: 8px;
    color: #FD636B;
    font-size: 0.6875rem;          /* 11px */
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.copy-btn-small span { color: var(--text-secondary); font-size: 0.625rem; font-weight: 400; }
.copy-btn-small:active { background: var(--border); }

/* ── Section infos (notes, données perso) ───────────────────── */
.info-section {
    background: var(--bg-card);
    margin: 12px;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.info-section > label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: #FD636B;
    margin-bottom: 10px;
}
.info-section textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-input);
    color: var(--text-primary);
    resize: vertical;
    margin-bottom: 0;
}
.info-section textarea:focus { outline: none; border-color: #FD636B; background: var(--bg-card); }

.info-section input[type="email"],
.info-section input[type="text"],
.info-section input[type="tel"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    background: var(--bg-input);
    height: 44px;
    box-sizing: border-box;
    margin-bottom: 0;
}
.info-section input:focus { outline: none; border-color: #FD636B; background: var(--bg-card); }

/* Grille 2 colonnes pour les infos personnelles */
.personal-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
/* Adresse et email pleine largeur */
.personal-info-grid input:nth-child(3),
.personal-info-grid input:nth-child(8) { grid-column: 1 / -1; }


/* ════════════════════════════════════════════════════════════════
   § 6  AUTOCOMPLETE
   Système unifié : clients, descriptions, lieux
   + Modal de gestion de liste
════════════════════════════════════════════════════════════════ */

/* ── Wrapper relatif (position de la dropdown) ── */
.ac-wrapper {
    position: relative;
    flex: 1;
    min-width: 0;
}
.ac-wrapper input { width: 100%; margin-bottom: 0; }

/* Alias rétro-compat avec anciens noms de classe */
.lieu-wrapper        { position: relative; flex: 1; }
.lieu-wrapper input  { width: 100%; margin-bottom: 0; height: 44px; }
.client-input-wrapper        { position: relative; flex: 1; }
.client-input-wrapper input  { width: 100%; margin-bottom: 0; }

/* ── Dropdown suggestions ── */
.ac-suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 210;
    overflow: hidden;
    max-height: 220px;
    overflow-y: auto;
}
.ac-suggestions.visible { display: block; }

/* Alias rétro-compat */
.lieu-suggestions, .client-suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg-card);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 210;
    overflow: hidden;
}
.lieu-suggestions.visible, .client-suggestions.visible { display: block; }

/* ── Item de suggestion ── */
.ac-item {
    padding: 11px 14px 11px 16px;
    font-size: 0.9375rem;
    font-family: 'Poppins', sans-serif;
    color: #222;
    cursor: pointer;
    border-bottom: 1px solid #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active { background: #FFF5F5; }

.ac-item-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.ac-item.ac-user .ac-item-name { font-weight: 600; }

/* Bouton × supprimer dans la dropdown */
.ac-item-del {
    color: var(--text-placeholder);
    font-size: 1.125rem;
    padding: 0 4px;
    flex-shrink: 0;
    line-height: 1;
    cursor: pointer;
}
.ac-item-del:active { color: #FD636B; }

/* Bouton ⚙ gestion de liste */
.ac-manage-btn {
    background: transparent;
    border: none;
    color: var(--text-placeholder);
    font-size: 1rem;
    padding: 0 4px;
    flex-shrink: 0;
    cursor: pointer;
    line-height: 1;
    -webkit-appearance: none;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ac-manage-btn:active { color: #FD636B; }

/* ── Modal gestion de liste AC (overlay bottom-sheet) ── */
#acModalOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 600;
    align-items: flex-end;
}
#acModalOverlay.open { display: flex; }

.ac-modal-sheet {
    background: var(--bg-card);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 44px;
    max-height: 65vh;
    overflow-y: auto;
}
.ac-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
}
.ac-modal-title   { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
.ac-modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 14px; }
.ac-modal-close {
    background: #F0F0F0;
    border: none;
    width: 30px; height: 30px;
    border-radius: 15px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
}
.ac-modal-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9375rem;
}
.ac-modal-item:last-child { border-bottom: none; }
.ac-modal-item-name  { flex: 1; }
.ac-modal-item-count { font-size: 0.75rem; color: var(--text-muted); margin-right: 12px; }
.ac-modal-del {
    background: transparent;
    border: none;
    color: var(--text-placeholder);
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
}
.ac-modal-del:active { color: #FD636B; }
.ac-modal-empty { color: var(--text-muted); font-size: 0.875rem; text-align: center; padding: 24px 0; }

/* Rétro-compat alias ancienne modal clients */
.clients-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 600; align-items: flex-end; }
.clients-modal-overlay.open { display: flex; }
.clients-modal { background: var(--bg-card); width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 44px; max-height: 65vh; overflow-y: auto; }
.clients-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.clients-modal-title { font-size: 1rem; font-weight: 700; }
.clients-modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 14px; }
.clients-modal-close { background: #F0F0F0; border: none; width: 30px; height: 30px; border-radius: 15px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.clients-modal-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 0.9375rem; }
.clients-modal-item:last-child { border-bottom: none; }
.clients-modal-item-name { flex: 1; }
.clients-modal-item-count { font-size: 0.75rem; color: var(--text-muted); margin-right: 12px; }
.clients-modal-del { background: transparent; border: none; color: var(--text-placeholder); font-size: 1.25rem; cursor: pointer; padding: 0 4px; line-height: 1; }
.clients-modal-del:active { color: #FD636B; }
.clients-modal-empty { color: var(--text-muted); font-size: 0.875rem; text-align: center; padding: 24px 0; }


/* ════════════════════════════════════════════════════════════════
   § 7  CALENDRIER MENSUEL
   Navigation, grille, indicateurs visuels
════════════════════════════════════════════════════════════════ */

.calendar-section {
    background: var(--bg-card);
    margin: 12px;
    padding: 14px;
    border-radius: 12px;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}
.calendar-header {
    font-size: 0.9375rem;
    font-weight: 500;
    font-family: 'Poppins', sans-serif;
    color: var(--text-primary);
    text-align: center;
    flex: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
.calendar-header:active { opacity: 0.6; }

.cal-nav-btn {
    background: none;
    border: none;
    font-size: 1.375rem;           /* 22px */
    color: #FD636B;
    cursor: pointer;
    padding: 0 10px;
    line-height: 1;
    font-weight: 300;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.cal-nav-btn:active { opacity: 0.5; }

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
}
.calendar-day-label {
    text-align: center;
    font-size: 0.625rem;           /* 10px */
    color: var(--text-muted);
    font-weight: 400;
    font-family: 'Poppins', sans-serif;
    padding: 4px 0;
}
.calendar-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 0.75rem;            /* 12px */
    font-weight: 500;
    color: var(--text-primary);
    position: relative;
    cursor: pointer;
    min-height: 36px;
}
.calendar-day.other-month { color: var(--text-placeholder); }
.calendar-day:active { opacity: 0.6; }

/* Indicateur aujourd'hui : point rouge en bas */
.calendar-day.today::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
}
/* Indicateur jour avec heures saisies : point violet */
.calendar-day.has-hours::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 4px; height: 4px;
    background: #6967CE;
    border-radius: 50%;
}
/* Jour avec heures ET aujourd'hui : contour noir autour du point */
.calendar-day.today.has-hours::after { box-shadow: 0 0 0 1px #000; }

/* ── Flash visuel lors d'un clic depuis le bandeau titre d'une carte ──
   Classe temporairement ajoutée par JS (_jumpCalendarToDate).
   Aucun inline style dans le JS — tout le design reste ici. ── */
.calendar-day.cal-flash {
    background: #FD636B !important;
    color: #ffffff !important;
    border-radius: 50% !important;
    transition: background 0.25s ease, color 0.25s ease;
}

/* ── Sélecteur mois/année rapide (bottom sheet) ── */
.cal-picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 300;
    align-items: flex-end;
}
.cal-picker-overlay.visible { display: flex; }

.cal-picker-sheet {
    background: var(--bg-card);
    width: 100%;
    border-radius: 18px 18px 0 0;
    padding: 20px 16px 32px;
}
.cal-picker-title {
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.cal-picker-row { display: flex; gap: 8px; margin-bottom: 12px; }
.cal-picker-select {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--bg-input);
    font-family: 'Poppins', sans-serif;
    -webkit-appearance: none;
    text-align: center;
}
.cal-picker-select:focus { outline: none; border-color: #6967CE; background: var(--bg-card); }
.cal-picker-confirm {
    width: 100%;
    padding: 14px;
    background: #6967CE;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.9375rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'Poppins', sans-serif;
}
.cal-picker-confirm:active { opacity: 0.85; }
.cal-picker-cancel {
    width: 100%;
    padding: 12px;
    background: none;
    color: var(--text-muted);
    border: none;
    font-size: 0.875rem;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'Poppins', sans-serif;
}


/* ════════════════════════════════════════════════════════════════
   § 8  TIME PICKER PERSONNALISÉ
   Modal plein écran avec grille heures / minutes
════════════════════════════════════════════════════════════════ */

.time-picker-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
}
.time-picker-modal {
    background: #F0F0F0;
    border-radius: 16px;
    width: 90%;
    max-width: 320px;
    overflow: hidden;
}
.time-picker-header {
    background: #E0E0E0;
    padding: 20px;
    text-align: center;
}
.time-picker-header span {
    font-size: 2.625rem;           /* 42px */
    font-weight: 300;
    color: #222222;
    letter-spacing: 3px;
    font-family: 'Poppins', sans-serif;
}
.time-picker-mode {
    display: flex;
    background: #E0E0E0;
    padding: 0 12px 12px 12px;
    gap: 8px;
}
.mode-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid #C8C8C8;
    color: var(--text-muted);
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.mode-btn.active { background: #FD636B; border-color: #FD636B; color: white; }

.time-picker-body { padding: 20px 12px; background: #F0F0F0; }
.time-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
}
.time-number {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #E0E0E0;
    border: 1px solid #C8C8C8;
    border-radius: 8px;
    color: #333333;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.time-number:active  { background: #D0D0D0; }
.time-number.selected { background: #FD636B; border-color: #FD636B; color: white; }

.time-picker-actions {
    display: flex;
    border-top: 1px solid #C8C8C8;
}
.time-picker-actions button {
    flex: 1;
    padding: 16px;
    border: none;
    background: transparent;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.time-btn-cancel { color: var(--text-muted); border-right: 1px solid #C8C8C8; }
.time-btn-cancel:active { background: rgba(255,255,255,0.05); }
.time-btn-ok     { color: #FD636B; }
.time-btn-ok:active     { background: rgba(216,69,69,0.1); }


/* ════════════════════════════════════════════════════════════════
   § 9  FOOTER FIXE & TOTAUX SEMAINE
   Barre d'actions + résumé 4 totaux (heures, km, repas, frais)
════════════════════════════════════════════════════════════════ */

.summary-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-footer);
    backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    padding: 6px 10px 10px;
    z-index: 100;
    box-shadow: 0 -2px 12px var(--shadow-sm);
    transition: transform 0.3s ease;
}
.summary-footer.hidden { transform: translateY(100%); }

.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 5px;
}
.summary-item {
    text-align: center;
    padding: 5px 3px;
    background: var(--bg-card);
    border-radius: 7px;
    border: 1px solid var(--border);
    line-height: 1.2;
}
.summary-item .label {
    font-size: 0.5rem;             /* 8px */
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 2px;
    text-transform: uppercase;
}
.summary-item .value {
    font-size: 0.75rem;            /* 12px */
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
}

/* ── Barre d'actions — palette Asana, aspect 'petites pastilles' ── */
.action-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}
.action-btn {
    /* ── Pastille fine — esthétique v1 ─────────────────────────────
       padding vertical réduit à 5px : le texte reste lisible mais
       la hauteur totale du bouton est nettement plus légère.
       min-height: 34px suffit pour un touch target convenable sur
       une barre de navigation fixe (le footer est déjà à portée
       de pouce, pas besoin des 44px pleins). */
    padding: 5px 4px;
    border: none;
    border-radius: 9px;
    font-size: 0.5625rem;          /* 9px — texte pastille */
    font-weight: 600;
    cursor: pointer;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s ease, transform 0.1s ease;
    font-family: 'Poppins', sans-serif;
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    text-align: center;
}
.action-btn:active { transform: scale(0.96); opacity: 0.85; }
.btn-export        { background: #36D5A8; box-shadow: 0 2px 8px rgba(54,213,168,0.35); }
.btn-pdf           { background: #19AFD0; box-shadow: 0 2px 8px rgba(25,175,208,0.35); }
.btn-backup-export { background: #6967CE; box-shadow: 0 2px 8px rgba(105,103,206,0.35); }
.btn-backup-import { background: #FFB900; box-shadow: 0 2px 8px rgba(255,185,0,0.35); }
.btn-clear         { background: #FD636B; box-shadow: 0 2px 8px rgba(253,99,107,0.35); }


/* ════════════════════════════════════════════════════════════════
   § 10 DARK MODE OVERRIDES
   Surcharges ciblées pour les éléments sans variable CSS directe
════════════════════════════════════════════════════════════════ */

html.dark-mode .header          { background: var(--bg-header); border-color: var(--border); box-shadow: 0 2px 6px var(--shadow-md); }
html.dark-mode .week-nav        { background: var(--bg-header); }
html.dark-mode .day-shortcuts   { background: var(--bg-header); }
html.dark-mode .day-card        { box-shadow: 0 2px 8px var(--shadow-md); }
html.dark-mode .day-title       { background: var(--bg-section); }
html.dark-mode .day-name        { color: var(--accent); }
html.dark-mode .day-date        { color: var(--text-secondary); }
html.dark-mode .period-section  { border-color: var(--border); }
html.dark-mode .week-date       { color: var(--text-primary); }
html.dark-mode .week-nav button { color: var(--accent); }

/* Placeholder entreprise en dark */
html.dark-mode #companyName::placeholder { color: var(--text-primary); opacity: 0.6; }

/* Inputs focus en dark */
html.dark-mode input:focus,
html.dark-mode textarea:focus,
html.dark-mode select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(253,99,107,0.15);
}

/* Time picker */
html.dark-mode .time-picker-overlay        { background: rgba(0,0,0,0.65); }
html.dark-mode .time-picker-modal          { background: var(--bg-card); box-shadow: 0 8px 28px var(--shadow-md); }
html.dark-mode .time-picker-header         { background: var(--bg-section); }
html.dark-mode .time-picker-header span    { color: var(--text-primary); }
html.dark-mode .time-picker-mode           { background: var(--bg-section); }
html.dark-mode .mode-btn                   { border-color: var(--border); color: var(--text-secondary); background: var(--bg-input); }
html.dark-mode .mode-btn.active            { background: var(--accent); border-color: var(--accent); color: white; }
html.dark-mode .time-picker-body           { background: var(--bg-card); }
html.dark-mode .time-number                { background: var(--bg-input); border-color: var(--border); color: var(--text-primary); }
html.dark-mode .time-number:active         { background: var(--bg-section); }
html.dark-mode .time-number.selected       { background: var(--accent); border-color: var(--accent); color: white; }
html.dark-mode .time-picker-actions        { border-color: var(--border); }
html.dark-mode .time-picker-actions button { background: var(--bg-card); }
html.dark-mode .time-btn-cancel            { color: var(--text-secondary); border-color: var(--border); }
html.dark-mode .time-btn-ok                { color: var(--accent); }

/* Validation horaire */
html.dark-mode .time-error                         { color: #FF6670; }
html.dark-mode input[data-timepicker].invalid      { border-color: rgba(255,102,112,0.7) !important; background: transparent !important; }

/* Weekly total */
html.dark-mode .weekly-total h3 { color: var(--text-muted); }

/* Footer */
html.dark-mode .summary-footer { background: var(--bg-footer); border-color: var(--border); box-shadow: 0 -2px 10px var(--shadow-md); }
html.dark-mode .summary-item   { background: var(--bg-section); border-color: var(--border); }
html.dark-mode .summary-item .label { color: var(--text-muted); }
html.dark-mode .summary-item .value { color: var(--text-primary); }

/* Calendrier */
html.dark-mode .calendar-section              { background: var(--bg-card); }
html.dark-mode .calendar-header               { color: var(--text-primary); }
html.dark-mode .calendar-day-label            { color: var(--text-muted); }
html.dark-mode .calendar-day                  { color: var(--text-secondary); }
html.dark-mode .calendar-day:hover            { background: var(--bg-input); }
html.dark-mode .calendar-day.other-month      { color: var(--border); }
html.dark-mode .cal-picker-overlay            { background: rgba(0,0,0,0.65); }
html.dark-mode .cal-picker-sheet              { background: var(--bg-card); }
html.dark-mode .cal-picker-select             { background: var(--bg-input); border-color: var(--border); color: var(--text-primary); }
html.dark-mode .cal-picker-cancel             { color: var(--text-secondary); }
html.dark-mode .cal-nav-btn                   { color: var(--accent); }

/* Sections info */
html.dark-mode .info-section > label  { color: var(--accent); }
html.dark-mode .info-section textarea { background: var(--bg-input); color: var(--text-primary); border-color: var(--border); }
html.dark-mode .meal-checkbox         { background: var(--bg-input); }
html.dark-mode .meal-checkbox label   { color: var(--text-secondary); }
html.dark-mode .expenses-header       { color: var(--accent); }

/* Autocomplete */
html.dark-mode .ac-suggestions        { background: var(--bg-card); border-color: var(--border); box-shadow: 0 4px 16px var(--shadow-md); }
html.dark-mode .ac-item               { color: var(--text-primary); border-color: var(--border); }
html.dark-mode .ac-item:active        { background: var(--bg-input); }
html.dark-mode .ac-modal-sheet        { background: var(--bg-card); }
html.dark-mode .ac-modal-title        { color: var(--text-primary); }
html.dark-mode .ac-modal-item         { color: var(--text-primary); border-color: var(--border); }
html.dark-mode .ac-modal-close        { background: var(--bg-input); color: var(--text-secondary); }
/* Rétro-compat modal clients */
html.dark-mode .clients-modal         { background: var(--bg-card); }
html.dark-mode .clients-modal-title   { color: var(--text-primary); }
html.dark-mode .clients-modal-item    { color: var(--text-primary); border-color: var(--border); }

/* Boutons inline */
html.dark-mode .copy-morning-btn { background: var(--bg-input); color: var(--accent); }
html.dark-mode .copy-btn-small   { background: var(--bg-input); color: var(--accent); }
html.dark-mode .add-client-line-btn { border-color: var(--border); color: var(--text-muted); }
html.dark-mode .ac-manage-btn       { color: var(--text-muted); }
html.dark-mode .remove-expense-btn  { opacity: 0.85; }
html.dark-mode .period-header       { color: var(--accent); }
html.dark-mode .client-entry        { border-color: var(--border); }

/* darkToggle */
html.dark-mode #darkToggle { background: var(--bg-input); border-color: var(--border); }


/* ════════════════════════════════════════════════════════════════
   § 11 ANIMATIONS
   Curseur clignotant (companyName) + toggle repli (day-toggle)
════════════════════════════════════════════════════════════════ */

/* ── Curseur rouge clignotant sur le placeholder "Entreprise" ── */
@keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}

.company-cursor {
    /* Position absolue dans .logo-container (position:relative).
       left, top et height sont calculés par _positionCursor() en JS
       après rendu des polices — c'est la seule source de vérité pour
       ces valeurs, ne pas les définir ici pour éviter tout conflit. */
    position: absolute;
    width: 2px;
    background-color: var(--accent);
    border-radius: 1px;
    pointer-events: none;
    animation: blink 1s step-end infinite;
}
.company-cursor.hidden { display: none; }

/* ── Toast notification ─────────────────────────────────────── */
.toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.82);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.875rem;
    font-family: 'Poppins', sans-serif;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 9999;
    pointer-events: none;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

// ── Formatage de date ─────────────────────────────────────────────
// Retourne "jj/mm/aa"
function formatDate(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = String(date.getFullYear()).slice(-2);
    return `${d}/${m}/${y}`;
}
// Retourne "jj.mm.aaaa"
function formatDateFull(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    return `${d}.${m}.${date.getFullYear()}`;
}

// ── Conversion HH:MM → minutes depuis minuit ──────────────────────
function timeToMinutes(t) {
    if (!t || t === '--:--') return -1;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

// ── Debounce : exécuter fn après delay ms d'inactivité ──────────
function debounce(fn, delay) {
    return function (...args) {
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(() => fn.apply(this, args), delay);
    };
}

// ── Clé localStorage d'une semaine ──────────────────────────────
function getWeekKey() {
    return `week_${state.currentWeekStart.toISOString().split('T')[0]}`;
}

// ── Toast sans alert() — compatible PWA/WebView ───────────────────
function showToast(msg, duration = 2500) {
    const el = document.getElementById('toastEl');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
}

// ── Validation des créneaux d'un jour ────────────────────────────
// Retourne [] si tout est OK, ou [{ period, id, msg }, ...] si erreurs.
// Vérifie : fin > début ET anti-chevauchement entre tous les créneaux du jour.
function validateTimeSlots(dayIndex) {
    const slots = [];

    ['am', 'pm'].forEach(period => {
        // Créneau principal
        const s = document.getElementById(`start_${dayIndex}_${period}`)?.value;
        const e = document.getElementById(`end_${dayIndex}_${period}`)?.value;
        if (s && e && s !== '--:--' && e !== '--:--') {
            slots.push({ s, e, period, id: null });
        }
        // Créneaux supplémentaires (clients additionnels)
        document.querySelectorAll(`[id^="start_${dayIndex}_${period}_"]`).forEach(el => {
            const entryId = el.id.replace(`start_${dayIndex}_${period}_`, '');
            const endEl   = document.getElementById(`end_${dayIndex}_${period}_${entryId}`);
            if (el.value && endEl?.value && el.value !== '--:--' && endEl.value !== '--:--') {
                slots.push({ s: el.value, e: endEl.value, period, id: entryId });
            }
        });
    });

    const errors = [];
    for (let i = 0; i < slots.length; i++) {
        const a = slots[i];
        const aS = timeToMinutes(a.s), aE = timeToMinutes(a.e);
        if (aE <= aS) {
            errors.push({ period: a.period, id: a.id, msg: 'Fin doit être après le début' });
            continue;
        }
        for (let j = i + 1; j < slots.length; j++) {
            const b = slots[j];
            const bS = timeToMinutes(b.s), bE = timeToMinutes(b.e);
            if (aS < bE && bS < aE) {
                errors.push({ period: a.period, id: a.id, msg: 'Chevauchement avec un autre créneau' });
                errors.push({ period: b.period, id: b.id, msg: 'Chevauchement avec un autre créneau' });
            }
        }
    }
    return errors;
}

// ── Afficher / masquer une erreur horaire ─────────────────────────
function showTimeError(dayIndex, period, msg) {
    const slot = document.getElementById(`time-err-${dayIndex}-${period}`);
    if (!slot) return;
    slot.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'time-error visible';
    el.textContent = msg;
    slot.appendChild(el);
    document.getElementById(`start_${dayIndex}_${period}`)?.classList.add('invalid');
    document.getElementById(`end_${dayIndex}_${period}`)?.classList.add('invalid');
}
function clearTimeError(dayIndex, period) {
    const slot = document.getElementById(`time-err-${dayIndex}-${period}`);
    if (slot) slot.innerHTML = '';
    document.getElementById(`start_${dayIndex}_${period}`)?.classList.remove('invalid');
    document.getElementById(`end_${dayIndex}_${period}`)?.classList.remove('invalid');
}


/* ════════════════════════════════════════════════════════════════
   § 3  DATA MANAGER — localStorage + IndexedDB
   Toute la persistance est ici. Pas d'accès direct à localStorage
   en dehors de ce module.
════════════════════════════════════════════════════════════════ */

const DataManager = (() => {

    // ── IndexedDB (3 snapshots max, silencieux) ───────────────────
    const IDB = (() => {
        const DB_NAME    = 'mesheures_idb';
        const DB_VERSION = 1;
        const STORE      = 'snapshots';
        const MAX_SNAPS  = 3;
        let _db = null;

        function open() {
            return new Promise((resolve, reject) => {
                if (_db) { resolve(_db); return; }
                if (!window.indexedDB) { reject(new Error('IndexedDB indisponible')); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE)) {
                        db.createObjectStore(STORE, { keyPath: 'ts' });
                    }
                };
                req.onsuccess = e => { _db = e.target.result; resolve(_db); };
                req.onerror   = e => reject(e.target.error);
            });
        }

        function save() {
            open().then(db => {
                const snap = { ts: Date.now(), data: {} };
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    snap.data[k] = localStorage.getItem(k);
                }
                if (Object.keys(snap.data).length === 0) return;
                const tx    = db.transaction(STORE, 'readwrite');
                const store = tx.objectStore(STORE);
                store.add(snap);
                const allReq = store.getAll();
                allReq.onsuccess = () => {
                    const all = allReq.result.sort((a, b) => a.ts - b.ts);
                    while (all.length > MAX_SNAPS) store.delete(all.shift().ts);
                };
            }).catch(() => {}); // toujours silencieux
        }

        function getLatest() {
            return open().then(db => new Promise((resolve) => {
                const tx    = db.transaction(STORE, 'readonly');
                const req   = tx.objectStore(STORE).getAll();
                req.onsuccess = () => {
                    const all = req.result.sort((a, b) => b.ts - a.ts);
                    resolve(all[0] || null);
                };
                req.onerror = () => resolve(null);
            })).catch(() => null);
        }

        function lsHasData() {
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('week_') || k === 'employeeName' || k === 'companyName') return true;
            }
            return false;
        }

        function restoreIfNeeded() {
            try { if (lsHasData()) return Promise.resolve(false); } catch(e) {}
            return getLatest().then(snap => {
                if (!snap?.data || Object.keys(snap.data).length === 0) return false;
                try {
                    Object.keys(snap.data).forEach(k => localStorage.setItem(k, snap.data[k]));
                    return true;
                } catch(e) { return false; }
            }).catch(() => false);
        }

        return { save, restoreIfNeeded };
    })();

    // ── Clé de semaine ────────────────────────────────────────────
    // Exposée pour les modules qui en ont besoin
    function weekKey() { return getWeekKey(); }

    // ── Sauvegarder la semaine courante ──────────────────────────
    // Lit tous les champs du DOM, valide les horaires, sérialise.
    function saveWeek() {
        try {
            const data = { days: [] };

            for (let i = 0; i < 7; i++) {
                // Validation : ne pas persister les créneaux invalides
                const dayErrors  = validateTimeSlots(i);
                const invalidSet = new Set(dayErrors.map(e => e.period + (e.id ? '_' + e.id : '')));

                const cleanTime = period => {
                    if (invalidSet.has(period)) return { start: '', end: '' };
                    const s = document.getElementById(`start_${i}_${period}`)?.value || '';
                    const e = document.getElementById(`end_${i}_${period}`)?.value   || '';
                    const ok = s && e && s !== '--:--' && e !== '--:--' && e > s;
                    return { start: ok ? s : '', end: ok ? e : '' };
                };
                const amT = cleanTime('am');
                const pmT = cleanTime('pm');

                const day = {
                    am: {
                        client:       document.getElementById(`client_${i}_am`)?.value   || '',
                        start:        amT.start,
                        end:          amT.end,
                        desc:         document.getElementById(`desc_${i}_am`)?.value     || '',
                        location:     document.getElementById(`location_${i}_am`)?.value || '',
                        extraClients: [],
                    },
                    pm: {
                        client:       document.getElementById(`client_${i}_pm`)?.value   || '',
                        start:        pmT.start,
                        end:          pmT.end,
                        desc:         document.getElementById(`desc_${i}_pm`)?.value     || '',
                        location:     document.getElementById(`location_${i}_pm`)?.value || '',
                        extraClients: [],
                    },
                    km:       [],
                    meal:     document.getElementById(`meal_${i}`)?.checked || false,
                    expenses: [],
                };

                // Clients supplémentaires
                ['am', 'pm'].forEach(period => {
                    const card = document.querySelectorAll('.day-card')[i];
                    if (!card) return;
                    const sections = card.querySelectorAll('.period-section');
                    const section  = period === 'am' ? sections[0] : sections[1];
                    if (!section) return;
                    section.querySelectorAll('.client-entry').forEach(entry => {
                        const id = entry.dataset.entryId;
                        if (!id) return;
                        day[period].extraClients.push({
                            id,
                            client:   document.getElementById(`client_${i}_${period}_${id}`)?.value   || '',
                            start:    document.getElementById(`start_${i}_${period}_${id}`)?.value    || '',
                            end:      document.getElementById(`end_${i}_${period}_${id}`)?.value      || '',
                            desc:     document.getElementById(`desc_${i}_${period}_${id}`)?.value     || '',
                            location: document.getElementById(`location_${i}_${period}_${id}`)?.value || '',
                        });
                    });
                });

                // Kilométrage
                document.getElementById(`km_${i}`)?.querySelectorAll('.expense-item').forEach(item => {
                    const desc   = item.querySelector('input[type="text"]')?.value   || '';
                    const amount = item.querySelector('input[type="number"]')?.value || '';
                    if (desc || amount) day.km.push({ desc, amount });
                });

                // Frais
                document.getElementById(`expenses_${i}`)?.querySelectorAll('.expense-item').forEach(item => {
                    const desc   = item.querySelector('input[type="text"]')?.value   || '';
                    const amount = item.querySelector('input[type="number"]')?.value || '';
                    if (desc || amount) day.expenses.push({ desc, amount });
                });

                data.days.push(day);
            }

            localStorage.setItem(weekKey(), JSON.stringify(data));

            // Infos globales
            const globals = ['employeeName','notes','firstName','lastName','address',
                             'city','postalCode','country','phone','personalEmail'];
            globals.forEach(id => {
                const val = document.getElementById(id)?.value || '';
                localStorage.setItem(id, val);
            });

        } catch(e) {
            // localStorage plein ou bloqué — IDB prend le relais silencieusement
        }

        // Backup asynchrone silencieux ~100ms plus tard
        setTimeout(() => IDB.save(), 100);
    }

    // Debounced : ne sauvegarde que 600ms après la dernière frappe
    const debouncedSave = debounce(saveWeek, 600);

    // ── Charger la semaine dans le DOM ────────────────────────────
    function loadWeek() {
        const saved = localStorage.getItem(weekKey());
        if (saved) {
            const data = JSON.parse(saved);

            for (let i = 0; i < 7; i++) {
                const day = data.days?.[i] || {};
                const set = (id, val) => {
                    const el = document.getElementById(id);
                    if (el) el.value = val || '';
                };

                ['am', 'pm'].forEach(period => {
                    const p = day[period] || {};
                    set(`client_${i}_${period}`,   p.client);
                    set(`start_${i}_${period}`,    p.start);
                    set(`end_${i}_${period}`,      p.end);
                    set(`desc_${i}_${period}`,     p.desc);
                    set(`location_${i}_${period}`, p.location);

                    // Clients supplémentaires
                    (p.extraClients || []).forEach(ec => addClientEntry(i, period, ec));
                });

                // Repas
                const mealEl = document.getElementById(`meal_${i}`);
                if (mealEl) mealEl.checked = day.meal || false;

                // KM
                if (day.km?.length > 0) {
                    const container = document.getElementById(`km_${i}`);
                    if (container) {
                        container.innerHTML = '';
                        day.km.forEach(km => {
                            const div = document.createElement('div');
                            div.className = 'expense-item';
                            div.innerHTML = _expenseRowHTML(km.desc, km.amount, 'km');
                            container.appendChild(div);
                        });
                    }
                }

                // Frais
                if (day.expenses?.length > 0) {
                    const container = document.getElementById(`expenses_${i}`);
                    if (container) {
                        container.innerHTML = '';
                        day.expenses.forEach(exp => {
                            const div = document.createElement('div');
                            div.className = 'expense-item';
                            div.innerHTML = _expenseRowHTML(exp.desc, exp.amount, 'expense');
                            container.appendChild(div);
                        });
                    }
                }

                calculateDayHours(i);
            }

            // Ouvrir les cartes qui ont des données
            document.querySelectorAll('.day-card').forEach((card, i) => {
                const day = (data.days || [])[i] || {};
                const hasData = ['am','pm'].some(p => {
                    const pd = day[p] || {};
                    return pd.client || pd.start || pd.end || pd.desc || (pd.extraClients || []).length > 0;
                }) || (day.km || []).length > 0
                  || (day.expenses || []).length > 0
                  || day.meal;
                if (hasData) card.classList.add('expanded');
            });
        }

        // Infos globales
        const globals = ['employeeName','notes','firstName','lastName','address',
                         'city','postalCode','country','phone','personalEmail'];
        globals.forEach(id => {
            const val = localStorage.getItem(id);
            const el  = document.getElementById(id);
            if (val && el) el.value = val;
        });
    }

    // ── Effacer la semaine ────────────────────────────────────────
    // Utilise un toast au lieu de confirm() (compatibilité APK)
    function clearWeek() {
        // Modal de confirmation interne (pas de confirm())
        _confirmToast('Effacer cette semaine ?', () => {
            localStorage.removeItem(weekKey());
            renderWeek();
        });
    }

    // ── Export / Import JSON (sauvegarde complète) ────────────────
    function exportBackup() {
        try {
            const allData = {};
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                allData[k] = localStorage.getItem(k);
            }
            const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `mesheures_sauvegarde_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ Sauvegarde exportée');
        } catch(e) {
            showToast('⚠️ Erreur lors de la sauvegarde');
        }
    }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                showToast('✓ Données restaurées — rechargement...');
                setTimeout(() => location.reload(), 1200);
            } catch(err) {
                showToast('⚠️ Fichier invalide');
            }
        };
        reader.readAsText(file);
    }

    // ── Helpers privés ────────────────────────────────────────────
    function _expenseRowHTML(desc, amount, type) {
        const isKm = type === 'km';
        return `
            <input type="text" value="${desc || ''}"
                   placeholder="${isKm ? 'Description du trajet' : 'Description'}"
                   aria-label="${isKm ? 'Trajet' : 'Frais'}"
                   onchange="DataManager.debouncedSave();" />
            <input type="number" value="${amount || ''}"
                   placeholder="${isKm ? '0' : '0.00'}" step="${isKm ? '1' : '0.05'}"
                   aria-label="${isKm ? 'Kilomètres' : 'Montant'}"
                   onchange="DataManager.debouncedSave(); calculateTotals();" />
            <button class="remove-expense-btn" aria-label="Supprimer" data-action="remove-item">×</button>
        `;
    }

    // ── Toast de confirmation (remplace confirm()) ────────────────
    // Affiche un mini-panel avec Confirmer / Annuler
    function _confirmToast(message, onConfirm) {
        // Créer un overlay léger
        const existing = document.getElementById('_confirmPanel');
        if (existing) existing.remove();

        const panel = document.createElement('div');
        panel.id = '_confirmPanel';
        panel.style.cssText = `
            position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:14px;padding:16px 20px;z-index:9000;
            box-shadow:0 8px 32px rgba(0,0,0,0.25);text-align:center;
            font-family:'Poppins',sans-serif;min-width:240px;
        `;
        panel.innerHTML = `
            <div style="font-size:0.875rem;color:var(--text-primary);margin-bottom:14px;">${message}</div>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button id="_confirmNo"  style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text-secondary);font-family:'Poppins',sans-serif;cursor:pointer;font-size:0.875rem;">Annuler</button>
                <button id="_confirmYes" style="flex:1;padding:10px;border:none;border-radius:8px;background:#FD636B;color:white;font-family:'Poppins',sans-serif;cursor:pointer;font-size:0.875rem;font-weight:600;">Confirmer</button>
            </div>
        `;
        document.body.appendChild(panel);
        document.getElementById('_confirmYes').onclick = () => { panel.remove(); onConfirm(); };
        document.getElementById('_confirmNo').onclick  = () => panel.remove();
        // Fermer en cliquant à l'extérieur
        setTimeout(() => {
            document.addEventListener('click', function handler(e) {
                if (!panel.contains(e.target)) { panel.remove(); document.removeEventListener('click', handler); }
            });
        }, 50);
    }

    // ── API publique ──────────────────────────────────────────────
    return {
        saveWeek,
        debouncedSave,
        loadWeek,
        clearWeek,
        exportBackup,
        importBackup,
        idb: IDB,
        showToast, // réexposé pour compatibilité MesHeuresDB.showToast()
    };

})();

/* ════════════════════════════════════════════════════════════════
   § 4  AUTOCOMPLETE MANAGER
   Système unifié pour 3 types : client | desc | lieu
   Pour 'lieu' : fusion liste fixe COMMUNES + historique user
════════════════════════════════════════════════════════════════ */

const ACManager = (() => {

    // ── Clé localStorage pour un type ────────────────────────────
    function acKey(type) { return 'acHistory_' + type; }

    // ── Charger l'historique trié par fréquence ───────────────────
    function loadHistory(type) {
        try { return JSON.parse(localStorage.getItem(acKey(type)) || '[]'); }
        catch(e) { return []; }
    }

    // ── Enregistrer / incrementer une valeur ─────────────────────
    function record(type, value) {
        value = (value || '').trim();
        if (!value || value.length < 2) return;
        let list = loadHistory(type);
        const idx = list.findIndex(e => e.name.toLowerCase() === value.toLowerCase());
        if (idx >= 0) {
            list[idx].count++;
            list[idx].name = value;
        } else {
            list.push({ name: value, count: 1 });
        }
        list.sort((a, b) => b.count - a.count);
        list = list.slice(0, C.AC_MAX);
        localStorage.setItem(acKey(type), JSON.stringify(list));
    }

    // ── Construire la liste de suggestions ───────────────────────
    function buildSuggestions(type, val) {
        const history = loadHistory(type);
        val = (val || '').trim().toLowerCase();

        if (type === 'lieu') {
            const userMatches = history
                .filter(e => val === '' ? true : e.name.toLowerCase().includes(val))
                .map(e => ({ name: e.name, count: e.count, isBase: false }));
            const userNames = new Set(userMatches.map(e => e.name.toLowerCase()));
            const baseMatches = C.COMMUNES
                .filter(c => (val === '' ? true : c.toLowerCase().startsWith(val))
                              && !userNames.has(c.toLowerCase()))
                .map(c => ({ name: c, count: 0, isBase: true }));
            return [...userMatches, ...baseMatches].slice(0, C.AC_SHOW);
        }

        return history
            .filter(e => val === '' ? true : e.name.toLowerCase().includes(val))
            .slice(0, C.AC_SHOW)
            .map(e => ({ name: e.name, count: e.count, isBase: false }));
    }

    // ── Trouver le dropdown .ac-suggestions du bon wrapper ────────
    function getDropdown(input) {
        return input.closest('.ac-wrapper')?.querySelector('.ac-suggestions')
            || input.closest('.client-input-wrapper')?.querySelector('.client-suggestions')
            || input.closest('.lieu-wrapper')?.querySelector('.lieu-suggestions')
            || null;
    }

    // ── Afficher les suggestions ──────────────────────────────────
    function showDropdown(input, type) {
        const dropdown = getDropdown(input);
        if (!dropdown) return;
        dropdown.innerHTML = '';
        const suggestions = buildSuggestions(type, input.value);
        if (suggestions.length === 0) { dropdown.classList.remove('visible'); return; }

        suggestions.forEach(({ name, isBase }) => {
            const item    = document.createElement('div');
            item.className = 'ac-item' + (isBase ? ' ac-base' : ' ac-user');

            const delHTML = !isBase ? `<span class="ac-item-del" title="Retirer">×</span>` : '';
            item.innerHTML = `<span class="ac-item-name">${name}</span>${delHTML}`;

            // Clic sur le nom → sélectionner
            const nameEl = item.querySelector('.ac-item-name');
            const select = e => {
                e.preventDefault();
                input.value = name;
                dropdown.classList.remove('visible');
                if (!isBase) record(type, name);
                input.dispatchEvent(new Event('change'));
            };
            nameEl.addEventListener('mousedown', select);
            nameEl.addEventListener('touchstart', e => { e.preventDefault(); select(e); }, { passive: false });

            // Clic sur × → supprimer de l'historique
            const delEl = item.querySelector('.ac-item-del');
            if (delEl) {
                const del = e => {
                    e.preventDefault();
                    e.stopPropagation();
                    const list = loadHistory(type).filter(en => en.name !== name);
                    localStorage.setItem(acKey(type), JSON.stringify(list));
                    showDropdown(input, type);
                };
                delEl.addEventListener('mousedown', del);
                delEl.addEventListener('touchstart', e => { e.preventDefault(); del(e); }, { passive: false });
            }
            dropdown.appendChild(item);
        });
        dropdown.classList.add('visible');
    }

    // ── Masquer le dropdown (délai pour laisser le clic s'effectuer)
    function hideDropdown(input) {
        setTimeout(() => {
            const dropdown = getDropdown(input);
            if (dropdown) dropdown.classList.remove('visible');
        }, 180);
    }

    // ── Modal de gestion de liste ─────────────────────────────────
    function openModal(type) {
        state.acModalType = type || 'client';
        const labels = C.AC_MODAL_LABELS[state.acModalType] || C.AC_MODAL_LABELS.client;
        const sheet  = document.getElementById('acModalSheet');
        if (!sheet) return;

        const items = loadHistory(state.acModalType);

        sheet.innerHTML = `
            <div class="ac-modal-header">
                <div>
                    <div class="ac-modal-title">${labels.title}</div>
                    <div class="ac-modal-subtitle">${labels.subtitle}</div>
                </div>
                <button class="ac-modal-close clients-modal-close" aria-label="Fermer">×</button>
            </div>
            <div id="acModalList">
                ${items.length === 0
                    ? '<div class="ac-modal-empty">Aucune entrée enregistrée.</div>'
                    : items.map(({ name, count }) => `
                        <div class="ac-modal-item">
                            <span class="ac-modal-item-name">${name}</span>
                            <span class="ac-modal-item-count">${count} fois</span>
                            <button class="ac-modal-del clients-modal-del"
                                    data-delete-ac="${name.replace(/'/g, "\\'")}"
                                    aria-label="Supprimer ${name}">×</button>
                        </div>
                    `).join('')
                }
            </div>
        `;
        document.getElementById('acModalOverlay').classList.add('open');
    }

    function deleteFromModal(name) {
        const list = loadHistory(state.acModalType).filter(e => e.name !== name);
        localStorage.setItem(acKey(state.acModalType), JSON.stringify(list));
        openModal(state.acModalType); // rafraîchir la modal
    }

    function closeModal() {
        document.getElementById('acModalOverlay').classList.remove('open');
    }

    // ── Alias compatibilité v1 ────────────────────────────────────
    return {
        loadHistory, record, buildSuggestions,
        showDropdown, hideDropdown,
        openModal, deleteFromModal, closeModal,
        // Compatibilité inline handlers de renderWeek
        show:   showDropdown,
        hide:   hideDropdown,
    };
})();

// Migration : si l'ancien format 'clientHistory' existe → le copier sous le nouveau nom
(function migrateClientHistory() {
    const old = localStorage.getItem('clientHistory');
    if (!old) return;
    try {
        const parsed = JSON.parse(old);
        if (Array.isArray(parsed) && parsed.length > 0 && !localStorage.getItem('acHistory_client')) {
            localStorage.setItem('acHistory_client', old);
        }
    } catch(e) {}
})();

// ── Changer de semaine ────────────────────────────────────────────
// ── Changer de semaine ────────────────────────────────────────────
function changeWeek(delta) {
    // Vue compacte : replier toutes les cartes avant de rendre la nouvelle semaine.
    // L'utilisateur arrive toujours sur une vue propre, sans données résiduelles ouvertes.
    document.querySelectorAll('.day-card.expanded').forEach(card => {
        card.classList.remove('expanded');
        const title = card.querySelector('.day-title');
        if (title) title.setAttribute('aria-expanded', 'false');
    });

    state.currentWeekStart.setDate(state.currentWeekStart.getDate() + delta * 7);
    renderWeek();
}

// ── Raccourcis jours (L M M J V S D) ─────────────────────────────
function renderDayShortcuts() {
    const container = document.getElementById('dayShortcuts');
    if (!container) return;
    container.innerHTML = '';
    const today = new Date();

    for (let i = 0; i < 7; i++) {
        const date = new Date(state.currentWeekStart);
        date.setDate(date.getDate() + i);
        const isToday = date.toDateString() === today.toDateString();

        const btn = document.createElement('button');
        btn.className = 'day-shortcut' + (isToday ? ' sc-today' : '');
        btn.dataset.dayIndex = i;
        btn.setAttribute('aria-label', `${C.DAYS_FR[date.getDay()]} ${formatDate(date)}`);
        btn.innerHTML = `
            <span class="sc-label">${C.DAY_LABELS[i]}</span>
            <span class="sc-num">${date.getDate()}</span>
        `;
        // Clic : déplier la carte + scroll + flash
        btn.addEventListener('click', () => {
            const cards = document.querySelectorAll('.day-card');
            if (!cards[i]) return;
            if (!cards[i].classList.contains('expanded')) {
                cards[i].classList.add('expanded');
            }
            cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
            // Flash bref de surbrillance
            cards[i].style.transition = 'box-shadow 0.2s';
            cards[i].style.boxShadow  = '0 0 0 2px #FD636B';
            setTimeout(() => { cards[i].style.boxShadow = ''; }, 800);
        });
        container.appendChild(btn);
    }
}
