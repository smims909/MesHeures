/* ════════════════════════════════════════════════════════════════
   § 1  RESET & VARIABLES CSS
   Palette complète, overridée sous html.dark-mode
   Utiliser var(--xxx) partout, jamais de couleur hardcodée
════════════════════════════════════════════════════════════════ */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html { scroll-behavior: smooth; }

/* ── Mode clair (défaut) ── */
:root {
    /* Fonds — 4 niveaux de profondeur */
    --bg-app:      #E8E8ED;          /* fond général de la page */
    --bg-card:     #FFFFFF;          /* cartes, blocs, modals */
    --bg-input:    #F8F8F8;          /* champs de saisie */
    --bg-header:   #FFFFFF;          /* header + nav semaine */
    --bg-section:  #FAFAFA;          /* titres de section (bandeaux) */
    --bg-footer:   rgba(255,255,255,0.97);

    /* Texte — 4 niveaux */
    --text-primary:     #000000;     /* texte principal */
    --text-secondary:   #666666;     /* texte secondaire (dates, labels) */
    --text-muted:       #8E8E93;     /* texte discret */
    --text-placeholder: #C7C7CC;     /* placeholders */

    /* Bordures */
    --border:     #E5E5E5;

    /* Accent — identique clair/sombre */
    --accent:     #FD636B;

    /* Ombres */
    --shadow-sm:  rgba(0,0,0,0.05);
    --shadow-md:  rgba(0,0,0,0.08);

    /* Couleur spéciale titre entreprise */
    --title-color: #2C2C48;
}

/* ── Mode sombre — palette à 4 niveaux inspirée Material Design 3 ── */
html.dark-mode {
    --bg-app:      #1C1C22;          /* gris bleuté profond */
    --bg-card:     #26262D;
    --bg-input:    #32323A;
    --bg-header:   #222229;
    --bg-section:  #2A2A32;
    --bg-footer:   rgba(28,28,34,0.98);

    --text-primary:     #E8E8EE;
    --text-secondary:   #9A9AA6;
    --text-muted:       #65656F;
    --text-placeholder: #505058;

    --border:     #3A3A44;
    --accent:     #FD636B;
    --shadow-sm:  rgba(0,0,0,0.2);
    --shadow-md:  rgba(0,0,0,0.3);
    --title-color: #E4E4E8;
}

/* ── Corps ── Anti-FOUC : body invisible jusqu'à JS body.classList.add('ready') */
body {
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;               /* 16px — rem pour adaptabilité APK */
    color: var(--text-primary);
    background: var(--bg-app);
    padding-bottom: 200px;         /* espace pour le footer fixe */
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.15s ease;
}
body.ready {
    visibility: visible;
    opacity: 1;
}


/* ════════════════════════════════════════════════════════════════
   § 3  LAYOUT GLOBAL
   Header sticky, navigation semaine, raccourcis jours
════════════════════════════════════════════════════════════════ */

/* ── Header ─────────────────────────────────────────────────── */
.header {
    /* ── Header solidarisé ──────────────────────────────────────────
       Position dans le flux normal : le header remonte naturellement
       avec la page lors du scroll, sans JS, sans calcul d'offset.
       Le darkToggle (position:absolute) reste dans ce contexte de pile.
    ──────────────────────────────────────────────────────────────── */
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 16px 20px;
    box-shadow: 0 2px 8px var(--shadow-sm);
    position: relative;   /* flux normal — remonte avec la page */
    z-index: 10;          /* au-dessus des cartes uniquement lors d'un éventuel overlap */
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Wrapper pour le champ "Entreprise" + curseur animé */
.logo-container {
    position: relative;
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
}

/* Champ titre entreprise (grand, bold, transparent) */
#companyName {
    font-family: 'Poppins', sans-serif;
    font-size: 2.25rem;            /* 36px */
    font-weight: 800;
    letter-spacing: 1px;
    text-align: center;
    background: transparent;
    border: none;
    padding: 4px 0;
    width: 100%;
    outline: none;
    color: var(--title-color);
}
#companyName::placeholder { color: var(--text-placeholder); opacity: 1; }



/* Inputs du header (employeeName) */
.header input:not(#companyName) {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9375rem;          /* 15px */
    font-family: 'Poppins', sans-serif;
    margin-bottom: 10px;
}
.header input::placeholder { color: var(--text-muted); }
.header input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-card);
}

/* ── Bouton dark mode — disque SVG lune/soleil ─────────────── */
/* position:absolute dans le header sticky → jamais superposé aux cartes */
#darkToggle {
    position: absolute;
    top: 20px;                     /* espace de respiration dans le coin — était 12px */
    right: 20px;                   /* espace de respiration dans le coin — était 12px */
    width: 30px;
    height: 30px;
    /* Zone tactile étendue ≥ 44×44px via padding compensé par margin négatif.
       Le margin négatif n'affecte pas top/right : ceux-ci positionnent le bord
       du box-model (sans margin), donc la sphère visible est bien à 20px du bord. */
    padding: 7px;
    margin: -7px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-card);
    cursor: pointer;
    z-index: 160;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px var(--shadow-sm);
    transition: background 0.2s, border-color 0.2s;
}
#darkToggle svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
}

/* ── Navigation semaine ─────────────────────────────────────── */
.week-nav {
    background: var(--bg-card);
    padding: 14px 20px 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.week-nav button {
    background: transparent;
    color: var(--accent);
    border: none;
    padding: 8px 16px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    /* Zone tactile ≥ 44px */
    min-width: 44px;
    min-height: 44px;
}
.week-nav button:active { opacity: 0.5; }

.week-date {
    font-weight: 500;
    font-size: 1.0625rem;          /* 17px */
    color: var(--text-primary);
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
}

/* ── Raccourcis jours (L M M J V S D) ──────────────────────── */
.day-shortcuts {
    background: var(--bg-card);
    padding: 8px 12px 14px 12px;
    display: flex;
    justify-content: space-between;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    box-shadow: 0 2px 8px var(--shadow-sm);
}
.day-shortcut {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: 'Poppins', sans-serif;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;              /* zone tactile */
}
.day-shortcut:active { background: var(--bg-input); }
.day-shortcut .sc-label {
    font-size: 0.6875rem;          /* 11px */
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.day-shortcut .sc-num {
    font-size: 0.875rem;           /* 14px */
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 1px;
}
.day-shortcut.sc-today .sc-num { color: var(--accent); font-weight: 700; }
.day-shortcut.sc-has-data::after {
    content: '';
    display: block;
    width: 3px; height: 3px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.7;
    margin-top: 2px;
}
.day-shortcut.sc-today.sc-has-data::after { opacity: 1; }


/* ════════════════════════════════════════════════════════════════
   § 4  CARTES JOUR & PÉRIODES
   .day-card → .day-title (bandeau) + .day-body (repliable)
════════════════════════════════════════════════════════════════ */

/* ── Carte jour ─────────────────────────────────────────────── */
.day-card {
    background: var(--bg-card);
    margin: 0 12px 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px var(--shadow-md);
    overflow: hidden;
    position: relative;
    z-index: 1;
}
.day-card.expanded {
    overflow: visible;
    z-index: 50;
}

/* ── Bandeau titre jour — CSS GRID (3 colonnes : nom | date | +)
   1fr  = "Dimanche" prend son quart de gauche, élastique
   auto = la date occupe exactement sa propre largeur, AU CENTRE de la grille
   1fr  = le + prend son quart de droite, élastique
   → la colonne centrale (date) est toujours à l'axe mathématique du bandeau,
     peu importe la longueur du nom du jour ("L" vs "Dimanche"). ── */
.day-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;  /* ← true-center : colonnes symétriques */
    align-items: center;
    gap: 0 8px;
    padding: 14px 16px;
    background: var(--bg-section);
    cursor: pointer;
    border-bottom: none;
    user-select: none;
    -webkit-user-select: none;
    min-height: 52px;
}
/* Bordure visible uniquement quand la carte est ouverte */
.day-card.expanded .day-title {
    border-bottom: 1px solid var(--border);
}

.day-name {
    font-size: 1.125rem;           /* 18px */
    font-weight: 600;
    color: var(--accent);
    font-family: 'Poppins', sans-serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    justify-self: start;           /* ancré à gauche dans sa colonne 1fr */
}
.day-date {
    font-size: 0.8125rem;          /* 13px */
    color: var(--text-secondary);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    /* Pas de min-width: 0 ici — la colonne auto laisse la date prendre sa vraie largeur */
}
.day-toggle {
    color: var(--accent);
    font-size: 1.25rem;            /* 20px */
    font-weight: 300;
    line-height: 1;
    transition: transform 0.25s ease;
    user-select: none;
    justify-self: end;             /* ancré à droite dans sa colonne 1fr */
    /* Centrage vertical garanti même si font-size varie */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
}
.day-card.expanded .day-toggle { transform: rotate(45deg); }

/* ── Indicateur visuel : journée avec des heures saisies ─────── */
.day-card.has-data .day-date {
    text-decoration: underline;
    text-underline-offset: 3px;
}

/* ── Corps repliable ─────────────────────────────────────────── */
.day-card .day-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
}
.day-card.expanded .day-body {
    max-height: 3000px;
    overflow: visible;
    transition: max-height 0.45s ease;
}

/* ── Période (Matin / Après-midi) ───────────────────────────── */
.period-group {
    /* Conteneur AM ou PM — pas de style propre, hérité des period-section enfants */
}
.period-section {
    background: var(--bg-card);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    overflow: visible;
    box-sizing: border-box;
    width: 100%;
}
.period-section:last-of-type { border-bottom: none; }

.period-header {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.entry-delete-btn {
    background: none;
    border: none;
    font-size: 1rem;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    margin-left: auto;
    transition: color .15s;
    -webkit-appearance: none;
}
.entry-delete-btn:hover { color: var(--accent); }
.day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

/* ── Erreurs de validation horaire ─────────────────────────── */
.time-error-slot { overflow: hidden; }
.time-error {
    font-size: 0.75rem;            /* 12px */
    color: #D0323A;
    font-weight: 500;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    padding: 6px 8px;
    margin: 4px 0 2px 0;
    display: none;
    opacity: 0;
    transition: opacity 0.2s ease;
}
.time-error.visible { display: block; opacity: 1; }

/* ── Lignes client / description / lieu ────────────────────── */
.client-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    align-items: center;
}
.client-row input[type="text"] { flex: 1; margin-bottom: 0; }

.desc-row, .location-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    align-items: center;
}
.desc-row input, .location-row input { flex: 1; margin-bottom: 0; height: 44px; }

/* ── Entrée client (multi-clients par période) ──────────────── */
.client-entry {
    padding: 12px 0;
    border-top: 1px solid #F5F5F5;
}
.client-entry .hours-display {
    margin-top: 8px;
    background: linear-gradient(135deg, #3AE8B0 0%, #19AFD0 100%);
}

/* ── Affichage heures (dégradé jaune) ───────────────────────── */
.hours-display {
    background: linear-gradient(135deg, #FFB900 0%, #e0a500 100%);
    color: white;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 8px;
    box-shadow: 0 3px 10px rgba(255,185,0,0.3);
}

/* ── Total semaine ──────────────────────────────────────────── */
.weekly-total {
    background: var(--bg-card);
    margin: 12px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.weekly-total h3 {
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-bottom: 8px;
}
.weekly-total .total {
    font-size: 2rem;               /* 32px */
    font-weight: 500;
    color: var(--accent);
}

/* ── Frais ──────────────────────────────────────────────────── */
.expenses-section {
    background: var(--bg-card);
    padding: 8px 16px;
    border-top: 1.5px solid var(--border);
}
.expenses-header {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 36px;
    padding: 4px 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
.section-toggle-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1.4rem;
    font-weight: 300;
    line-height: 1;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    transition: transform 0.2s;
}
.expenses-section.section-collapsed .section-toggle-btn { transform: rotate(-45deg); }
.expenses-section.section-collapsed .section-body { display: none; }
.section-body { padding-bottom: 4px; }
/* Bouton "Ajouter" pointillé dans section */
/* Bouton "Ajouter client" — centré, largeur réduite pour alléger l'interface */
.add-entry-am,
.add-entry-pm {
    width: auto;
    align-self: center;
    margin: 6px auto;
    padding: 8px 20px;
    display: flex;
}
.add-entry-pm {
    border-top: none;
    border-radius: 8px;
    border-left: 1px dashed var(--border);
    border-right: 1px dashed var(--border);
}
.add-item-btn {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1;
    -webkit-appearance: none;
    appearance: none;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.add-item-btn span { color: var(--accent); font-size: 1.125rem; font-weight: 400; }
.add-item-btn:active { background: var(--bg-input); border-color: var(--accent); }
/* Bouton × sur chaque item (long press = supprimer) */
.item-delete-btn {
    background: none;
    border: none;
    color: var(--text-placeholder);
    font-size: 1.1rem;
    font-weight: 400;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
}
.item-delete-btn:active { color: var(--accent); }

.expense-item {
    display: grid;
    grid-template-columns: 2fr 1fr auto;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 4px;
    align-items: center;
}
.expense-item.expense-with-client {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-top: 0;
    margin-bottom: 0;
    padding: 10px 0 10px;
    border-top: 1px solid var(--border);
}
.expense-item.expense-with-client .expense-row1,
.expense-item.expense-with-client .expense-row2,
.expense-item.expense-with-client .meal-checkbox { width: 100%; }
.expense-item.expense-with-client:first-child {
    border-top: none;
    padding-top: 0;
}
.expense-item.expense-with-client .expense-row1 {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
}
.expense-item.expense-with-client .expense-row2 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 8px;
    align-items: center;
}
.expense-item.expense-with-client .expense-row1 {
    grid-template-columns: 1fr auto;
}
.expense-item.hidden { display: none; }
.expense-item input { margin-bottom: 0; padding: 10px 12px; height: 40px; }
.expense-item input[type="number"] { text-align: right; }
.expense-item .expense-client-input {
    color: var(--text-secondary);
    border-color: var(--border);
    background: var(--bg-input);
}


/* ── Frais (3e section jour, repliable) ─────────────────── */
.frais-section {
    background: var(--bg-section);
    border-top: 1.5px solid var(--border);
    overflow: visible;
}
.frais-header {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
.frais-toggle-icon {
    font-size: 1.25rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
}
.frais-section.expanded .frais-toggle-icon { transform: rotate(45deg); }
.frais-body {
    display: none;
    padding: 0 16px 12px;
}
.frais-section.expanded .frais-body { display: block; }

/* ── Sous-section (Véhicule / Fournitures / Divers) ─────── */
.depense-sub {
    padding: 10px 0 6px;
    border-top: 1px solid var(--border);
}
.depense-sub:first-child { border-top: none; padding-top: 4px; }
.depense-sub-header {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}

/* ── Ligne de dépense (véhicule / fournitures / divers) ──── */
.depense-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 0 4px;
    border-top: 1px solid #f0f0f0;
}
.depense-item:first-child { border-top: none; padding-top: 0; }
.depense-row1 {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    width: 100%;
}
.depense-row2 {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
}
.depense-row2 input[type="text"] { flex: 1; min-width: 0; margin-bottom: 0; height: 40px; }
.depense-row2 input[type="number"] { width: 72px; flex-shrink: 0; margin-bottom: 0; height: 40px; text-align: right; }
.depense-item .item-delete-btn { flex-shrink: 0; }
.depense-item input { margin-bottom: 0; padding: 10px 12px; height: 40px; }

/* legacy — garde compat pour items frais existants */
.expense-item.item-collapsed .expense-row2 { display: none; }
.km-row-main { display: flex; gap: 8px; align-items: center; }
.km-row-main input[type="text"] { flex: 1; min-width: 0; }
.km-row-main input[type="number"] { width: 72px; flex-shrink: 0; }

/* ── Repas ──────────────────────────────────────────────────── */
.meal-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-input);
    border-radius: 10px;
    margin-bottom: 0;
    min-height: 44px;
}
.meal-checkbox input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg-input);
    border: 2px solid var(--text-muted);
    border-radius: 5px;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
}
.meal-checkbox input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
}
.meal-checkbox input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
}
.meal-checkbox label {
    flex: 1;
    font-size: 0.875rem;
    cursor: pointer;
    line-height: 1;
}


/* ════════════════════════════════════════════════════════════════
   § 5  FORMULAIRES & INPUTS
   Styles unifiés pour tous les champs de saisie
════════════════════════════════════════════════════════════════ */

/* ── Inputs texte / number / textarea / select ── */
input[type="text"],
input[type="number"],
textarea,
select {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;          /* 15px */
    margin-bottom: 12px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'Poppins', sans-serif;
}
input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-card);
    caret-color: var(--accent);
}

/* ── Neutraliser le fond bleu/jaune de l'autofill navigateur ─── */
/* Le navigateur impose ce style via :-webkit-autofill et ne permet
   pas de le supprimer directement. L'astuce : une box-shadow interne
   couvre le fond injecté, quelle que soit sa couleur.
   On utilise --bg-card (blanc en clair, sombre en dark) pour couvrir
   tous les contextes (header, cartes, section infos).
   La transition infinie empêche le fond bleu de jamais réapparaître. */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active,
textarea:-webkit-autofill,
textarea:-webkit-autofill:hover,
textarea:-webkit-autofill:focus,
textarea:-webkit-autofill:active,
select:-webkit-autofill,
select:-webkit-autofill:hover,
select:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 9999px var(--bg-input) inset !important;
    box-shadow:         0 0 0 9999px var(--bg-input) inset !important;
    -webkit-text-fill-color: var(--text-primary) !important;
    transition: background-color 99999s ease-in-out 0s,
                color            99999s ease-in-out 0s;
    caret-color: var(--accent);
}

/* ── Champ horaire (time picker personnalisé) ─────────────── */
/* readonly car ouvert via notre picker, pas le natif */
input[data-timepicker] {
    accent-color: var(--accent);
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--bg-input);
    color: var(--text-primary);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    caret-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Poppins', sans-serif;
    margin-bottom: 0;
}
input[data-timepicker]:focus { border-color: var(--accent); background: var(--bg-card); }
input[data-timepicker].invalid {
    border-color: rgba(208,50,58,0.75) !important;
    background: transparent !important;
}

/* ── Labels de groupe horaire ───────────────────────────────── */
.time-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
    width: 100%;
    box-sizing: border-box;
}
.time-group label {
    font-size: 0.75rem;            /* 12px */
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
}


.add-client-btn {
    width: 28px;
    height: 28px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    flex-shrink: 0;
}
.add-client-btn:active { color: var(--accent); }
.client-entry.item-collapsed .client-detail { display: none; }

/* Bouton "+ Ajouter un client" discret (tirets) */
.add-client-line-btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    margin-bottom: 4px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1;
    -webkit-appearance: none;
    appearance: none;
    font-family: 'Poppins', sans-serif;
    min-height: 44px;
}
.add-client-line-btn span { color: var(--accent); font-size: 1.125rem; font-weight: 400; }
.add-client-line-btn:active { background: var(--bg-input); border-color: var(--accent); }


/* ── Section infos (notes, données perso) ───────────────────── */
.info-section {
    background: var(--bg-card);
    margin: 12px;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.info-section > label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
}
.info-section textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-input);
    color: var(--text-primary);
    resize: vertical;
    margin-bottom: 0;
}
.info-section textarea:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }

/* ── Pause (ligne dans la carte jour) ──────────────────────── */
.pause-day-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-top: 1px solid var(--border);
}
.pause-day-label {
    font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0;
}
.pause-day-row input.pause-day-mins {
    width: 44px !important; padding: 4px 6px !important;
    margin-bottom: 0 !important; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-input); color: var(--text-primary);
    font-size: 0.8rem; text-align: center; box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
.pause-day-row input.pause-day-mins:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }
.pause-day-unit { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }
.pause-day-row input.pause-day-client {
    flex: 1; min-width: 0; padding: 4px 8px !important;
    margin-bottom: 0 !important;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-input); color: var(--text-primary);
    font-size: 0.8rem; box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
.pause-day-row input.pause-day-client:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }
.pause-day-row input.pause-day-client::placeholder { color: var(--text-muted); opacity:.5; }
.pause-day-active {
    width: 16px !important; height: 16px !important;
    margin: 0 0 0 4px !important; padding: 0 !important;
    flex-shrink: 0; cursor: pointer;
    accent-color: var(--accent);
    appearance: auto !important; -webkit-appearance: checkbox !important;
}

.info-section input[type="email"],
.info-section input[type="text"],
.info-section input[type="tel"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    background: var(--bg-input);
    height: 44px;
    box-sizing: border-box;
    margin-bottom: 0;
}
.info-section input:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }

/* Grille 2 colonnes pour les infos personnelles */
.personal-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.personal-info-grid--full { grid-column: 1 / -1; }


/* ════════════════════════════════════════════════════════════════
   § 6  AUTOCOMPLETE
   Système unifié : clients, descriptions, lieux
   + Modal de gestion de liste
════════════════════════════════════════════════════════════════ */

/* ── Wrapper relatif (position de la dropdown) ── */
.ac-wrapper {
    position: relative;
    flex: 1;
    min-width: 0;
}
.ac-wrapper input { width: 100%; margin-bottom: 0; }


/* ── Dropdown suggestions ── */
.ac-suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 210;
    overflow: hidden;
    max-height: 220px;
    overflow-y: auto;
}
.ac-suggestions.visible { display: block; }


/* ── Item de suggestion ── */
.ac-item {
    padding: 11px 14px 11px 16px;
    font-size: 0.9375rem;
    font-family: 'Poppins', sans-serif;
    color: #222;
    cursor: pointer;
    border-bottom: 1px solid #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active { background: #FFF5F5; }

.ac-item-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.ac-item.ac-user .ac-item-name { font-weight: 600; }

/* Bouton × supprimer dans la dropdown */
.ac-item-del {
    color: var(--text-placeholder);
    font-size: 1.125rem;
    padding: 0 4px;
    flex-shrink: 0;
    line-height: 1;
    cursor: pointer;
}
.ac-item-del:active { color: var(--accent); }

/* Bouton ⚙ gestion de liste */
.ac-manage-btn {
    background: transparent;
    border: none;
    color: var(--text-placeholder);
    font-size: 1rem;
    padding: 0 4px;
    flex-shrink: 0;
    cursor: pointer;
    line-height: 1;
    -webkit-appearance: none;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ac-manage-btn:active { color: var(--accent); }

/* ── Modal gestion de liste AC (overlay bottom-sheet) ── */
#acModalOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 600;
    align-items: flex-end;
}
#acModalOverlay.open { display: flex; }

.ac-modal-sheet {
    background: var(--bg-card);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 44px;
    max-height: 65vh;
    overflow-y: auto;
}
.ac-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
}
.ac-modal-title   { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
.ac-modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 14px; }
.ac-modal-close {
    background: #F0F0F0;
    border: none;
    width: 30px; height: 30px;
    border-radius: 15px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
}
.ac-modal-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9375rem;
}
.ac-modal-item:last-child { border-bottom: none; }
.ac-modal-item-name  { flex: 1; }
.ac-modal-item-count { font-size: 0.75rem; color: var(--text-muted); margin-right: 12px; }
.ac-modal-del {
    background: transparent;
    border: none;
    color: var(--text-placeholder);
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
}
.ac-modal-del:active { color: var(--accent); }
.ac-modal-empty { color: var(--text-muted); font-size: 0.875rem; text-align: center; padding: 24px 0; }



/* ════════════════════════════════════════════════════════════════
   § 7  CALENDRIER MENSUEL
   Navigation, grille, indicateurs visuels
════════════════════════════════════════════════════════════════ */

.calendar-section {
    background: var(--bg-card);
    margin: 12px;
    padding: 14px;
    border-radius: 12px;
    box-shadow: 0 1px 3px var(--shadow-md);
}
.calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}
.calendar-header {
    font-size: 0.9375rem;
    font-weight: 500;
    font-family: 'Poppins', sans-serif;
    color: var(--text-primary);
    text-align: center;
    flex: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
.calendar-header:active { opacity: 0.6; }

.cal-nav-btn {
    background: none;
    border: none;
    font-size: 1.375rem;           /* 22px */
    color: var(--accent);
    cursor: pointer;
    padding: 0 10px;
    line-height: 1;
    font-weight: 300;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.cal-nav-btn:active { opacity: 0.5; }

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
}
.calendar-day-label {
    text-align: center;
    font-size: 0.625rem;           /* 10px */
    color: var(--text-muted);
    font-weight: 400;
    font-family: 'Poppins', sans-serif;
    padding: 4px 0;
}
.calendar-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 0.75rem;            /* 12px */
    font-weight: 500;
    color: var(--text-primary);
    position: relative;
    cursor: pointer;
    min-height: 36px;
}
.calendar-day.other-month { color: var(--text-placeholder); }
.calendar-day:active { opacity: 0.6; }

/* Indicateur aujourd'hui : point rouge en bas */
.calendar-day.today::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
}
/* Indicateur jour avec heures saisies : point violet */
.calendar-day.has-hours::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 3px; height: 3px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.7;
}
.calendar-day.today.has-hours::after { opacity: 1; }

/* ── Flash visuel lors d'un clic depuis le bandeau titre d'une carte ──
   Classe temporairement ajoutée par JS (_jumpCalendarToDate).
   Aucun inline style dans le JS — tout le design reste ici. ── */
.calendar-day.cal-flash {
    background: var(--accent) !important;
    color: #ffffff !important;
    border-radius: 50% !important;
    transition: background 0.25s ease, color 0.25s ease;
}

/* ── Sélecteur mois/année rapide (bottom sheet) ── */
.cal-picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 300;
    align-items: flex-end;
}
.cal-picker-overlay.visible { display: flex; }

.cal-picker-sheet {
    background: var(--bg-card);
    width: 100%;
    border-radius: 18px 18px 0 0;
    padding: 20px 16px 32px;
}
.cal-picker-title {
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.cal-picker-row { display: flex; gap: 8px; margin-bottom: 12px; }
.cal-picker-select {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--bg-input);
    font-family: 'Poppins', sans-serif;
    -webkit-appearance: none;
    text-align: center;
}
.cal-picker-select:focus { outline: none; border-color: #6967CE; background: var(--bg-card); }
.cal-picker-confirm {
    width: 100%;
    padding: 14px;
    background: #6967CE;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.9375rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'Poppins', sans-serif;
}
.cal-picker-confirm:active { opacity: 0.85; }
.cal-picker-cancel {
    width: 100%;
    padding: 12px;
    background: none;
    color: var(--text-muted);
    border: none;
    font-size: 0.875rem;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'Poppins', sans-serif;
}


/* ════════════════════════════════════════════════════════════════
   § 8  TIME PICKER — TAMBOUR À DÉFILEMENT
════════════════════════════════════════════════════════════════ */

.tp-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}
.tp-overlay.tp-open {
    opacity: 1;
    pointer-events: all;
}
.tp-sheet {
    background: var(--bg-card);
    width: 100%;
    max-width: 420px;
    border-radius: 20px 20px 0 0;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    overflow: hidden;
}
.tp-overlay.tp-open .tp-sheet {
    transform: translateY(0);
}
.tp-handle {
    width: 32px; height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
}
.tp-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px 4px;
}
.tp-btn-cancel, .tp-btn-ok {
    border: none;
    background: none;
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 4px;
    min-height: 44px;
    min-width: 44px;
    -webkit-tap-highlight-color: transparent;
}
.tp-btn-cancel { color: var(--text-muted); }
.tp-btn-ok     { color: var(--accent); }
.tp-btn-cancel:active { opacity: 0.5; }
.tp-btn-ok:active     { opacity: 0.7; }
.tp-title-center {
    font-family: 'Poppins', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* Drum wrapper */
.tp-drums {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    padding: 0 24px 16px;
    position: relative;
}
.tp-sep-colon {
    font-size: 1.75rem;
    font-weight: 300;
    color: var(--text-primary);
    padding: 0 6px;
    margin-bottom: 2px;
    pointer-events: none;
    user-select: none;
}
/* Bande de sélection centrale */
.tp-suggest-row {
    display: flex;
    gap: 6px;
    padding: 0 20px 10px;
    flex-wrap: wrap;
}
.tp-suggest-row:empty { display: none; }
.tp-suggest-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Poppins', sans-serif;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    min-height: 36px;
    display: flex;
    align-items: center;
}
.tp-suggest-chip:active { background: var(--accent); color: #fff; }

.tp-drums::before {
    content: '';
    position: absolute;
    top: 50%; left: 24px; right: 24px;
    transform: translateY(-50%);
    height: 44px;
    border-top: 1.5px solid var(--accent);
    border-bottom: 1.5px solid var(--accent);
    border-radius: 4px;
    pointer-events: none;
    opacity: 0.5;
}
.tp-drum {
    flex: 1;
    height: 220px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    /* Masque haut et bas */
    -webkit-mask-image: linear-gradient(to bottom,
        transparent 0%, black 30%, black 70%, transparent 100%);
    mask-image: linear-gradient(to bottom,
        transparent 0%, black 30%, black 70%, transparent 100%);
}
.tp-drum::-webkit-scrollbar { display: none; }

.tp-drum-item {
    scroll-snap-align: center;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s, font-weight 0.15s;
    user-select: none;
}
.tp-drum-item.tp-selected {
    color: var(--text-primary);
    font-weight: 500;
}
/* Padding haut/bas pour centrer le premier et dernier item */
.tp-drum-pad {
    height: 88px; /* 2 × 44px */
    flex-shrink: 0;
}

/* ════════════════════════════════════════════════════════════════
   § 9  FOOTER FIXE & TOTAUX SEMAINE
════════════════════════════════════════════════════════════════ */

.summary-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-footer);
    backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    padding: 6px 10px 10px;
    z-index: 100;
    box-shadow: 0 -2px 12px var(--shadow-sm);
    transition: transform 0.3s ease;
}
.summary-footer.hidden { transform: translateY(100%); }

.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 5px;
}
.summary-item {
    text-align: center;
    padding: 5px 3px;
    background: var(--bg-card);
    border-radius: 7px;
    border: 1px solid var(--border);
    line-height: 1.2;
}
.summary-item .label {
    font-size: 0.5rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 2px;
    text-transform: uppercase;
}
.summary-item .value {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
}
.action-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}
.action-btn {
    padding: 5px 4px;
    border: none;
    border-radius: 9px;
    font-size: 0.5625rem;
    font-weight: 600;
    cursor: pointer;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s ease, transform 0.1s ease;
    font-family: 'Poppins', sans-serif;
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    text-align: center;
}
.action-btn:active { transform: scale(0.96); opacity: 0.85; }
.btn-export        { background: #36D5A8; box-shadow: 0 2px 8px rgba(54,213,168,0.35); }
.btn-pdf           { background: #19AFD0; box-shadow: 0 2px 8px rgba(25,175,208,0.35); }
.btn-backup-export { background: #6967CE; box-shadow: 0 2px 8px rgba(105,103,206,0.35); }
.btn-backup-import { background: #FFB900; box-shadow: 0 2px 8px rgba(255,185,0,0.35); }
.btn-clear         { background: var(--accent); box-shadow: 0 2px 8px rgba(253,99,107,0.35); }


/* Validation horaire */
html.dark-mode .time-error                         { color: #FF6670; }
html.dark-mode input[data-timepicker].invalid      { border-color: rgba(255,102,112,0.7) !important; background: transparent !important; }

/* Weekly total */
html.dark-mode .weekly-total h3 { color: var(--text-muted); }

/* Footer */
html.dark-mode .summary-footer { background: var(--bg-footer); border-color: var(--border); box-shadow: 0 -2px 10px var(--shadow-md); }
html.dark-mode .summary-item   { background: var(--bg-section); border-color: var(--border); }
html.dark-mode .summary-item .label { color: var(--text-muted); }
html.dark-mode .summary-item .value { color: var(--text-primary); }

/* Calendrier */
html.dark-mode .calendar-section              { background: var(--bg-card); }
html.dark-mode .calendar-header               { color: var(--text-primary); }
html.dark-mode .calendar-day-label            { color: var(--text-muted); }
html.dark-mode .calendar-day                  { color: var(--text-secondary); }
html.dark-mode .calendar-day:hover            { background: var(--bg-input); }
html.dark-mode .calendar-day.other-month      { color: var(--border); }
html.dark-mode .cal-picker-overlay            { background: rgba(0,0,0,0.65); }
html.dark-mode .cal-picker-sheet              { background: var(--bg-card); }
html.dark-mode .cal-picker-select             { background: var(--bg-input); border-color: var(--border); color: var(--text-primary); }
html.dark-mode .cal-picker-cancel             { color: var(--text-secondary); }
html.dark-mode .cal-nav-btn                   { color: var(--accent); }

/* Sections info */
html.dark-mode .info-section > label  { color: var(--accent); }
html.dark-mode .info-section textarea { background: var(--bg-input); color: var(--text-primary); border-color: var(--border); }
html.dark-mode .meal-checkbox         { background: var(--bg-input); }
html.dark-mode .meal-checkbox label   { color: var(--text-secondary); }
html.dark-mode .expenses-header       { color: var(--accent); }
html.dark-mode .frais-header          { color: var(--accent); }
html.dark-mode .depense-sub-header    { color: var(--text-muted); }
html.dark-mode .depense-item          { border-top-color: var(--border); }

/* Autocomplete */
html.dark-mode .ac-suggestions        { background: var(--bg-card); border-color: var(--border); box-shadow: 0 4px 16px var(--shadow-md); }
html.dark-mode .ac-item               { color: var(--text-primary); border-color: var(--border); }
html.dark-mode .ac-item:active        { background: var(--bg-input); }
html.dark-mode .ac-modal-sheet        { background: var(--bg-card); }
html.dark-mode .ac-modal-title        { color: var(--text-primary); }
html.dark-mode .ac-modal-item         { color: var(--text-primary); border-color: var(--border); }
html.dark-mode .ac-modal-close        { background: var(--bg-input); color: var(--text-secondary); }


/* Boutons inline */
html.dark-mode .add-client-line-btn { border-color: var(--border); color: var(--text-muted); }
html.dark-mode .ac-manage-btn       { color: var(--text-muted); }
html.dark-mode .period-header       { color: var(--accent); }
html.dark-mode .client-entry        { border-color: var(--border); }

/* darkToggle */
html.dark-mode #darkToggle { background: var(--bg-input); border-color: var(--border); }


/* ════════════════════════════════════════════════════════════════
   § 11 ANIMATIONS
   Curseur clignotant (companyName) + toggle repli (day-toggle)
════════════════════════════════════════════════════════════════ */

/* ── Curseur rouge clignotant — placeholder "Entreprise" ── */
/* step-end : allumé pendant toute la demi-période, éteint net */
@keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}

.company-cursor {
    /* Position absolue dans .logo-container (position:relative).
       left, top et height sont calculés dynamiquement par _positionCursor()
       après rendu des polices : ne pas les fixer ici. */
    position: absolute;
    width: 2px;

// ── Formatage de date ─────────────────────────────────────────────
// Retourne "jj/mm/aa"
function formatDate(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = String(date.getFullYear()).slice(-2);
    return `${d}/${m}/${y}`;
}
// Retourne "jj.mm.aaaa"
function formatDateFull(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    return `${d}.${m}.${date.getFullYear()}`;
}

// ── Conversion HH:MM → minutes depuis minuit ──────────────────────
function timeToMinutes(t) {
    if (!t || t === '--:--') return -1;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

// ── Debounce : exécuter fn après delay ms d'inactivité ──────────
function debounce(fn, delay) {
    return function (...args) {
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(() => fn.apply(this, args), delay);
    };
}

// ── Clé localStorage d'une semaine ──────────────────────────────
function getWeekKey() {
    return `week_${state.currentWeekStart.toISOString().split('T')[0]}`;
}

// Parse une cle week_YYYY-MM-DD en date locale (corrige le decalage UTC)
// En UTC+1 : lundi 00h local = dimanche 23h UTC -> cle = dimanche.
// On parse en local et on normalise au lundi si la date est un dimanche.
function _parseWeekKey(key) {
    var parts = key.replace('week_', '').split('-').map(Number);
    var d = new Date(parts[0], parts[1] - 1, parts[2]); // minuit local
    if (d.getDay() === 0) d.setDate(d.getDate() + 1);   // dimanche -> lundi
    return d;
}

function _rebuildCalIndex() {
    var idx = {};
    Object.keys(localStorage).forEach(function(key) {
        if (!key.startsWith('week_')) return;
        try {
            var wd = JSON.parse(localStorage.getItem(key));
            if (!wd || !wd.days) return;
            var wDate = _parseWeekKey(key);
            wd.days.forEach(function(day, i) {
                if (!day) return;
                var d = new Date(wDate); d.setDate(d.getDate() + i);
                var hasH = _normalizeDayEntries(day).some(function(e) {
                    return e.start && e.start !== '--:--' && e.end && e.end !== '--:--' && e.end > e.start;
                });
                if (hasH) idx[d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')] = true;
            });
        } catch(err) {}
    });
    state._calIndex = idx;
}

// ── Toast sans alert() — compatible PWA/WebView ───────────────────
function showToast(msg, duration = 2500) {
    const el = document.getElementById('toastEl');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
}

// ── Validation des créneaux d'un jour ────────────────────────────
// Retourne [] si tout est OK, ou [{ period, id, msg }, ...] si erreurs.
// Vérifie : fin > début ET anti-chevauchement entre tous les créneaux du jour.
function validateTimeSlots(dayIndex) {
    if (state._validationCache && state._validationCache[dayIndex] !== undefined) return state._validationCache[dayIndex];
    var slots  = [];
    var errors = [];

    // Parcourir tous les champs start du jour (schéma v2: start_{day}_{entryId})
    document.querySelectorAll('[id^="start_' + dayIndex + '_"]').forEach(function(el) {
        var entryId = el.id.replace('start_' + dayIndex + '_', '');
        var endEl   = document.getElementById('end_' + dayIndex + '_' + entryId);
        var s = el.value        || '';
        var e = endEl ? (endEl.value || '') : '';
        var sSet = s !== '' && s !== '--:--';
        var eSet = e !== '' && e !== '--:--';

        if (sSet && eSet) {
            slots.push({ s: s, e: e, id: entryId });
        } else if (sSet && !eSet) {
            errors.push({ id: entryId, msg: 'Heure de fin manquante' });
        } else if (!sSet && eSet) {
            errors.push({ id: entryId, msg: 'Heure de début manquante' });
        }
        // Les deux vides : créneau ignoré silencieusement
    });

    // Validation des créneaux complets
    for (var i = 0; i < slots.length; i++) {
        var a  = slots[i];
        var aS = timeToMinutes(a.s);
        var aE = timeToMinutes(a.e);

        if (aE <= aS) {
            errors.push({ id: a.id,
                msg: aE === aS ? 'Durée nulle — fin identique au début' : 'Fin doit être après le début' });
            continue;
        }
        for (var j = i + 1; j < slots.length; j++) {
            var b  = slots[j];
            var bS = timeToMinutes(b.s);
            var bE = timeToMinutes(b.e);
            if (bE <= bS) continue;
            if (aS < bE && bS < aE) {
                errors.push({ id: a.id, msg: 'Chevauchement avec un autre créneau' });
                errors.push({ id: b.id, msg: 'Chevauchement avec un autre créneau' });
            }
        }
    }
    if (state._validationCache) state._validationCache[dayIndex] = errors;
    return errors;
}

// ── Afficher / masquer une erreur horaire ─────────────────────────
// entryId = null  → créneau principal
// entryId = "…"  → client supplémentaire (son propre slot d'erreur)
// entryId = id de l'entrée (e.g. 'am', 'pm', 'e_abc123')
function showTimeError(dayIndex, entryId, msg) {
    var slot = document.getElementById('time-err-' + dayIndex + '-' + entryId);
    if (slot) {
        slot.innerHTML = '';
        var el = document.createElement('div');
        el.className = 'time-error visible';
        el.textContent = msg;
        slot.appendChild(el);
    }
    var startEl = document.getElementById('start_' + dayIndex + '_' + entryId);
    var endEl   = document.getElementById('end_'   + dayIndex + '_' + entryId);
    if (startEl) startEl.classList.add('invalid');
    if (endEl)   endEl.classList.add('invalid');
}


// ── Nettoyer TOUTES les erreurs d'un jour (utilisé après suppression) ──
// Parcourt tous les slots d'erreur du jour + retire toutes les classes .invalid
// sur les inputs horaires, y compris ceux des clients supplémentaires.
function _clearAllDayErrors(dayIndex) {
    // Invalider le cache pour ce jour — les valeurs ont changé depuis le dernier calcul
    if (state._validationCache) delete state._validationCache[dayIndex];
    document.querySelectorAll('[id^="time-err-' + dayIndex + '-"]').forEach(function(el) {
        el.innerHTML = '';
    });
    document.querySelectorAll('[id^="start_' + dayIndex + '_"],[id^="end_' + dayIndex + '_"]')
        .forEach(function(el) { el.classList.remove('invalid'); });
}


/* ════════════════════════════════════════════════════════════════
   § 3  DATA MANAGER — localStorage + IndexedDB
   Toute la persistance est ici. Pas d'accès direct à localStorage
   en dehors de ce module.
════════════════════════════════════════════════════════════════ */

const DataManager = (() => {

    // ── IndexedDB (3 snapshots max, silencieux) ───────────────────
    const IDB = (() => {
        const DB_NAME    = 'mesheures_idb';
        const DB_VERSION = 1;
        const STORE      = 'snapshots';
        const MAX_SNAPS  = 3;
        let _db = null;

        function open() {
            return new Promise((resolve, reject) => {
                if (_db) { resolve(_db); return; }
                if (!window.indexedDB) { reject(new Error('IndexedDB indisponible')); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE)) {
                        db.createObjectStore(STORE, { keyPath: 'ts' });
                    }
                };
                req.onsuccess = e => { _db = e.target.result; resolve(_db); };
                req.onerror   = e => reject(e.target.error);
            });
        }

        function save() {
            open().then(db => {
                const snap = { ts: Date.now(), data: {} };
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    snap.data[k] = localStorage.getItem(k);
                }
                if (Object.keys(snap.data).length === 0) return;
                const tx    = db.transaction(STORE, 'readwrite');
                const store = tx.objectStore(STORE);
                store.add(snap);
                const allReq = store.getAll();
                allReq.onsuccess = () => {
                    const all = allReq.result.sort((a, b) => a.ts - b.ts);
                    while (all.length > MAX_SNAPS) store.delete(all.shift().ts);
                };
            }).catch(() => {}); // toujours silencieux
        }

        function getLatest() {
            return open().then(db => new Promise((resolve) => {
                const tx    = db.transaction(STORE, 'readonly');
                const req   = tx.objectStore(STORE).getAll();
                req.onsuccess = () => {
                    const all = req.result.sort((a, b) => b.ts - a.ts);
                    resolve(all[0] || null);
                };
                req.onerror = () => resolve(null);
            })).catch(() => null);
        }

        function lsHasData() {
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('week_') || k === 'employeeName' || k === 'companyName') return true;
            }
            return false;
        }

        function restoreIfNeeded() {
            try { if (lsHasData()) return Promise.resolve(false); } catch(e) {}
            return getLatest().then(snap => {
                if (!snap?.data || Object.keys(snap.data).length === 0) return false;
                try {
                    Object.keys(snap.data).forEach(k => localStorage.setItem(k, snap.data[k]));
                    return true;
                } catch(e) { return false; }
            }).catch(() => false);
        }

        return { save, restoreIfNeeded };
    })();

    // ── Clé de semaine ────────────────────────────────────────────
    // Exposée pour les modules qui en ont besoin
    function weekKey() { return getWeekKey(); }

    // ── Sauvegarder la semaine courante (format v2 — entries[]) ──
    function saveWeek() {
        try {
            var data = { v: 2, days: [] };
            for (var i = 0; i < 7; i++) {
                data.days.push(_collectDayData(i));
            }
            localStorage.setItem(weekKey(), JSON.stringify(data));
            state._validationCache = {};
            _rebuildCalIndex();

            var globals = ['employeeName','notes','firstName','lastName','address',
                           'city','postalCode','country','phone','personalEmail',
                           'companyLegalName','companyAddress','companyPhone','companyEmail',
                           ];
            globals.forEach(function(id) {
                var val = document.getElementById(id);
                if (val) localStorage.setItem(id, val.value || '');
            });
            // Checkbox pause (valeur booléenne)

        } catch(e) {
            if (e && e.name === 'QuotaExceededError') showToast('Stockage plein — pensez à exporter une sauvegarde', 4000);
            console.warn('[MesHeures] localStorage:', e);
        }
        setTimeout(function() { IDB.save(); }, 100);
    }

    // Collecte les données d'un jour depuis le DOM → objet v3
    function _collectDayData(dayIndex) {

                entries.push({ id: id, period: 'am',
                    client:   (document.getElementById('client_'   + i + '_' + id) || {value:''}).value || '',
                    start:    validTime ? s : '', end: validTime ? e : '',

                });

        if (pmCont) {
            pmCont.querySelectorAll('.entry-block[data-entry-id]').forEach(function(block) {

                var validTime = s && e && s !== '--:--' && e !== '--:--' && e > s;
                entries.push({ id: id, period: 'pm',
                    client:   (document.getElementById('client_'   + i + '_' + id) || {value:''}).value || '',
                    start:    validTime ? s : '', end: validTime ? e : '',
                    desc:     (document.getElementById('desc_'     + i + '_' + id) || {value:''}).value || '',
                    location: (document.getElementById('location_' + i + '_' + id) || {value:''}).value || '',
                });

        if (entries.length === 0) entries = [_blankEntry('am'), _blankEntry('pm')];

        // Collect dépenses (véhicule, fournitures, divers)
        function collectDepenseContainer(containerId) {

            repasClient:  repasClientEl  ? repasClientEl.value.trim()  : '',
            repasActive:  repasActiveEl  ? repasActiveEl.checked    : false,
        };
    }

        // Debounced : ne sauvegarde que 600ms après la dernière frappe
    const debouncedSave = debounce(saveWeek, 600);

    // ── Charger la semaine dans le DOM (format v3 — entries[] + depenses) ──
    function loadWeek() {
        var saved = localStorage.getItem(weekKey());
        if (saved) {
            var rawData = JSON.parse(saved);
            var data = migrateWeek(rawData);

            for (var i = 0; i < 7; i++) {
                var day = (data.days && data.days[i]) || {};

                // ── Reconstruire les conteneurs AM / PM ─────────────────
                var entries = day.entries || [_blankEntry('am'), _blankEntry('pm')];

                var amCont = document.getElementById('entries_am_' + i);
                var pmCont = document.getElementById('entries_pm_' + i);

                if (amCont) {
                    amCont.innerHTML = '';
                    var amEntries = entries.filter(function(e) { return e.period === 'am' || e.id === 'am'; });
                    var amExtraIdx = 0;
                    amEntries.forEach(function(entry) {
                        var label = _entryLabel(entry.id, amExtraIdx);
                        if (entry.id !== 'am') amExtraIdx++;
                        amCont.innerHTML += _entryHTML(i, entry.id, label, 'am');
                    });
                    amEntries.forEach(function(entry) {
                        var id = entry.id;
                        function setF(fid, val) { var el = document.getElementById(fid); if (el) el.value = val || ''; }
                        setF('client_' + i + '_' + id, entry.client);
                        setF('start_'  + i + '_' + id, entry.start);
                        setF('end_'    + i + '_' + id, entry.end);
                        setF('desc_'   + i + '_' + id, entry.desc);
                        setF('location_' + i + '_' + id, entry.location);
                    });
                }

                if (pmCont) {
                    pmCont.innerHTML = '';
                    var pmEntries = entries.filter(function(e) { return e.period === 'pm' || e.id === 'pm'; });
                    var pmExtraIdx = 0;
                    pmEntries.forEach(function(entry) {
                        var label = _entryLabel(entry.id, pmExtraIdx);
                        if (entry.id !== 'pm') pmExtraIdx++;
                        pmCont.innerHTML += _entryHTML(i, entry.id, label, 'pm');
                    });
                    pmEntries.forEach(function(entry) {
                        var id = entry.id;
                        function setF2(fid, val) { var el = document.getElementById(fid); if (el) el.value = val || ''; }
                        setF2('client_' + i + '_' + id, entry.client);
                        setF2('start_'  + i + '_' + id, entry.start);
                        setF2('end_'    + i + '_' + id, entry.end);
                        setF2('desc_'   + i + '_' + id, entry.desc);
                        setF2('location_' + i + '_' + id, entry.location);
                    });
                }

                // Repas
                var _rAmtEl    = document.getElementById('repasAmount_' + i);
                var _rClientEl = document.getElementById('repasClient_' + i);
                var _rActiveEl = document.getElementById('repasActive_' + i);

                if (_rClientEl) _rClientEl.value = day.repasClient || '';

                if (_pClientEl) _pClientEl.value   = day.pauseClient || '';

        // ── Effacer la semaine ────────────────────────────────────────

    // ── Export / Import JSON (sauvegarde complète) ────────────────
    function exportBackup() {
        try {
            const allData = {};
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                allData[k] = localStorage.getItem(k);
            }
            const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `mesheures_sauvegarde_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ Sauvegarde exportée');
        } catch(e) {
            showToast('⚠️ Erreur lors de la sauvegarde');
        }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                showToast('✓ Données restaurées — rechargement...');
                setTimeout(() => location.reload(), 1200);
            } catch(err) {
                showToast('⚠️ Fichier invalide');
            }
        };
        reader.readAsText(file);
    }

function _getDayPauseMins(dayIndex) {
    var el = document.getElementById('pauseMins_' + dayIndex);
    if (el) return Math.min(120, Math.max(0, parseInt(el.value) || 0));
    return Math.min(120, Math.max(0, parseInt(localStorage.getItem('pauseGlobalMins') || '0') || 0));

// Sync : quand on change les minutes d'un jour, propager à tous les autres
function _onPauseMinsChange(dayIndex, val) {
    var p = Math.min(120, Math.max(0, parseInt(val) || 0));
    localStorage.setItem('pauseGlobalMins', p);
    // Propager uniquement aux jours futurs (aujourd'hui inclus si pas encore passé)
    var today = new Date(); today.setHours(0,0,0,0);
    for (var _si = 0; _si < 7; _si++) {

/* ════════════════════════════════════════════════════════════════
   § 4  AUTOCOMPLETE MANAGER
   Système unifié pour 3 types : client | desc | lieu
   Pour 'lieu' : fusion liste fixe COMMUNES + historique user
════════════════════════════════════════════════════════════════ */

const ACManager = (() => {

    // ── Clé localStorage pour un type ────────────────────────────
    function acKey(type) { return 'acHistory_' + type; }

    // ── Charger l'historique trié par fréquence ───────────────────
    function loadHistory(type) {
        try { return JSON.parse(localStorage.getItem(acKey(type)) || '[]'); }
        catch(e) { return []; }
    }

    // ── Enregistrer / incrementer une valeur ─────────────────────
    function record(type, value) {
        value = (value || '').trim();
        if (!value || value.length < 2) return;
        let list = loadHistory(type);
        const idx = list.findIndex(e => e.name.toLowerCase() === value.toLowerCase());
        if (idx >= 0) {
            list[idx].count++;
            list[idx].name = value;
        } else {
            list.push({ name: value, count: 1 });
        }
        list.sort((a, b) => b.count - a.count);
        list = list.slice(0, C.AC_MAX);
        localStorage.setItem(acKey(type), JSON.stringify(list));
    }

    // ── Construire la liste de suggestions ───────────────────────
    function buildSuggestions(type, val) {
        const history = loadHistory(type);
        val = (val || '').trim().toLowerCase();

        if (type === 'lieu') {
            const userMatches = history
                .filter(e => val === '' ? true : e.name.toLowerCase().includes(val))
                .map(e => ({ name: e.name, count: e.count, isBase: false }));
            const userNames = new Set(userMatches.map(e => e.name.toLowerCase()));
            const baseMatches = C.COMMUNES
                .filter(c => (val === '' ? true : c.toLowerCase().startsWith(val))
                              && !userNames.has(c.toLowerCase()))
                .map(c => ({ name: c, count: 0, isBase: true }));
            return [...userMatches, ...baseMatches].slice(0, C.AC_SHOW);
        }

        return history
            .filter(e => val === '' ? true : e.name.toLowerCase().includes(val))
            .slice(0, C.AC_SHOW)
            .map(e => ({ name: e.name, count: e.count, isBase: false }));
    }

    // ── Trouver le dropdown .ac-suggestions du bon wrapper ────────
    function getDropdown(input) {
        return input.closest('.ac-wrapper')?.querySelector('.ac-suggestions')
            || input.closest('.client-input-wrapper')?.querySelector('.client-suggestions')
            || input.closest('.lieu-wrapper')?.querySelector('.lieu-suggestions')
            || null;
    }

    // ── Afficher les suggestions ──────────────────────────────────
    function showDropdown(input, type) {
        const dropdown = getDropdown(input);
        if (!dropdown) return;
        dropdown.innerHTML = '';
        const suggestions = buildSuggestions(type, input.value);
        if (suggestions.length === 0) { dropdown.classList.remove('visible'); return; }

        suggestions.forEach(({ name, isBase }) => {
            const item    = document.createElement('div');
            item.className = 'ac-item' + (isBase ? ' ac-base' : ' ac-user');

            const delHTML = !isBase ? `<span class="ac-item-del" title="Retirer">×</span>` : '';
            item.innerHTML = `<span class="ac-item-name">${name}</span>${delHTML}`;

            // Clic sur le nom → sélectionner
            const nameEl = item.querySelector('.ac-item-name');
            const select = e => {
                e.preventDefault();
                input.value = name;
                dropdown.classList.remove('visible');
                if (!isBase) record(type, name);
                input.dispatchEvent(new Event('change'));
            };
            nameEl.addEventListener('mousedown', select);
            nameEl.addEventListener('touchstart', e => { e.preventDefault(); select(e); }, { passive: false });

            // Clic sur × → supprimer de l'historique
            const delEl = item.querySelector('.ac-item-del');
            if (delEl) {
                const del = e => {
                    e.preventDefault();
                    e.stopPropagation();
                    const list = loadHistory(type).filter(en => en.name !== name);
                    localStorage.setItem(acKey(type), JSON.stringify(list));
                    showDropdown(input, type);
                };
                delEl.addEventListener('mousedown', del);
                delEl.addEventListener('touchstart', e => { e.preventDefault(); del(e); }, { passive: false });
            }
            dropdown.appendChild(item);
        });
        dropdown.classList.add('visible');
    }

    // ── Masquer le dropdown (délai pour laisser le clic s'effectuer)
    function hideDropdown(input) {
        setTimeout(() => {
            const dropdown = getDropdown(input);
            if (dropdown) dropdown.classList.remove('visible');
        }, 180);
    }

    // ── Modal de gestion de liste ─────────────────────────────────
    function openModal(type) {
        state.acModalType = type || 'client';
        const labels = C.AC_MODAL_LABELS[state.acModalType] || C.AC_MODAL_LABELS.client;
        const sheet  = document.getElementById('acModalSheet');
        if (!sheet) return;

        const items = loadHistory(state.acModalType);

        sheet.innerHTML = `
            <div class="ac-modal-header">
                <div>
                    <div class="ac-modal-title">${labels.title}</div>
                    <div class="ac-modal-subtitle">${labels.subtitle}</div>
                </div>
                <button class="ac-modal-close clients-modal-close" aria-label="Fermer">×</button>
            </div>
            <div id="acModalList">
                ${items.length === 0
                    ? '<div class="ac-modal-empty">Aucune entrée enregistrée.</div>'
                    : items.map(({ name, count }) => `
                        <div class="ac-modal-item">
                            <span class="ac-modal-item-name">${name}</span>
                            <span class="ac-modal-item-count">${count} fois</span>
                            <button class="ac-modal-del clients-modal-del"
                                    data-delete-ac="${name.replace(/'/g, "\\'")}"
                                    aria-label="Supprimer ${name}">×</button>
                        </div>
                    `).join('')
                }
            </div>
        `;
        document.getElementById('acModalOverlay').classList.add('open');
    }

    function deleteFromModal(name) {
        const list = loadHistory(state.acModalType).filter(e => e.name !== name);
        localStorage.setItem(acKey(state.acModalType), JSON.stringify(list));
        openModal(state.acModalType); // rafraîchir la modal
    }

    function closeModal() {
        document.getElementById('acModalOverlay').classList.remove('open');
    }

    // ── Alias compatibilité v1 ────────────────────────────────────
    return {
        loadHistory, record, buildSuggestions,
        showDropdown, hideDropdown,
        openModal, deleteFromModal, closeModal,
        // Compatibilité inline handlers de renderWeek
        show:   showDropdown,
        hide:   hideDropdown,
    };
})();

/* ════════════════════════════════════════════════════════════════
   MODÈLE DE DONNÉES v2 — entries[] par jour
   Remplace le modèle am/pm (v1) par un tableau entries[].
   _normalizeDayEntries() lit les deux formats (rétro-compat exports).
   migrateWeek() convertit un objet stocké v1 → v2 en mémoire.
════════════════════════════════════════════════════════════════ */

function _blankEntry(id) {
    var per = (id === 'am') ? 'am' : 'pm';
    return { id: id, period: per, client: '', start: '', end: '', desc: '', location: '' };
}

function _newEntryId() {
    return 'e_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

// Lecture universelle : accepte v1 (am/pm) et v2 (entries[]).
// Retourne toujours un tableau plat d'entrées. Jamais de side-effect.
function _normalizeDayEntries(day) {
    if (!day) return [];
    if (Array.isArray(day.entries)) return day.entries;
    // v1 → lecture à la volée
    var entries = [];
    ['am', 'pm'].forEach(function(p) {
        var slot = day[p] || {};
        entries.push({ id: p, period: p, client: slot.client || '', start: slot.start || '',
                       end: slot.end || '', desc: slot.desc || '', location: slot.location || '' });
        (slot.extraClients || []).forEach(function(ec) {
            entries.push({ id: ec.id || _newEntryId(), period: p, client: ec.client || '',
                           start: ec.start || '', end: ec.end || '',
                           desc: ec.desc || '', location: ec.location || '' });
        });
    });
    return entries;
}

// Migration v1 → v2 en mémoire (ne touche pas localStorage directement).
// Appelée dans loadWeek avant tout accès aux données.
function migrateWeek(data) {
    if (!data || !data.days) return data;
    if (data.v === 3) return data;

    // v1 → v2 : normaliser entries[]
    var days2 = data.days.map(function(day) {
        if (!day) return { entries: [_blankEntry('am'), _blankEntry('pm')],
                           km: [], expenses: [] };
        if (data.v === 2 || Array.isArray(day.entries)) return day;
        return { entries: _normalizeDayEntries(day), km: day.km || [],
                 expenses: day.expenses || [] };
    });

    // v2 → v3 : period sur entries, km→vehicule, expenses→divers
    var days3 = days2.map(function(day) {
        if (!day) return {
            entries: [_blankEntry('am'), _blankEntry('pm')],
            depenses: { vehicule: [], fournitures: [] },
        };
        // Enrichir les entries avec period (extras sans period → 'pm')
        var entries3 = (day.entries || [_blankEntry('am'), _blankEntry('pm')]).map(function(e) {
            var per = e.period || (e.id === 'am' ? 'am' : e.id === 'pm' ? 'pm' : 'pm');
            return Object.assign({}, e, { period: per });
        });
        // Migrer km → vehicule (même format, on conserve client si présent)
        var vehicule = (day.km || []).map(function(k) {
            return { client: k.client || '', desc: k.desc || '', amount: k.amount || '', reimbursed: k.reimbursed || false };
        });
        // Migrer expenses → divers
        var divers = (day.expenses || []).map(function(e) {
            return { client: e.client || '', desc: e.desc || '', amount: e.amount || '', reimbursed: e.reimbursed || false };
        });
        return {
            entries: entries3,
            depenses: { vehicule: vehicule, fournitures: [], divers: divers },
        };
    });
    return { v: 3, days: days3 };
}

// ── Changer de semaine ────────────────────────────────────────────
function changeWeek(delta) {
    // Fermer tous les overlays ouverts
    // picker natif — rien à fermer
    document.body.style.overflow = '';
    document.querySelectorAll('.ac-dropdown.open, .ac-dropdown[style*="block"]')
        .forEach(function(d) { d.style.display = 'none'; });
    var acModal = document.getElementById('acModalOverlay');
    if (acModal) acModal.classList.remove('open');
    var pdfModal = document.getElementById('pdfChoiceOverlay');
    if (pdfModal) pdfModal.classList.remove('open');
    var calPicker = document.getElementById('calPickerOverlay');
    if (calPicker) calPicker.classList.remove('open');

    state.currentWeekStart.setDate(state.currentWeekStart.getDate() + delta * 7);
    // Synchroniser le mois calendrier avec la semaine affichée
    state.calendarViewMonth = new Date(state.currentWeekStart.getFullYear(), state.currentWeekStart.getMonth(), 1);
    renderWeek();
}

// ── Raccourcis jours (L M M J V S D) ─────────────────────────────
function renderDayShortcuts() {
    const container = document.getElementById('dayShortcuts');
    if (!container) return;
    container.innerHTML = '';
    const today = new Date();

    for (let i = 0; i < 7; i++) {
        const date = new Date(state.currentWeekStart);
        date.setDate(date.getDate() + i);
        const isToday = date.toDateString() === today.toDateString();

        const btn = document.createElement('button');
        btn.className = 'day-shortcut' + (isToday ? ' sc-today' : '');
        btn.dataset.dayIndex = i;
        btn.setAttribute('aria-label', `${C.DAYS_FR[date.getDay()]} ${formatDate(date)}`);
        btn.innerHTML = `
            <span class="sc-label">${C.DAY_LABELS[i]}</span>
            <span class="sc-num">${date.getDate()}</span>
        `;
        // Clic : déplier la carte + scroll + flash
        btn.addEventListener('click', () => {
            const cards = document.querySelectorAll('.day-card');
            if (!cards[i]) return;
            if (!cards[i].classList.contains('expanded')) {
                cards[i].classList.add('expanded');
            }
            cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
            // Flash bref de surbrillance via classe CSS
            cards[i].classList.add('sc-flash');
            setTimeout(() => cards[i].classList.remove('sc-flash'), 800);
        });
        container.appendChild(btn);
    }
}

// ── Semaine complète ──────────────────────────────────────────────

// Appelé systématiquement au début de renderWeek pour garantir
