                                   onchange="recordAc('lieu',this.value); debouncedSave();" />
                            <div class="ac-suggestions"></div>
                        </div>
                    </div>
                    <button class="add-client-line-btn" data-day="${i}" data-period="pm"
                            aria-label="Ajouter un client supplémentaire l'après-midi">
                        <span>+</span> Ajouter un client
                    </button>
                    <div class="hours-display" id="hours_day_${i}" aria-live="polite">0h00</div>
                </div>

                <!-- ── KILOMÉTRAGE ── -->
                <div class="expenses-section" style="border-top:none;padding-top:0;">
                    <div class="expenses-header">
                        Véhicule Personnel
                        <span class="add-km-btn" role="button" tabindex="0"
                              aria-label="Ajouter un trajet" data-day="${i}">+</span>
                    </div>
                    <div id="km_${i}"></div>
                </div>

                <!-- ── FRAIS ── -->
                <div class="expenses-section">
                    <div class="expenses-header">
                        Frais (avec quittance)
                        <span class="add-expense-btn" role="button" tabindex="0"
                              aria-label="Ajouter un frais" data-day="${i}">+</span>
                    </div>
                    <div id="expenses_${i}"></div>
                    <div class="meal-checkbox">
                        <input type="checkbox" id="meal_${i}" aria-label="Repas remboursé"
                               onchange="DataManager.saveWeek(); calculateTotals();" />
                        <label for="meal_${i}">Repas remboursé</label>
                    </div>
                </div>

            </div><!-- /.day-body -->
        `;

        container.appendChild(card);

        // Repli / dépli — listener direct (pas de délégation pour la performance)
        card.querySelector('.day-title').addEventListener('click', function(e) {
            // Clic sur la date → scroll calendrier uniquement
            if (e.target.classList.contains('day-date')) {
                _jumpCalendarToDate(date);
                return;
            }
            const expanded = card.classList.toggle('expanded');
            this.setAttribute('aria-expanded', expanded);
        });
    }

    DataManager.loadWeek();
    calculateTotals();
    renderCalendar();
}

// ── Scroller le calendrier vers la date d'une carte ──────────────
// ── Scroller le calendrier vers la date d'une carte ──────────────
// Règle d'or respectée : aucun inline style. Le flash visuel utilise
// la classe CSS .cal-flash définie dans §7 (Calendar).
function _jumpCalendarToDate(date) {
    state.calendarViewMonth = new Date(date);
    renderCalendar();
    document.querySelector('.calendar-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Flash bref : ajoute la classe, la retire après 900ms
    setTimeout(() => {
        document.querySelectorAll('.calendar-day:not(.other-month)').forEach(d => {
            if (parseInt(d.textContent) === date.getDate()) {
                d.classList.add('cal-flash');
                setTimeout(() => d.classList.remove('cal-flash'), 900);
            }
        });
    }, 150);
}

// ── Ajouter une entrée client supplémentaire ─────────────────────
// savedData = null  → ajout interactif  |  { id, client, … } → rechargement
function addClientEntry(dayIndex, period, savedData = null) {
    // Trouver la bonne .period-section
    const cards = document.querySelectorAll('.day-card');
    let periodSection;
    if (savedData) {
        // Rechargement : chercher la section par index de carte
        const card = cards[dayIndex];
        if (!card) return;
        const sections = card.querySelectorAll('.period-section');
        periodSection = period === 'am' ? sections[0] : sections[1];
    } else {
        // Interactif : chercher depuis le bouton cliqué
        periodSection = event?.target?.closest('.period-section');
    }
    if (!periodSection) return;

    const existingCount = periodSection.querySelectorAll('.client-entry').length;
    const clientNumber  = existingCount + 2;
    const entryId       = savedData?.id || (Date.now() + '_' + Math.floor(Math.random() * 9999));
    const addButton     = periodSection.querySelector('.add-client-line-btn');

    const entry = document.createElement('div');
    entry.className    = 'client-entry';
    entry.dataset.entryId = entryId;

    entry.innerHTML = `
        <div class="client-row">
            <div class="ac-wrapper">
                <input type="text" id="client_${dayIndex}_${period}_${entryId}"
                       placeholder="Client ${clientNumber}"
                       aria-label="Client supplémentaire ${clientNumber}"
                       autocomplete="off"
                       value="${savedData?.client || ''}"
                       oninput="showAcSuggestions(this,'client')"
                       onblur="hideAcSuggestions(this)"
                       onchange="recordAc('client',this.value); debouncedSave();" />
                <div class="ac-suggestions"></div>
            </div>
            <button class="add-client-btn" style="background:#FD636B;"
                    aria-label="Supprimer ce client"
                    data-action="remove-client">×</button>
        </div>
        <div class="time-inputs">
            <div class="time-group">
                <label>Début</label>
                <input type="text" id="start_${dayIndex}_${period}_${entryId}"
                       readonly placeholder="--:--"
                       aria-label="Heure début" data-timepicker="true"
                       value="${savedData?.start || ''}" />
            </div>
            <div class="time-group">
                <label>Fin</label>
                <input type="text" id="end_${dayIndex}_${period}_${entryId}"
                       readonly placeholder="--:--"
                       aria-label="Heure fin" data-timepicker="true"
                       value="${savedData?.end || ''}" />
            </div>
        </div>
        <div class="ac-wrapper">
            <input type="text" id="desc_${dayIndex}_${period}_${entryId}"
                   placeholder="Description" aria-label="Description"
                   autocomplete="off" value="${savedData?.desc || ''}"
                   oninput="showAcSuggestions(this,'desc')"
                   onblur="hideAcSuggestions(this)"
                   onchange="recordAc('desc',this.value); debouncedSave();" />
            <div class="ac-suggestions"></div>
        </div>
        <div class="ac-wrapper" style="margin-bottom:10px;">
            <input type="text" id="location_${dayIndex}_${period}_${entryId}"
                   placeholder="Lieu" aria-label="Lieu"
                   autocomplete="off" value="${savedData?.location || ''}"
                   oninput="showAcSuggestions(this,'lieu')"
                   onblur="hideAcSuggestions(this)"
                   onchange="recordAc('lieu',this.value); debouncedSave();" />
            <div class="ac-suggestions"></div>
        </div>
    `;

    if (addButton) {
        addButton.parentNode.insertBefore(entry, addButton);
    } else {
        periodSection.appendChild(entry);
    }
}

// ── Calcul heures d'un jour ───────────────────────────────────────
function calculateDayHours(dayIndex) {
    const errors        = validateTimeSlots(dayIndex);
    const invalidPeriods = new Set(errors.map(e => e.period + (e.id ? '_' + e.id : '')));
    let dayMinutes = 0;

    ['am', 'pm'].forEach(period => {
        if (!invalidPeriods.has(period)) {
            const s = document.getElementById(`start_${dayIndex}_${period}`)?.value;
            const e = document.getElementById(`end_${dayIndex}_${period}`)?.value;
            if (s && e && s !== '--:--' && e !== '--:--' && e > s) {
                dayMinutes += timeToMinutes(e) - timeToMinutes(s);
            }
        }
        document.querySelectorAll(`[id^="start_${dayIndex}_${period}_"]`).forEach(startEl => {
            const entryId = startEl.id.replace(`start_${dayIndex}_${period}_`, '');
            if (invalidPeriods.has(`${period}_${entryId}`)) return;
            const endEl = document.getElementById(`end_${dayIndex}_${period}_${entryId}`);
            if (startEl.value && endEl?.value && startEl.value !== '--:--'
                && endEl.value !== '--:--' && endEl.value > startEl.value) {
                dayMinutes += timeToMinutes(endEl.value) - timeToMinutes(startEl.value);
            }
        });
    });

    const display = document.getElementById(`hours_day_${dayIndex}`);
    if (display) {
        if (errors.length > 0) {
            display.textContent   = '⚠ Erreur';
            display.style.color   = '#D0323A';
            display.style.fontSize = '0.6875rem';
        } else {
            display.textContent   = `${Math.floor(dayMinutes / 60)}h${String(dayMinutes % 60).padStart(2, '0')}`;
            display.style.color   = '';
            display.style.fontSize = '';
        }
    }
    calculateTotals();
}

// ── Totaux semaine (footer + weekly-total) ───────────────────────
function calculateTotals() {
    let totalMinutes = 0, totalKm = 0, totalMeals = 0, totalExpenses = 0;

    for (let i = 0; i < 7; i++) {
        document.querySelectorAll(`[id^="start_${i}_"]`).forEach(startEl => {
            const endEl = document.getElementById(startEl.id.replace('start_', 'end_'));
            if (startEl.value && endEl?.value && startEl.value !== '--:--' && endEl.value !== '--:--') {
                let mins = timeToMinutes(endEl.value) - timeToMinutes(startEl.value);
                if (mins < 0) mins += 1440;
                totalMinutes += mins;
            }
        });
        document.getElementById(`km_${i}`)?.querySelectorAll('input[type="number"]')
            .forEach(inp => { totalKm += parseFloat(inp.value) || 0; });
        if (document.getElementById(`meal_${i}`)?.checked) totalMeals++;
        document.getElementById(`expenses_${i}`)?.querySelectorAll('input[type="number"]')
            .forEach(inp => { totalExpenses += parseFloat(inp.value) || 0; });
    }

    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    const fmt = `${h}h${String(m).padStart(2, '0')}`;

    document.getElementById('weeklyTotal').textContent = fmt;
    document.getElementById('weekHours').textContent   = fmt;
    document.getElementById('weekKm').textContent      = Math.round(totalKm);
    document.getElementById('weekMeals').textContent   = totalMeals;
    document.getElementById('weekExpenses').textContent = totalExpenses.toFixed(2);
}

// ── Calendrier mensuel ────────────────────────────────────────────
function renderCalendar() {
    const today    = new Date();
    const month    = state.calendarViewMonth.getMonth();
    const year     = state.calendarViewMonth.getFullYear();
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    const startDay = (firstDay.getDay() + 6) % 7; // Lundi = 0

    document.getElementById('calendarHeader').textContent = `${C.MONTHS_FR[month]} ${year}`;

    // Jours du mois actuel ayant des heures saisies
    const daysWithHours = new Set();
    Object.keys(localStorage).forEach(key => {
        if (!key.startsWith('week_')) return;
        try {
            const weekData = JSON.parse(localStorage.getItem(key));
            if (!weekData?.days) return;
            const weekDate = new Date(key.replace('week_', ''));
            weekData.days.forEach((day, i) => {
                const d = new Date(weekDate);
                d.setDate(d.getDate() + i);
                if (d.getMonth() === month && d.getFullYear() === year) {
                    if (['am','pm'].some(p => day[p]?.start || day[p]?.end)) {
                        daysWithHours.add(d.getDate());
                    }
                }
            });
        } catch(e) {}
    });

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // En-têtes (L M M J V S D)
    C.DAY_LABELS.forEach(label => {
        const el = document.createElement('div');
        el.className   = 'calendar-day-label';
        el.textContent = label;
        grid.appendChild(el);
    });

    // Jours du mois précédent (grisés)
    const prevLastDay = new Date(year, month, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className   = 'calendar-day other-month';
        el.textContent = prevLastDay - i;
        grid.appendChild(el);
    }

    // Jours du mois actuel
    for (let i = 1; i <= lastDay.getDate(); i++) {
        const el       = document.createElement('div');
        const dayDate  = new Date(year, month, i);
        el.className   = 'calendar-day';
        el.textContent = i;
        el.setAttribute('role', 'gridcell');
        el.setAttribute('aria-label', `${i} ${C.MONTHS_FR[month]} ${year}`);

        if (dayDate.toDateString() === today.toDateString()) el.classList.add('today');
        if (daysWithHours.has(i)) el.classList.add('has-hours');

        el.addEventListener('click', () => {
            const clickedDate    = new Date(year, month, i);
            const dow            = clickedDate.getDay();
            const mondayOffset   = dow === 0 ? -6 : 1 - dow;
            state.currentWeekStart = new Date(clickedDate);
            state.currentWeekStart.setDate(clickedDate.getDate() + mondayOffset);
            state.currentWeekStart.setHours(0, 0, 0, 0);
            state.calendarViewMonth = new Date(state.currentWeekStart);
            renderWeek();

            // ── Dépliage + scroll vers la carte du jour cliqué ────────────
            // 150ms : laisser renderWeek() terminer son rendu DOM avant de scroller.
            setTimeout(() => {
                const cards       = document.querySelectorAll('.day-card');
                // Conversion JS (0=dim) → index carte (0=lun … 6=dim)
                const targetIndex = dow === 0 ? 6 : dow - 1;
                const targetCard  = cards[targetIndex];
                if (!targetCard) return;

                // Dépliage : toujours forcer pour permettre la saisie immédiate
                if (!targetCard.classList.contains('expanded')) {
                    targetCard.classList.add('expanded');
                    const titleEl = targetCard.querySelector('.day-title');
                    if (titleEl) titleEl.setAttribute('aria-expanded', 'true');
                }

                // Scroll : le bandeau titre s'arrête pile en haut de l'écran.
                // block:'start' positionne le bord supérieur de la carte au bord
                // supérieur du viewport — sans offset JS ni inline style.
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
        });
        grid.appendChild(el);
    }

    // Compléter la grille avec les jours du mois suivant
    const remaining = 7 - ((grid.children.length - 7) % 7);
    if (remaining < 7) {
        for (let i = 1; i <= remaining; i++) {
            const el = document.createElement('div');
            el.className   = 'calendar-day other-month';
            el.textContent = i;
            grid.appendChild(el);
        }
    }
}


/* ════════════════════════════════════════════════════════════════
   § 6  TIME PICKER PERSONNALISÉ
   Grille heures (0-23) + grille minutes (0-55 par pas de 5)
   Passage automatique vers les minutes après sélection d'une heure
════════════════════════════════════════════════════════════════ */

function openCustomTimePicker(input) {
    state.currentTimeInput = input;
    const val = input.value;
    if (val && val !== '--:--') {
        const [h, m] = val.split(':').map(Number);
        state.selectedHour   = h;
        state.selectedMinute = m;
    } else {
        const now = new Date();
        state.selectedHour   = now.getHours();
        state.selectedMinute = Math.round(now.getMinutes() / 5) * 5;
        if (state.selectedMinute >= 60) state.selectedMinute = 55;
    }
    state.currentMode = 'hour';
    initPicker();
    updateTimeDisplay();
    document.getElementById('customTimePicker').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function initPicker() {
    const hourGrid   = document.getElementById('hourGrid');
    const minuteGrid = document.getElementById('minuteGrid');
    hourGrid.innerHTML   = '';
    minuteGrid.innerHTML = '';

    for (let i = 0; i < 24; i++) {
        const btn = document.createElement('div');
        btn.className  = 'time-number' + (i === state.selectedHour ? ' selected' : '');
        btn.textContent = String(i).padStart(2, '0');
        btn.addEventListener('click', () => selectHour(i));
        hourGrid.appendChild(btn);
    }
    for (let i = 0; i < 60; i += 5) {
        const btn = document.createElement('div');
        btn.className  = 'time-number' + (i === state.selectedMinute ? ' selected' : '');
        btn.textContent = String(i).padStart(2, '0');
        btn.addEventListener('click', () => selectMinute(i));
        minuteGrid.appendChild(btn);
    }
    switchMode('hour');
}

function switchMode(mode) {
    state.currentMode = mode;
    document.getElementById('modeHour').classList.toggle('active',   mode === 'hour');
    document.getElementById('modeMinute').classList.toggle('active', mode === 'minute');
    document.getElementById('hourGrid').style.display   = mode === 'hour'   ? 'grid' : 'none';
    document.getElementById('minuteGrid').style.display = mode === 'minute' ? 'grid' : 'none';
}

function selectHour(h) {
    state.selectedHour = h;
    // Mettre à jour la sélection visuelle
    document.querySelectorAll('#hourGrid .time-number').forEach((btn, i) => {
        btn.classList.toggle('selected', i === h);
    });
    updateTimeDisplay();
    // Passage automatique aux minutes après 300ms
    setTimeout(() => switchMode('minute'), 300);
}

function selectMinute(m) {
    state.selectedMinute = m;
    document.querySelectorAll('#minuteGrid .time-number').forEach((btn, i) => {
        btn.classList.toggle('selected', i * 5 === m);
    });
    updateTimeDisplay();
}

function updateTimeDisplay() {
    const h = String(state.selectedHour).padStart(2, '0');
    const m = String(state.selectedMinute).padStart(2, '0');
    document.getElementById('pickerDisplay').textContent = `${h}:${m}`;
}

function closeTimePicker() {
    document.getElementById('customTimePicker').style.display = 'none';
    document.body.style.overflow = '';
    state.currentTimeInput = null;
}

function confirmTime() {
    if (!state.currentTimeInput) { closeTimePicker(); return; }

    const timeValue = `${String(state.selectedHour).padStart(2,'0')}:${String(state.selectedMinute).padStart(2,'0')}`;
    state.currentTimeInput.value = timeValue;

    // Valider les créneaux du jour concerné
    const match = state.currentTimeInput.id.match(/^(start|end)_(\d+)_(am|pm)/);
    if (match) {
        const dayIndex = parseInt(match[2]);
        // Effacer toutes les erreurs du jour
        ['am', 'pm'].forEach(p => clearTimeError(dayIndex, p));
        const errors = validateTimeSlots(dayIndex);
        if (errors.length > 0) {
            const shown = new Set();
            errors.forEach(err => {
                if (!shown.has(err.period)) {
                    showTimeError(dayIndex, err.period, err.msg);
                    shown.add(err.period);
                }
            });
            closeTimePicker();
            return; // bloquer la sauvegarde si invalide
        }
        calculateDayHours(dayIndex);
        DataManager.saveWeek();
    }
    closeTimePicker();
}


/* ════════════════════════════════════════════════════════════════
   § 7  ÉVÉNEMENTS — Event Delegation unique
   Un seul document.addEventListener('click') pour tout gérer.
   Pas de listeners inline dans le HTML sauf les AC (legacy).
════════════════════════════════════════════════════════════════ */

document.addEventListener('click', function(e) {

    // ── Spans cliquables (add-km-btn, add-expense-btn) ────────────
    const span = e.target.closest('span.add-km-btn, span.add-expense-btn');
    if (span) {
        const day = parseInt(span.dataset.day);
        if (!isNaN(day)) {
            if (span.matches('.add-km-btn'))      addKm(day);
            if (span.matches('.add-expense-btn')) addExpense(day);
        }
        return;
    }

    // ── Time picker : inputs readonly ─────────────────────────────
    const timeInput = e.target.closest('input[data-timepicker="true"]');
    if (timeInput) { openCustomTimePicker(timeInput); return; }

    // ── Clic sur .day-date → sauter au calendrier ─────────────────
    // (géré dans le listener de day-title dans renderWeek)

    // Suite sur les boutons uniquement
    const target = e.target.closest('button');
    if (!target) return;

    // ── Navigation semaine ────────────────────────────────────────
    if (target.matches('.week-prev')) { changeWeek(-1); return; }
    if (target.matches('.week-next')) { changeWeek(1); return; }

    // ── Navigation calendrier ─────────────────────────────────────
    if (target.matches('.cal-prev-month')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth() - 1, 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-next-month')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth() + 1, 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-prev-year')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear() - 1, state.calendarViewMonth.getMonth(), 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-next-year')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear() + 1, state.calendarViewMonth.getMonth(), 1);
        renderCalendar(); return;
    }

    // ── Exports et actions ────────────────────────────────────────
    if (target.matches('.btn-export'))        { exportToExcel(); return; }
    if (target.matches('.btn-pdf'))           { exportToPDF(); return; }
    if (target.matches('.btn-clear'))         { DataManager.clearWeek(); return; }
    if (target.matches('.btn-backup-export')) { DataManager.exportBackup(); return; }
    if (target.matches('.btn-backup-import')) { document.getElementById('importFile').click(); return; }

    // ── Time picker — mode / OK / Annuler ────────────────────────
    if (target.matches('[data-mode]')) { switchMode(target.dataset.mode); return; }
    if (target.matches('.time-btn-ok')) { confirmTime(); return; }
    if (target.matches('.time-btn-cancel')) {
        // Si l'input avait déjà une heure → la vider
        if (state.currentTimeInput?.value && state.currentTimeInput.value !== '--:--') {
            state.currentTimeInput.value = '--:--';
            const m = state.currentTimeInput.id.match(/^(start|end)_(\d+)_(am|pm)/);
            if (m) { calculateDayHours(parseInt(m[2])); calculateTotals(); DataManager.debouncedSave(); }
        }
        closeTimePicker(); return;
    }

    // ── Autocomplete modal ────────────────────────────────────────
    if (target.matches('.ac-manage-btn')) {
        ACManager.openModal(target.dataset.modal || 'client'); return;
    }
    if (target.matches('.clients-modal-close, .ac-modal-close')) {
        ACManager.closeModal(); return;
    }
    if (target.matches('.clients-modal-del, .ac-modal-del')) {
        const name = target.dataset.deleteAc;
        if (name) ACManager.deleteFromModal(name); return;
    }

    // ── Ajout client supplémentaire ───────────────────────────────
    if (target.matches('.add-client-line-btn')) {
        const day    = parseInt(target.dataset.day);
        const period = target.dataset.period;
        if (!isNaN(day) && period) addClientEntry(day, period);
        return;
    }

    // ── Suppression km / frais ────────────────────────────────────
    if (target.matches('.remove-expense-btn')) {
        target.closest('.expense-item')?.remove();
        calculateTotals();
        DataManager.saveWeek();
        return;
    }

    // ── Suppression client supplémentaire ─────────────────────────
    if (target.matches('[data-action="remove-client"]')) {
        const entry = target.closest('.client-entry');
        if (entry) {
            const card    = entry.closest('.day-card');
            const cards   = Array.from(document.querySelectorAll('.day-card'));
            const dayIdx  = cards.indexOf(card);
            entry.remove();
            DataManager.saveWeek();
            if (dayIdx >= 0) calculateDayHours(dayIdx);
        }
        return;
    }

    // ── Dark mode toggle ──────────────────────────────────────────
    if (target.matches('#darkToggle') || target.closest('#darkToggle')) {
        _toggleDarkMode();
        return;
    }
});

// ── Scroll : cacher/afficher le footer ───────────────────────────
// Le header est en flux normal (position:relative) → il remonte
// naturellement avec la page, aucun JS nécessaire de ce côté.
// Seul le footer fixe est masqué lors du scroll vers le bas.
let _lastScrollTop = 0;
window.addEventListener('scroll', () => {
    const st            = window.pageYOffset || document.documentElement.scrollTop;
    const footer        = document.querySelector('.summary-footer');
    const scrollingDown = st > _lastScrollTop && st > 60;

    if (footer) footer.classList.toggle('hidden', scrollingDown);

    _lastScrollTop = Math.max(0, st);
}, { passive: true });

function exportToExcel() {
    if (typeof XLSX === 'undefined') {
        showToast('⚠️ Export Excel indisponible hors-ligne');
        return;
    }
    try {
        const company = document.getElementById('companyName').value || 'Entreprise';
        const name    = document.getElementById('employeeName').value || 'Employé';
        const wb      = XLSX.utils.book_new();
        const endDate = new Date(state.currentWeekStart);
        endDate.setDate(endDate.getDate() + 6);

        // ── Styles ───────────────────────────────────────────────
        const sHeader   = { font:{ bold:true, sz:14, color:{rgb:'FFFFFF'} }, fill:{fgColor:{rgb:'FD636B'}}, alignment:{horizontal:'left',vertical:'center'} };
        const sInfo     = { font:{ bold:true, sz:9, color:{rgb:'FFFFFF'} }, fill:{fgColor:{rgb:'444444'}}, alignment:{horizontal:'left'} };
        const sInfoVal  = { font:{ sz:9, color:{rgb:'FFFFFF'} }, fill:{fgColor:{rgb:'444444'}}, alignment:{horizontal:'left'} };
        const sColHead  = { font:{ bold:true, sz:9, color:{rgb:'FFFFFF'} }, fill:{fgColor:{rgb:'222222'}}, alignment:{horizontal:'center',vertical:'center'} };
        const sDayA     = { font:{ sz:9 }, fill:{fgColor:{rgb:'FFFFFF'}}, alignment:{vertical:'center'} };
        const sDayB     = { font:{ sz:9 }, fill:{fgColor:{rgb:'F7F7F7'}}, alignment:{vertical:'center'} };
        const sDayABold = { font:{ bold:true, sz:9 }, fill:{fgColor:{rgb:'FFFFFF'}}, alignment:{vertical:'center'} };
        const sDayBBold = { font:{ bold:true, sz:9 }, fill:{fgColor:{rgb:'F7F7F7'}}, alignment:{vertical:'center'} };
        const sSpecA    = { font:{ sz:9, color:{rgb:'888888'}, italic:true }, fill:{fgColor:{rgb:'FFF5F5'}}, alignment:{vertical:'center'} };
        const sSpecB    = { font:{ sz:9, color:{rgb:'888888'}, italic:true }, fill:{fgColor:{rgb:'FFF5F5'}}, alignment:{vertical:'center'} };
        const sTotHead  = { font:{ bold:true, sz:10, color:{rgb:'FFFFFF'} }, fill:{fgColor:{rgb:'222222'}} };
        const sTotLbl   = { font:{ bold:true, sz:9 }, fill:{fgColor:{rgb:'F0F0F0'}} };
        const sTotVal   = { font:{ bold:true, sz:9, color:{rgb:'FD636B'} }, fill:{fgColor:{rgb:'F0F0F0'}}, alignment:{horizontal:'right'} };

        const ws   = {};
        const COLS = 11;
        let r = 0;

        const setCell = (row, col, value, style) => {
            const addr = XLSX.utils.encode_cell({ r: row, c: col });
            ws[addr] = { v: value, t: typeof value === 'number' ? 'n' : 's', s: style };
        };
        const mergeCells = (r1, c1, r2, c2) => {
            if (!ws['!merges']) ws['!merges'] = [];
            ws['!merges'].push({ s:{r:r1,c:c1}, e:{r:r2,c:c2} });
        };

        // En-tête principal
        setCell(r, 0, company.toUpperCase(), sHeader);
        for (let c = 1; c < COLS; c++) setCell(r, c, '', sHeader);
        mergeCells(r, 0, r, COLS - 1); r++;

        setCell(r, 0, 'FEUILLE HEBDOMADAIRE', sInfo);
        for (let c = 1; c < COLS; c++) setCell(r, c, '', sInfo);
        mergeCells(r, 0, r, COLS - 1); r++;

        // Infos employé / semaine
        [
            ['Employé', name, 'Semaine', `${formatDateFull(state.currentWeekStart)} — ${formatDateFull(endDate)}`],
            ['Export',  new Date().toLocaleDateString('fr-CH'), '', ''],
        ].forEach(row => {
            setCell(r, 0, row[0], sInfo); setCell(r, 1, row[1], sInfoVal);
            mergeCells(r, 1, r, 4);
            setCell(r, 5, row[2], sInfo); setCell(r, 6, row[3], sInfoVal);
            mergeCells(r, 6, r, COLS - 1);
            for (let c = 2; c <= 4; c++) setCell(r, c, '', sInfoVal);
            for (let c = 7; c < COLS; c++) setCell(r, c, '', sInfoVal);
            r++;
        });

        r++; // ligne vide

        // En-têtes colonnes
        ['Date','Jour','Période','Client','Début','Fin','Heures','Description','Lieu','KM','Frais/Repas']
            .forEach((h, c) => setCell(r, c, h, sColHead));
        r++;

        let dayParity = 0;
        for (let i = 0; i < 7; i++) {
            const date    = new Date(state.currentWeekStart);
            date.setDate(date.getDate() + i);
            const kmDiv   = document.getElementById(`km_${i}`);
            const kmTotal = kmDiv ? Array.from(kmDiv.querySelectorAll('input[type="number"]'))
                .reduce((s, inp) => s + (parseFloat(inp.value) || 0), 0) : 0;
            const meal    = document.getElementById(`meal_${i}`)?.checked;
            let dayHasData = false;
            let dayHasAnyRow = false;

            const sNorm     = dayParity === 0 ? sDayA     : sDayB;
            const sNormBold = dayParity === 0 ? sDayABold : sDayBBold;
            const sSpec     = dayParity === 0 ? sSpecA    : sSpecB;

            ['am','pm'].forEach(period => {
                const start  = document.getElementById(`start_${i}_${period}`)?.value;
                const end    = document.getElementById(`end_${i}_${period}`)?.value;
                const client = document.getElementById(`client_${i}_${period}`)?.value;
                if (!((start && start !== '--:--') || (end && end !== '--:--') || client)) return;

                let mins = 0;
                if (start && start !== '--:--' && end && end !== '--:--') {
                    mins = timeToMinutes(end) - timeToMinutes(start);
                    if (mins < 0) mins += 1440;
                }
                const rowData = [
                    !dayHasData ? formatDateFull(date) : '',
                    !dayHasData ? C.DAYS_FR[date.getDay()] : '',
                    period === 'am' ? 'Matin' : 'Après-midi',
                    client || '',
                    (start && start !== '--:--') ? start : '',
                    (end   && end   !== '--:--') ? end   : '',
                    mins > 0 ? `${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}` : '',
                    document.getElementById(`desc_${i}_${period}`)?.value     || '',
                    document.getElementById(`location_${i}_${period}`)?.value || '',
                    !dayHasData ? (kmTotal > 0 ? String(kmTotal) : '') : '',
                    (!dayHasData && period === 'pm' && meal) ? 'Oui' : '',
                ];
                rowData.forEach((v, c) => setCell(r, c, v, c === 6 ? sNormBold : sNorm));
                r++; dayHasData = true; dayHasAnyRow = true;

                // Clients supplémentaires
                const cards = document.querySelectorAll('.day-card');
                if (cards[i]) {
                    const sections = cards[i].querySelectorAll('.period-section');
                    const section  = period === 'am' ? sections[0] : sections[1];
                    section?.querySelectorAll('.client-entry').forEach(entry => {
                        const eid = entry.dataset.entryId;
                        if (!eid) return;
                        const es = document.getElementById(`start_${i}_${period}_${eid}`)?.value || '';
                        const ee = document.getElementById(`end_${i}_${period}_${eid}`)?.value   || '';
                        let em2 = 0;
                        if (es && es !== '--:--' && ee && ee !== '--:--') {
                            em2 = timeToMinutes(ee) - timeToMinutes(es);
                            if (em2 < 0) em2 += 1440;
                        }
                        const xData = [
                            '','',
                            (period==='am'?'Matin':'Après-midi')+' (+)',
                            document.getElementById(`client_${i}_${period}_${eid}`)?.value || '',
                            es !== '--:--' ? es : '', ee !== '--:--' ? ee : '',
                            em2 > 0 ? `${Math.floor(em2/60)}h${String(em2%60).padStart(2,'0')}` : '',
                            document.getElementById(`desc_${i}_${period}_${eid}`)?.value    || '',
                            document.getElementById(`location_${i}_${period}_${eid}`)?.value || '',
                            '','',
                        ];
                        xData.forEach((v, c) => setCell(r, c, v, sNorm));
                        r++; dayHasAnyRow = true;
                    });
                }
            });

            // Frais
            document.getElementById(`expenses_${i}`)?.querySelectorAll('.expense-item').forEach(item => {
                const desc   = item.querySelector('input[type="text"]')?.value;
                const amount = item.querySelector('input[type="number"]')?.value;
                if (!desc && !amount) return;
                const fData = [
                    !dayHasData ? formatDateFull(date) : '',
                    !dayHasData ? C.DAYS_FR[date.getDay()] : '',
                    'Frais', desc||'','','','','','','', amount ? `${amount} CHF` : '',
                ];
                fData.forEach((v, c) => setCell(r, c, v, sSpec));
                r++; dayHasData = true; dayHasAnyRow = true;
            });

            // Repas
            if (meal) {
                const rData = [
                    !dayHasData ? formatDateFull(date) : '',
                    !dayHasData ? C.DAYS_FR[date.getDay()] : '',
                    'Repas','','','','','','','','✓',
                ];
                rData.forEach((v, c) => setCell(r, c, v, sSpec));
                r++; dayHasAnyRow = true;
            }

            if (dayHasAnyRow) dayParity = 1 - dayParity;
        }

        // Totaux
        r++;
        setCell(r, 0, 'TOTAUX DE LA SEMAINE', sTotHead);
        for (let c = 1; c < COLS; c++) setCell(r, c, '', sTotHead);
        mergeCells(r, 0, r, COLS - 1); r++;

        [
            ['Total heures',     document.getElementById('weekHours').textContent],
            ['Total kilomètres', document.getElementById('weekKm').textContent + ' km'],
            ['Total repas',      document.getElementById('weekMeals').textContent],
            ['Total frais',      document.getElementById('weekExpenses').textContent + ' CHF'],
        ].forEach(([label, val]) => {
            setCell(r, 0, label, sTotLbl);
            for (let c = 1; c < COLS - 1; c++) setCell(r, c, '', sTotLbl);
            setCell(r, COLS - 1, val, sTotVal);
            r++;
        });

        ws['!ref']  = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r-1,c:COLS-1} });
        ws['!cols'] = [{wch:12},{wch:11},{wch:14},{wch:22},{wch:7},{wch:7},{wch:8},{wch:28},{wch:18},{wch:6},{wch:12}];
        ws['!rows'] = [{hpt:22},{hpt:16},{hpt:14},{hpt:14},null,{hpt:16}];

        XLSX.utils.book_append_sheet(wb, ws, 'Feuille Heures');
        XLSX.writeFile(wb, `${company.replace(/\s/g,'_')}_${name.replace(/\s/g,'_')}_${formatDateFull(state.currentWeekStart).replace(/\./g,'-')}.xlsx`);

        // Feedback bouton (✓ temporaire)
        const btn = event?.target?.closest('.btn-export');
        if (btn) { const orig = btn.textContent; btn.textContent = '✓'; setTimeout(() => btn.textContent = orig, 1500); }

    } catch(e) { showToast('⚠️ Erreur export Excel'); }
}


function exportToPDF() {
    if (!window.jspdf) { showToast('⚠️ Librairie PDF non chargée — vérifiez la connexion'); return; }
    const { jsPDF } = window.jspdf;

    const name      = (document.getElementById('employeeName')?.value || 'Employé').trim();
    const company   = (document.getElementById('companyName')?.value  || 'Entreprise').trim();
    const endDate   = new Date(state.currentWeekStart);
    endDate.setDate(endDate.getDate() + 6);
    const weekStr   = `${formatDateFull(state.currentWeekStart)} – ${formatDateFull(endDate)}`;
    const todayStr  = new Date().toLocaleDateString('fr-CH');

    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const PW  = 210, ML = 14, MR = 14, CW = PW - ML - MR, PH = 297;

    // Palette
    const RED   = [60, 60, 80];
    const DARK  = [30, 30, 30];
    const MID   = [110, 110, 110];
    const LGREY = [245, 245, 248];
    const MGREY = [200, 200, 200];
    const WHITE = [255, 255, 255];
    const SPEC  = [240, 240, 245];

    // Helpers PDF
    const fillRect       = (x,y,w,h,rgb)                 => { doc.setFillColor(...rgb); doc.rect(x,y,w,h,'F'); };
    const strokeRect     = (x,y,w,h,rgb,lw)              => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.3); doc.rect(x,y,w,h,'S'); };
    const fillStrokeRect = (x,y,w,h,fill,stroke,lw)      => { doc.setFillColor(...fill); doc.rect(x,y,w,h,'F'); doc.setDrawColor(...stroke); doc.setLineWidth(lw||0.3); doc.rect(x,y,w,h,'S'); };
    const hLine          = (y,x1,x2,rgb,lw)              => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.2); doc.line(x1||ML,y,x2||ML+CW,y); };
    const vLine          = (x,y1,y2,rgb,lw)              => { doc.setDrawColor(...rgb); doc.setLineWidth(lw||0.15); doc.line(x,y1,x,y2); };
    const txt            = (str,x,y,opts)                 => { if(str) doc.text(String(str),x,y,opts||{}); };
    const truncate       = (str,maxW)                     => { if(!str) return ''; let s=str; while(s.length>1&&doc.getTextWidth(s)>maxW) s=s.slice(0,-1); return s.length<str.length?s+'…':s; };

    // Pied de page
    function drawFooter(pageNum, total) {
        fillRect(0, PH-9, PW, 9, [238,238,238]);
        hLine(PH-9, 0, PW, MGREY, 0.3);
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...MID);
        txt('MesHeures — smims909', ML, PH-3.5);
        txt(`Page ${pageNum} / ${total}`, PW/2, PH-3.5, {align:'center'});
        txt('Généré le '+todayStr, ML+CW, PH-3.5, {align:'right'});
    }

    // En-tête principal
    fillRect(0, 0, PW, 28, RED);
    hLine(25.5, 0, PW, WHITE, 0.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(...WHITE);
    txt(company.toUpperCase(), ML, 15);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(200,205,215);
    txt("FEUILLE D'HEURES HEBDOMADAIRE", ML+CW, 10, {align:'right'});
    doc.setTextColor(215,218,225);
    txt('Édité le '+todayStr, ML+CW, 15, {align:'right'});

    let y = 33;

    // Bloc infos employé / semaine
    fillStrokeRect(ML, y, CW, 18, LGREY, MGREY, 0.3);
    vLine(ML+CW/2-4, y+3, y+15, MGREY, 0.3);
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...MID);
    txt('Employé', ML+5, y+7);
    doc.setFont('helvetica','normal'); doc.setTextColor(...DARK);
    txt(name, ML+5+doc.getTextWidth('Employé')+4, y+7);
    doc.setFont('helvetica','bold'); doc.setTextColor(...MID);
    txt('Semaine', ML+CW/2, y+7);
    doc.setFont('helvetica','normal'); doc.setTextColor(...DARK);
    txt(weekStr, ML+CW/2+doc.getTextWidth('Semaine')+4, y+7);

    // Infos personnelles sur 2e ligne
    const firstName = (document.getElementById('firstName')?.value || '').trim();
    const lastName  = (document.getElementById('lastName')?.value  || '').trim();

    const city      = (document.getElementById('city')?.value      || '').trim();

    const countryVal= (document.getElementById('country')?.value   || '').trim();

    doc.setFontSize(8); doc.setTextColor(...MID);
    if (fullName) txt(fullName, ML+5, y+13);
    if (phone || email) txt([phone, email].filter(Boolean).join('  •  '), ML+CW/2, y+13);

    y += 23;

    // Construction des lignes du tableau
    const rows = [];
    for (let i = 0; i < 7; i++) {
        const date    = new Date(state.currentWeekStart);
        date.setDate(date.getDate() + i);
        const kmDiv   = document.getElementById(`km_${i}`);
        const kmTotal = kmDiv ? Array.from(kmDiv.querySelectorAll('input[type="number"]'))
            .reduce((s,inp) => s+(parseFloat(inp.value)||0), 0) : 0;
        const meal    = document.getElementById(`meal_${i}`)?.checked || false;
        let isFirst   = true;

        ['am','pm'].forEach(period => {
            const client = (document.getElementById(`client_${i}_${period}`)?.value || '').trim();
            const start  = document.getElementById(`start_${i}_${period}`)?.value || '';
            const end    = document.getElementById(`end_${i}_${period}`)?.value   || '';
            const desc   = (document.getElementById(`desc_${i}_${period}`)?.value || '').trim();
            if (!client && (!start || start === '--:--') && !desc) return;

            let mins = 0;
            if (start && start !== '--:--' && end && end !== '--:--') {
                mins = timeToMinutes(end) - timeToMinutes(start);
                if (mins < 0) mins += 1440;
            }
            const hStr    = mins > 0 ? `${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}` : '';
            const horaire = (start && start !== '--:--' && end && end !== '--:--') ? `${start} – ${end}` : '';

            rows.push({ jourStr: isFirst ? C.DAYS_FR[date.getDay()] : '', dateStr: isFirst ? formatDate(date) : '',
                period: period === 'am' ? 'Matin' : 'Après-midi', client, horaire, hStr,
                km: isFirst && kmTotal > 0 ? `${kmTotal} km` : '',
                frais: '', repas: false, isNew: isFirst, isSpec: false, dayIdx: i });
            isFirst = false;

            // Clients supplémentaires

                        em2 = timeToMinutes(ee) - timeToMinutes(es);
                        if (em2 < 0) em2 += 1440;
                    }
                    rows.push({ jourStr:'', dateStr:'',
                        period: period==='am'?'Matin':'Après-midi',
                        client: document.getElementById(`client_${i}_${period}_${eid}`)?.value || '',

                        hStr: em2>0?`${Math.floor(em2/60)}h${String(em2%60).padStart(2,'0')}`:'',

        // Frais

                frais: amountV ? `${parseFloat(amountV).toFixed(2)} CHF` : '', repas:false,
                isNew:isFirst, isSpec:true, dayIdx:i });
            isFirst = false;
        });

        // Repas
        if (meal) {
            rows.push({ jourStr: isFirst ? C.DAYS_FR[date.getDay()] : '', dateStr: isFirst ? formatDate(date) : '',
                period:'Repas', client:'', horaire:'', hStr:'', km:'',
                frais:'', repas:true, isNew:isFirst, isSpec:true, dayIdx:i });
        }
    }

    // Colonnes du tableau
    const COL    = { jour:32, period:22, client:52, horaire:30, heures:16, km:14, frais:16 };
    const xJour  = ML;
    const xPer   = xJour   + COL.jour;
    const xCli   = xPer    + COL.period;
    const xHor   = xCli    + COL.client;
    const xHeu   = xHor    + COL.horaire;
    const xKm    = xHeu    + COL.heures;
    const xFr    = xKm     + COL.km;
    const xEnd   = xFr     + COL.frais;
    const ROW_H  = 7, HEAD_H = 8, FOOT = 12, TOT_H = 42;
    let   pageNum = 1;

    function drawTableHeader(yh) {
        fillRect(ML, yh, CW, HEAD_H, DARK);
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...WHITE);
        const hy = yh+5.5;
        txt('JOUR / DATE',  xJour+3,              hy);
        txt('PÉRIODE',      xPer+2,               hy);
        txt('CLIENT',       xCli+2,               hy);
        txt('HORAIRE',      xHor+2,               hy);
        txt('HEURES',       xHeu+COL.heures/2,    hy, {align:'center'});
        txt('KM',           xKm +COL.km/2,        hy, {align:'center'});
        txt('FRAIS',        xFr +COL.frais/2,     hy, {align:'center'});
        return yh + HEAD_H;
    }
    function newPage() {
        doc.addPage(); pageNum++; y = 14;
        y = drawTableHeader(y);
    }

    // Alternance couleur par jour
    const dayBg = {}; let colorToggle = 0;
    rows.forEach(row => {
        if (!(row.dayIdx in dayBg)) { dayBg[row.dayIdx] = colorToggle; colorToggle = 1-colorToggle; }
    });
    const bgColors = [WHITE, LGREY];

    y = drawTableHeader(y);

    if (rows.length === 0) {
        fillRect(ML, y, CW, ROW_H*2, LGREY);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MID);
        txt('Aucune donnée pour cette semaine.', ML+CW/2, y+ROW_H, {align:'center'});
        y += ROW_H*2;
    }

    rows.forEach((row, idx) => {
        const isLast = idx === rows.length - 1;
        if (y + (isLast ? TOT_H : ROW_H+2) > PH - FOOT) newPage();

        const bg = row.isSpec ? SPEC : bgColors[dayBg[row.dayIdx] ?? 0];
        fillRect(ML, y, CW, ROW_H, bg);
        if (row.isNew) fillRect(ML, y, 1.5, ROW_H, [180,180,195]);

        [xPer, xCli, xHor, xHeu, xKm, xFr].forEach(xv => vLine(xv, y, y+ROW_H, MGREY, 0.1));
        hLine(y+ROW_H, ML, xEnd, [230,230,230], 0.15);

        const ty = y+4.8;

        if (row.jourStr) {
            doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...DARK);
            txt(row.jourStr, ML+4, ty);
            doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...MID);
            txt(row.dateStr, ML+4+doc.getTextWidth(row.jourStr)+1.5, ty);
        }

        if (row.isSpec) { doc.setFont('helvetica','italic'); doc.setFontSize(7.5); doc.setTextColor(90,90,110); }
        else { doc.setFont('helvetica', row.period==='Matin'?'bold':'normal'); doc.setFontSize(7.5); doc.setTextColor(...DARK); }
        txt(row.period, xPer+2, ty);

        doc.setFont('helvetica','normal'); doc.setFontSize(8);
        if (row.repas) { doc.setFont('helvetica','italic'); doc.setTextColor(...MID); txt('Repas remboursé', xCli+2, ty); }
        else if (row.client) { doc.setTextColor(...DARK); txt(truncate(row.client, COL.client-4), xCli+2, ty); }

        doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...DARK);
        if (row.horaire) txt(row.horaire, xHor+2, ty);

        if (row.hStr) { doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...RED); txt(row.hStr, xHeu+COL.heures/2, ty, {align:'center'}); }
        if (row.km)   { doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MID); txt(row.km, xKm+COL.km/2, ty, {align:'center'}); }

        const fraisVal = row.frais || (row.repas ? '✓' : '');
        if (fraisVal) {
            doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
            doc.setTextColor(row.repas?60:180, row.repas?140:60, row.repas?60:60);
            txt(fraisVal, xFr+COL.frais-2, ty, {align:'right'});
        }
        y += ROW_H;
    });

    hLine(y, ML, xEnd, DARK, 0.4); y += 8;

    // Totaux
    const BW = 82, BX = ML+CW-BW, TRWH = 6.5;
    if (y + 40 > PH - FOOT) { doc.addPage(); pageNum++; y = 14; }

    fillRect(BX, y, BW, 8, DARK);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...WHITE);
    txt('RÉCAPITULATIF', BX+BW/2, y+5.5, {align:'center'});
    y += 8;

    const totLines = [
        ['Total heures',     document.getElementById('weekHours')?.textContent     || '—'],
        ['Kilomètres',       (document.getElementById('weekKm')?.textContent       || '0')+' km'],
        ['Repas remboursés', document.getElementById('weekMeals')?.textContent     || '0'],
        ['Total frais',      (document.getElementById('weekExpenses')?.textContent || '0.00')+' CHF'],
    ];
    const totStartY = y;
    totLines.forEach(([lbl, val], idx) => {
        fillRect(BX, y, BW, TRWH, idx%2===0 ? LGREY : WHITE);
        hLine(y+TRWH, BX, BX+BW, MGREY, 0.15);
        doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...MID);
        txt(lbl, BX+4, y+TRWH-2);
        doc.setFont('helvetica','bold'); doc.setTextColor(...RED);
        txt(val, BX+BW-4, y+TRWH-2, {align:'right'});
        y += TRWH;
    });
    strokeRect(BX, totStartY-8, BW, totLines.length*TRWH+8, DARK, 0.4);
    y += 10;

    // Informations personnelles
    const piRows = [
        ['Prénom / Nom', fullName],
        ['Adresse',      [addr, cityLine].filter(Boolean).join(', ')],
        ['Téléphone',    phone],
        ['Email',        email],
        ['Pays',         countryVal],
    ].filter(([,v]) => v?.trim());

    if (piRows.length > 0) {
        const PIW = CW*0.6, PIH = piRows.length*6+10;
        if (y+PIH+6 > PH-FOOT) { doc.addPage(); pageNum++; y=14; }
        fillRect(ML, y, PIW, PIH, [248,249,252]);
        strokeRect(ML, y, PIW, PIH, MGREY, 0.3);
        fillRect(ML, y, 3, PIH, [100,120,200]);
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...MID);
        txt('INFORMATIONS PERSONNELLES', ML+7, y+6);
        piRows.forEach(([lbl,val], idx) => {
            const ry = y+11+idx*6;
            doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...MID);
            txt(lbl, ML+7, ry);
            doc.setFont('helvetica','normal'); doc.setTextColor(...DARK);
            txt(truncate(val, PIW-50), ML+40, ry);
        });
        y += PIH+6;
    }

    // Notes
    const notes = (document.getElementById('notes')?.value || '').trim();
    if (notes) {
        const noteLines = doc.splitTextToSize(notes, CW-10);
        const noteH = noteLines.length*4.5+12;
        if (y+noteH+4 > PH-FOOT) { doc.addPage(); pageNum++; y=14; }
        fillRect(ML, y, CW, noteH, LGREY);
        strokeRect(ML, y, CW, noteH, MGREY, 0.3);
        fillRect(ML, y, 3, noteH, [90,90,110]);
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...DARK);
        txt('NOTES COMPLÉMENTAIRES', ML+7, y+6);
        doc.setFont('helvetica','normal'); doc.setFontSize(8);
        txt(noteLines, ML+7, y+11);
    }

    // Pied de page sur toutes les pages
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) { doc.setPage(p); drawFooter(p, totalPages); }

    doc.save(`${company.replace(/\s+/g,'_')}_${name.replace(/\s+/g,'_')}_${formatDateFull(state.currentWeekStart).replace(/\./g,'-')}.pdf`);

    // Feedback bouton
    const btn = event?.target?.closest('.btn-pdf');
    if (btn) { const orig = btn.textContent; btn.textContent = '✓'; setTimeout(() => btn.textContent = orig, 1500); }
}

function _toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    _applyDarkIcons(isDark);
}

function _applyDarkIcons(on) {
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');
    const btn  = document.getElementById('darkToggle');
    const meta = document.getElementById('metaTheme');
    if (moon) moon.style.display = on ? 'none' : '';
    if (sun)  sun.style.display  = on ? '' : 'none';
    if (btn)  { btn.title = on ? 'Mode clair' : 'Mode sombre'; btn.setAttribute('aria-pressed', on ? 'true' : 'false'); }
    if (meta) meta.setAttribute('content', on ? '#1C1C22' : '#FFFFFF');
}

// Appliquer l'état initial (dark-mode déjà appliqué au html avant le body par le script anti-FOUC)
_applyDarkIcons(document.documentElement.classList.contains('dark-mode'));


/* ════════════════════════════════════════════════════════════════
   § 10 CURSEUR ROUGE ANIMÉ — placeholder "Entreprise"
════════════════════════════════════════════════════════════════ */

function _positionCursor(input, cursor) {
    const style    = window.getComputedStyle(input);
    const fontSize = parseFloat(style.fontSize);   /* 36px pour Poppins 800 2.25rem */

    /* ── Axe horizontal ─────────────────────────────────────────────
       On mesure la largeur rendue du placeholder via canvas,
       puis on place le curseur juste à gauche de la première lettre.
       L'input est text-align:center → le texte commence à :
         left_du_texte = (input.offsetWidth / 2) - (textWidth / 2)
       On soustrait 4px de marge optique entre trait et lettre.       */
    const canvas  = document.createElement('canvas');
    const ctx     = canvas.getContext('2d');
    ctx.font      = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
    const textW   = ctx.measureText(input.placeholder || 'Entreprise').width;
    const leftPx  = (input.offsetWidth  / 2) - (textW / 2) - 4;
    cursor.style.left = Math.max(0, leftPx) + 'px';

    /* ── Axe vertical ───────────────────────────────────────────────
       cap-height ≈ 0.73 × font-size pour Poppins ExtraBold.
       On centre ce segment sur le milieu vertical de l'input.
       offsetTop + offsetHeight/2 = centre absolu dans le container. */
    const capH   = Math.round(fontSize * 0.73);
    const midY   = input.offsetTop + input.offsetHeight / 2;
    cursor.style.top    = Math.round(midY - capH / 2) + 'px';
    cursor.style.height = capH + 'px';
}

function _syncCursor() {
    const input  = document.getElementById('companyName');
    const cursor = document.getElementById('companyCursor');
    if (!input || !cursor) return;
    /* Masqué dès que l'utilisateur tape ou que le champ est actif */
    const hide = input.value.trim() !== '' || document.activeElement === input;
    cursor.classList.toggle('hidden', hide);
    if (!hide) _positionCursor(input, cursor);
}

(document.fonts ? document.fonts.ready : Promise.resolve()).then(() => {
    const input  = document.getElementById('companyName');
    const cursor = document.getElementById('companyCursor');
    if (!input || !cursor) return;
    input.addEventListener('focus',  _syncCursor);
    input.addEventListener('blur',   _syncCursor);
    input.addEventListener('input',  _syncCursor);
    window.addEventListener('resize', () => {
        if (!cursor.classList.contains('hidden')) _positionCursor(input, cursor);
    });
    _syncCursor();
});


/* ════════════════════════════════════════════════════════════════
   § 11 SÉLECTEUR MOIS/ANNÉE RAPIDE
════════════════════════════════════════════════════════════════ */

(function initCalPicker() {
    const overlay  = document.getElementById('calPickerOverlay');
    const selMonth = document.getElementById('calPickerMonth');
    const selYear  = document.getElementById('calPickerYear');
    const btnOk    = document.getElementById('calPickerConfirm');
    const btnCan   = document.getElementById('calPickerCancel');
    const header   = document.getElementById('calendarHeader');
    const thisYear = new Date().getFullYear();

    for (let y = thisYear - 3; y <= thisYear + 2; y++) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        selYear.appendChild(opt);
    }

    header?.addEventListener('click', () => {
        selMonth.value = state.calendarViewMonth.getMonth();
        selYear.value  = state.calendarViewMonth.getFullYear();
        overlay.classList.add('visible');
    });
    btnOk?.addEventListener('click', () => {
        state.calendarViewMonth = new Date(parseInt(selYear.value), parseInt(selMonth.value), 1);
        overlay.classList.remove('visible');
        renderCalendar();
    });
    btnCan?.addEventListener('click', () => overlay.classList.remove('visible'));
    overlay?.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('visible'); });
})();


/* ════════════════════════════════════════════════════════════════
   § 12 INITIALISATION
════════════════════════════════════════════════════════════════ */

(function init() {
    // Synchroniser calendarViewMonth avec la semaine actuelle
    state.calendarViewMonth = new Date(state.currentWeekStart);

    // Charger le nom de l'entreprise depuis localStorage
    const savedCompany = localStorage.getItem('companyName');
    if (savedCompany) document.getElementById('companyName').value = savedCompany;

    // Sauvegarde automatique toutes les 2 minutes
    setInterval(() => DataManager.saveWeek(), 120000);

    // Sauvegarde avant fermeture
    window.addEventListener('beforeunload', () => DataManager.saveWeek());

    // Avertissement hors-ligne (une seule fois par session)
    if (!navigator.onLine) {
        setTimeout(() => showToast('📴 Mode hors-ligne — exports Excel/PDF indisponibles'), 2000);
    }

    // Démarrer : tenter de restaurer depuis IndexedDB si localStorage vide,
    // puis afficher la semaine
    DataManager.idb.restoreIfNeeded().then(wasRestored => {
        const savedCompany2 = localStorage.getItem('companyName');
        if (savedCompany2) document.getElementById('companyName').value = savedCompany2;
        renderWeek();
        if (wasRestored) {
            setTimeout(() => showToast('✓ Données récupérées automatiquement'), 800);
        }
    }).catch(() => {
        // Fallback : lancer l'app même si IDB échoue
        renderWeek();
    });

})();

    </script>
