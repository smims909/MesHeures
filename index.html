    document.querySelectorAll('.day-card.expanded').forEach(card => {
        card.classList.remove('expanded');
        card.querySelector('.day-title')?.setAttribute('aria-expanded', 'false');
    });
}

// ── Scroller le calendrier vers la date d'une carte ──────────────
// Règle d'or respectée : aucun inline style. Le flash visuel utilise
// la classe CSS .cal-flash définie dans §7 (Calendar).
function _jumpCalendarToDate(date) {
    state.calendarViewMonth = new Date(date);
    renderCalendar();
    document.querySelector('.calendar-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Flash bref : ajoute la classe, la retire après 900ms
    setTimeout(() => {
        document.querySelectorAll('.calendar-day:not(.other-month)').forEach(d => {
            if (parseInt(d.textContent) === date.getDate()) {
                d.classList.add('cal-flash');
                setTimeout(() => d.classList.remove('cal-flash'), 900);
            }
        });
    }, 150);
}

// ── Copie automatique : 1re entrée (am) → 2e entrée (pm) ─────────
function autoFillSecondEntry(dayIndex, fromEntryId) {
    // Vérifier que fromEntryId est bien la dernière entrée AM
    var amCont = document.getElementById('entries_am_' + dayIndex);
    if (!amCont) return;
    var amBlocks = Array.from(amCont.querySelectorAll('.entry-block[data-entry-id]'));
    if (!amBlocks.length) return;
    if (amBlocks[amBlocks.length - 1].dataset.entryId !== fromEntryId) return;

    // Copier client + desc + location vers la première entrée PM (si champs vides)
    var pmCont = document.getElementById('entries_pm_' + dayIndex);
    if (!pmCont) return;
    var firstPm = pmCont.querySelector('.entry-block[data-entry-id]');
    if (!firstPm) return;
    var pmId = firstPm.dataset.entryId;

    ['client', 'desc', 'location'].forEach(function(f) {
        var src = document.getElementById(f + '_' + dayIndex + '_' + fromEntryId);
        var dst = document.getElementById(f + '_' + dayIndex + '_' + pmId);
        if (src && dst && src.value && !dst.value) dst.value = src.value;
    });
}

// ── Ajouter une entrée de travail ──────────────────────────────────
function addEntry(dayIndex, period, savedData) {
    var per = period || 'pm';
    var container = document.getElementById('entries_' + per + '_' + dayIndex);
    if (!container) return;
    var entryId = (savedData && savedData.id) ? savedData.id : _newEntryId();
    var extraCount = container.querySelectorAll('.entry-extra').length;
    var label = _entryLabel(entryId, extraCount);
    container.insertAdjacentHTML('beforeend', _entryHTML(dayIndex, entryId, label, per));

        function setF(fid, val) { var el = document.getElementById(fid); if (el) el.value = val || ''; }
        setF('client_'   + i + '_' + entryId, savedData.client);
        setF('start_'    + i + '_' + entryId, savedData.start);
        setF('end_'      + i + '_' + entryId, savedData.end);
        setF('desc_'     + i + '_' + entryId, savedData.desc);
        setF('location_' + i + '_' + entryId, savedData.location);
    }
}

// ── Calcul heures d'un jour ───────────────────────────────────────
function calculateDayHours(dayIndex) {
    var errors     = validateTimeSlots(dayIndex);
    var invalidSet = new Set(errors.map(function(e) { return e.id; }));
    var dayMinutes = 0;

    document.querySelectorAll('[id^="start_' + dayIndex + '_"]').forEach(function(startEl) {
        var entryId = startEl.id.replace('start_' + dayIndex + '_', '');
        if (invalidSet.has(entryId)) return;
        var endEl = document.getElementById('end_' + dayIndex + '_' + entryId);
        var s = startEl.value;
        var e = endEl ? endEl.value : '';
        if (s && e && s !== '--:--' && e !== '--:--' && e > s) {
            dayMinutes += timeToMinutes(e) - timeToMinutes(s);
        }
    });

    // Déduire la pause du jour
    var _pMin = _getDayPauseMins(dayIndex);
    if (_pMin > 0) dayMinutes = Math.max(0, dayMinutes - _pMin);

    var display = document.getElementById('hours_day_' + dayIndex);
    if (display) {
        if (errors.length > 0) {
            display.textContent = '⚠ Erreur';
            display.classList.add('hours-error');
        } else {
            display.textContent = Math.floor(dayMinutes / 60) + 'h' + String(dayMinutes % 60).padStart(2, '0');
            display.classList.remove('hours-error');
        }
    }

    var card = document.querySelector('.day-card[data-day-index="' + dayIndex + '"]');
    if (card) {
        card.classList.toggle('has-data', dayMinutes > 0);
        var _btn = document.querySelectorAll('.day-shortcut')[dayIndex];
        if (_btn) _btn.classList.toggle('sc-has-data', dayMinutes > 0);
    }
    calculateTotals();
}

// ── Totaux semaine (footer + weekly-total) ───────────────────────
// Les créneaux invalides sont exclus du total : on valide chaque jour
// avant de sommer, et on ignore les slots en erreur ou incomplets.
// Le workaround "mins < 0 → +1440" est supprimé : une plage 13:00–07:00
// est invalide (refusée par validateTimeSlots) et ne doit jamais compter.
function calculateTotals() {
    var totalMinutes = 0, totalKm = 0, totalMeals = 0, totalExpenses = 0;

    for (var i = 0; i < 7; i++) {
        var dayErrors  = validateTimeSlots(i);
        var invalidSet = new Set(dayErrors.map(function(e) { return e.id; }));
        var dayMinsRaw = 0;

        document.querySelectorAll('[id^="start_' + i + '_"]').forEach(function(startEl) {
            var entryId = startEl.id.replace('start_' + i + '_', '');
            if (invalidSet.has(entryId)) return;
            var endEl = document.getElementById(startEl.id.replace('start_', 'end_'));
            if (!startEl.value || !endEl || !endEl.value
                || startEl.value === '--:--' || endEl.value === '--:--') return;
            var mins = timeToMinutes(endEl.value) - timeToMinutes(startEl.value);
            if (mins > 0) dayMinsRaw += mins;
        });

        // Déduire la pause si activée
        var _tActive = document.getElementById('pauseActive_' + i);
        var _tMin = (_tActive && _tActive.checked) ? _getDayPauseMins(i) : 0;
        var dayMinsNet = dayMinsRaw > 0 ? Math.max(0, dayMinsRaw - _tMin) : 0;
        totalMinutes += dayMinsNet;

        var vehEl = document.getElementById('vehicule_' + i);
        if (vehEl) vehEl.querySelectorAll('[data-km-amount]')
            .forEach(function(inp) { totalKm += parseFloat(inp.value) || 0; });
        var _rActiveEl = document.getElementById('repasActive_' + i);
        var _rAmtEl    = document.getElementById('repasAmount_'  + i);
        if (_rActiveEl && _rActiveEl.checked) {
            totalMeals++;
            totalExpenses += parseFloat(_rAmtEl && _rAmtEl.value) || 0;
        }
        var fourEl = document.getElementById('fournitures_' + i);
        if (fourEl) fourEl.querySelectorAll('input[type="number"]')
            .forEach(function(inp) { totalExpenses += parseFloat(inp.value) || 0; });
        var vehEl2 = document.getElementById('vehicule_' + i);
        if (vehEl2) vehEl2.querySelectorAll('[data-km-amount]')
            .forEach(function() {}); // km déjà compté plus haut
    }

    var h   = Math.floor(totalMinutes / 60);
    var m   = totalMinutes % 60;
    var fmt = h + 'h' + String(m).padStart(2, '0');

    document.getElementById('weeklyTotal').textContent  = fmt;
    document.getElementById('weekHours').textContent    = fmt;
    document.getElementById('weekKm').textContent       = Math.round(totalKm);
    document.getElementById('weekMeals').textContent    = totalMeals;
    document.getElementById('weekExpenses').textContent = totalExpenses.toFixed(2);
}

// ── Calendrier mensuel ────────────────────────────────────────────
function renderCalendar() {
    const today    = new Date();
    const month    = state.calendarViewMonth.getMonth();
    const year     = state.calendarViewMonth.getFullYear();
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    const startDay = (firstDay.getDay() + 6) % 7; // Lundi = 0

    document.getElementById('calendarHeader').textContent = `${C.MONTHS_FR[month]} ${year}`;

    // Jours du mois actuel ayant des heures saisies
    const daysWithHours = new Set();
    Object.keys(localStorage).forEach(key => {
        if (!key.startsWith('week_')) return;
        try {
            const weekData = JSON.parse(localStorage.getItem(key));
            if (!weekData || !weekData.days) return;
            const weekDate = _parseWeekKey(key);
            weekData.days.forEach((day, i) => {
                if (!day) return;
                const d = new Date(weekDate);
                d.setDate(d.getDate() + i);
                if (d.getMonth() === month && d.getFullYear() === year) {
                    var isValidT = function(t) { return t && t !== '--:--' && t !== ''; };
                    var hasHours = _normalizeDayEntries(day).some(function(entry) {
                        return isValidT(entry.start) && isValidT(entry.end) && entry.end > entry.start;
                    });
                    if (hasHours) daysWithHours.add(d.getDate());
                }
            });
        } catch(e) {}
    });

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // En-têtes (L M M J V S D)
    C.DAY_LABELS.forEach(label => {
        const el = document.createElement('div');
        el.className   = 'calendar-day-label';
        el.textContent = label;
        grid.appendChild(el);
    });

    // Jours du mois précédent (grisés)
    const prevLastDay = new Date(year, month, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className   = 'calendar-day other-month';
        el.textContent = prevLastDay - i;
        grid.appendChild(el);
    }

    // Jours du mois actuel
    for (let i = 1; i <= lastDay.getDate(); i++) {
        const el       = document.createElement('div');
        const dayDate  = new Date(year, month, i);
        el.className   = 'calendar-day';
        el.textContent = i;
        el.setAttribute('role', 'gridcell');
        el.setAttribute('aria-label', `${i} ${C.MONTHS_FR[month]} ${year}`);

        if (dayDate.toDateString() === today.toDateString()) el.classList.add('today');
        if (daysWithHours.has(i)) el.classList.add('has-hours');

        el.addEventListener('click', () => {
            const clickedDate    = new Date(year, month, i);
            const dow            = clickedDate.getDay();
            const mondayOffset   = dow === 0 ? -6 : 1 - dow;
            state.currentWeekStart = new Date(clickedDate);
            state.currentWeekStart.setDate(clickedDate.getDate() + mondayOffset);
            state.currentWeekStart.setHours(0, 0, 0, 0);
            state.calendarViewMonth = new Date(state.currentWeekStart);
            // Fermer les overlays ouverts
            TP.cancel();
            document.body.style.overflow = '';
            var _ac = document.getElementById('acModalOverlay');
            if (_ac) _ac.classList.remove('open');
            renderWeek();

            // ── Dépliage + scroll vers la carte du jour cliqué ────────────
            // 150ms : laisser renderWeek() terminer son rendu DOM avant de scroller.
            setTimeout(() => {
                const cards       = document.querySelectorAll('.day-card');
                // Conversion JS (0=dim) → index carte (0=lun … 6=dim)
                const targetIndex = dow === 0 ? 6 : dow - 1;
                const targetCard  = cards[targetIndex];
                if (!targetCard) return;

                // Dépliage : toujours forcer pour permettre la saisie immédiate
                if (!targetCard.classList.contains('expanded')) {
                    targetCard.classList.add('expanded');
                    const titleEl = targetCard.querySelector('.day-title');
                    if (titleEl) titleEl.setAttribute('aria-expanded', 'true');
                }

                // Scroll : le bandeau titre s'arrête pile en haut de l'écran.
                // block:'start' positionne le bord supérieur de la carte au bord
                // supérieur du viewport — sans offset JS ni inline style.
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
        });
        grid.appendChild(el);
    }

    // Compléter la grille avec les jours du mois suivant
    const remaining = 7 - ((grid.children.length - 7) % 7);
    if (remaining < 7) {
        for (let i = 1; i <= remaining; i++) {
            const el = document.createElement('div');
            el.className   = 'calendar-day other-month';
            el.textContent = i;
            grid.appendChild(el);
        }
    }
}


/* ════════════════════════════════════════════════════════════════
   § 6  TIME PICKER PERSONNALISÉ
   Grille heures (0-23) + grille minutes (0-55 par pas de 5)
   Passage automatique vers les minutes après sélection d'une heure
════════════════════════════════════════════════════════════════ */

// ── Time Picker — natif iOS/Android ──────────────────────────────
// Un seul <input type="time"> invisible, positionné sur le champ tapé.
// .click() appelé directement dans le handler utilisateur (requis iOS).
// ── Time Picker — Tambour à défilement ───────────────────────────
var TP = (function() {
    var ITEM_H = 44;

    function _buildDrum(el, count, step) {
        el.innerHTML = '';
        el.appendChild(_pad());
        for (var i = 0; i < count; i++) {
            var v = i * step;
            var div = document.createElement('div');
            div.className = 'tp-drum-item';
            div.textContent = String(v).padStart(2,'0');
            div.dataset.val = v;
            el.appendChild(div);
        }
        el.appendChild(_pad());
    }
    function _pad() {
        var d = document.createElement('div');
        d.className = 'tp-drum-pad';
        return d;
    }
    function _scrollTo(drum, val, smooth) {
        var items = drum.querySelectorAll('.tp-drum-item');
        for (var i = 0; i < items.length; i++) {
            if (parseInt(items[i].dataset.val) === val) {
                drum.scrollTo({ top: i * ITEM_H, behavior: smooth ? 'smooth' : 'instant' });
                break;
            }
        }
    }
    function _readDrum(drum) {
        var idx = Math.round(drum.scrollTop / ITEM_H);
        var items = drum.querySelectorAll('.tp-drum-item');
        return items[idx] ? parseInt(items[idx].dataset.val) : 0;
    }
    function _updateSelected(drum) {
        var idx = Math.round(drum.scrollTop / ITEM_H);
        drum.querySelectorAll('.tp-drum-item').forEach(function(el, i) {
            el.classList.toggle('tp-selected', i === idx);
        });
    }
    function _bindDrum(drum) {
        // Éviter les doublons de listeners
        var fresh = drum.cloneNode(true);
        drum.parentNode.replaceChild(fresh, drum);
        var t;
        fresh.addEventListener('scroll', function() {
            clearTimeout(t);
            _updateSelected(fresh);
            t = setTimeout(function() {
                var idx = Math.round(fresh.scrollTop / ITEM_H);
                fresh.scrollTo({ top: idx * ITEM_H, behavior: 'smooth' });
                _updateSelected(fresh);
            }, 80);
        }, { passive: true });
        return fresh;
    }

    // ── Suggestions depuis localStorage (v1 + v2 via _normalizeDayEntries) ──
    function _getTopTimes(isStart) {
        var freq = {};
        var isValidT = function(t) { return t && t !== '--:--' && /^\d{2}:\d{2}$/.test(t); };
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (!key || key.indexOf('week_') !== 0) continue;
            try {
                var data = JSON.parse(localStorage.getItem(key));
                if (!data || !data.days) continue;
                data.days.forEach(function(day) {
                    _normalizeDayEntries(day).forEach(function(entry) {
                        var t = isStart ? entry.start : entry.end;
                        if (isValidT(t)) freq[t] = (freq[t] || 0) + 1;
                    });
                });
            } catch(e) {}
        }
        return Object.keys(freq).sort(function(a,b) { return freq[b]-freq[a]; }).slice(0, 4);
    }

    function _injectSuggestions(input) {
        var row = document.getElementById('tpSuggestRow');
        if (!row) return;
        row.innerHTML = '';
        var id = input.id || '';
        var isStart = /^start_/.test(id);
        _getTopTimes(isStart).forEach(function(time) {
            var chip = document.createElement('button');
            chip.className = 'tp-suggest-chip';
            chip.textContent = time;
            chip.type = 'button';
            chip.addEventListener('click', function() {
                _applyTime(time);
                _close();
            });
            row.appendChild(chip);
        });
    }

    // ── Appliquer une valeur et sauvegarder ──────────────────────
    function _applyTime(timeValue) {
        if (!state.currentTimeInput) return;
        state.currentTimeInput.value = timeValue;
        var match = state.currentTimeInput.id.match(/^(start|end)_(\d+)_(.+)/);
        if (match) {
            var dayIndex = parseInt(match[2]);
            _clearAllDayErrors(dayIndex);
            var errors = validateTimeSlots(dayIndex);
            if (errors.length > 0) {
                var shown = new Set();
                errors.forEach(function(err) {
                    if (!shown.has(err.id)) {
                        showTimeError(dayIndex, err.id, err.msg);
                        shown.add(err.id);
                    }
                });
                return;
            }
            calculateDayHours(dayIndex);
            DataManager.saveWeek();
            renderCalendar();
        }
    }

    function _close() {
        var overlay = document.getElementById('tpOverlay');
        if (overlay) overlay.classList.remove('tp-open');
        document.body.style.overflow = '';
        state.currentTimeInput = null;
    }

    function open(input) {
        state.currentTimeInput = input;

        var drumH = document.getElementById('tpDrumH');
        var drumM = document.getElementById('tpDrumM');
        if (!drumH || !drumM) return;

        _buildDrum(drumH, 24, 1);
        _buildDrum(drumM, 12, 5);

        var h = 8, m = 0;
        var val = input.value;
        if (val && val !== '--:--' && /^\d{2}:\d{2}$/.test(val)) {
            var p = val.split(':').map(Number);
            h = p[0];
            m = Math.round(p[1] / 5) * 5; if (m >= 60) m = 55;
        } else {
            var now = new Date();
            h = now.getHours();
            m = Math.round(now.getMinutes() / 5) * 5; if (m >= 60) m = 55;
        }

        drumH = _bindDrum(drumH);
        drumM = _bindDrum(drumM);

        // Scroll après que les éléments sont dans le DOM
        requestAnimationFrame(function() {
            _scrollTo(drumH, h, false);
            _scrollTo(drumM, m, false);
            _updateSelected(drumH);
            _updateSelected(drumM);
        });

        _injectSuggestions(input);

        var overlay = document.getElementById('tpOverlay');
        overlay.classList.add('tp-open');
        document.body.style.overflow = 'hidden';
    }

    function confirm() {
        var drumH = document.getElementById('tpDrumH');
        var drumM = document.getElementById('tpDrumM');
        var h = _readDrum(drumH);
        var m = _readDrum(drumM);
        _applyTime(String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'));
        _close();
    }

    function cancel() {
        if (state.currentTimeInput) {
            state.currentTimeInput.value = '--:--';
            var match = state.currentTimeInput.id.match(/^(start|end)_(\d+)_(.+)/);
            if (match) {
                var dayIndex = parseInt(match[2]);
                _clearAllDayErrors(dayIndex);
                calculateDayHours(dayIndex);
                calculateTotals();
                DataManager.debouncedSave();
            }
        }
        _close();
    }

    return { open: open, confirm: confirm, cancel: cancel };
})();

function openCustomTimePicker(input) { TP.open(input); }


/* ════════════════════════════════════════════════════════════════
   § 7  ÉVÉNEMENTS — Event Delegation unique
   Un seul document.addEventListener('click') pour tout gérer.

document.addEventListener('click', function(e) {

    // ── Ajouter client AM/PM ─────────────────────────────────────
    const _amBtn = e.target.closest('.add-entry-am');
    if (_amBtn) { const d=parseInt(_amBtn.dataset.day); if(!isNaN(d)) addEntry(d,'am'); return; }
    const _pmBtn = e.target.closest('.add-entry-pm');
    if (_pmBtn) { const d=parseInt(_pmBtn.dataset.day); if(!isNaN(d)) addEntry(d,'pm'); return; }

    // ── Ajouter dépense (véhicule / fournitures / divers) ────────
    const _depBtn = e.target.closest('.add-depense-btn');
    if (_depBtn) {
        const d=parseInt(_depBtn.dataset.day), t=_depBtn.dataset.type;
        if(!isNaN(d) && t) addDepense(d, t);
        return;
    }

    // ── Ouvrir/fermer section Frais ──────────────────────────────
    if (e.target.closest('[data-action="toggle-frais"]')) {
        const fs = e.target.closest('.frais-section');
        if (fs) fs.classList.toggle('expanded');
        return;
    }

    // ── Time picker : inputs readonly ─────────────────────────────
    const timeInput = e.target.closest('input[data-timepicker="true"]');
    if (timeInput) { openCustomTimePicker(timeInput); return; }

    // ── Clic sur .day-date → sauter au calendrier ─────────────────
    // (géré dans le listener de day-title dans renderWeek)

    // Suite sur les boutons uniquement
    const target = e.target.closest('button');
    if (!target) return;

    // ── Navigation semaine ────────────────────────────────────────
    if (target.matches('.week-prev')) { changeWeek(-1); return; }
    if (target.matches('.week-next')) { changeWeek(1); return; }

    // ── Navigation calendrier ─────────────────────────────────────
    if (target.matches('.cal-prev-month')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth() - 1, 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-next-month')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth() + 1, 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-prev-year')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear() - 1, state.calendarViewMonth.getMonth(), 1);
        renderCalendar(); return;
    }
    if (target.matches('.cal-next-year')) {
        state.calendarViewMonth = new Date(state.calendarViewMonth.getFullYear() + 1, state.calendarViewMonth.getMonth(), 1);
        renderCalendar(); return;
    }

    // ── Exports et actions ────────────────────────────────────────
    if (target.matches('.btn-export'))        { exportToExcel(); return; }
    if (target.matches('.btn-pdf'))           { exportToPDF(); return; }
    if (target.matches('.btn-clear'))         { DataManager.clearWeek(); return; }
    if (target.matches('.btn-backup-export')) { DataManager.exportBackup(); return; }
    if (target.matches('.btn-backup-import')) { document.getElementById('importFile').click(); return; }

    // ── Time picker — mode / OK / Annuler ────────────────────────


    // ── Time picker — boutons ─────────────────────────────────────
    if (target.id === 'tpBtnOk')     { TP.confirm(); return; }
    if (target.id === 'tpBtnCancel') { TP.cancel();  return; }
    if (e.target.id === 'tpOverlay') { TP.close();   return; }

    // ── Autocomplete modal ────────────────────────────────────────
    if (target.matches('.ac-manage-btn')) {
        ACManager.openModal(target.dataset.modal || 'client'); return;
    }
    if (target.matches('.clients-modal-close, .ac-modal-close')) {
        ACManager.closeModal(); return;
    }
    if (target.matches('.clients-modal-del, .ac-modal-del')) {
        const name = target.dataset.deleteAc;
        if (name) ACManager.deleteFromModal(name); return;
    }

    // ── add-entry-am/pm gérés avant target ──────────────────────

    // ── Supprimer une entrée de travail ───────────────────────────
    if (target.matches('[data-action="delete-entry"]')) {
        var block = target.closest('.entry-block');
        if (block) {
            var _card   = block.closest('.day-card');
            var _cards  = Array.from(document.querySelectorAll('.day-card'));
            var _dayIdx = _cards.indexOf(_card);
            DataManager.confirmToast('Supprimer ce client ?', function() {
                block.remove();
                if (_dayIdx >= 0) { _clearAllDayErrors(_dayIdx); calculateDayHours(_dayIdx); }
                DataManager.saveWeek();
            });
        }
        return;
    }

    // (clear-section supprimé — remplacé par delete-item par ligne)

    // ── toggle-frais géré avant target ──────────────────────────

    // ── Suppression d'une ligne de dépense (clic → confirmation) ─
    if (target.matches('[data-action="delete-item"]')) {
        var item = target.closest('.depense-item, .expense-item, .client-entry');
        if (!item) return;
        DataManager.confirmToast('Supprimer cette ligne ?', function() {
            var card   = item.closest('.day-card');
            var cards  = Array.from(document.querySelectorAll('.day-card'));
            var dayIdx = cards.indexOf(card);
            item.remove();
            calculateTotals();
            if (dayIdx >= 0) { _clearAllDayErrors(dayIdx); calculateDayHours(dayIdx); }
            DataManager.saveWeek();
        });
        return;
    }

    // ── Toggle client : géré dans le gestionnaire longpress ─────

    // ── Suppression client/entrée (action legacy — redirigée vers delete-entry) ─
    if (target.matches('[data-action="remove-client"]')) {
        var _entry = target.closest('.client-entry, .entry-extra');
        if (_entry) {
            var _c = _entry.closest('.day-card');
            var _cs = Array.from(document.querySelectorAll('.day-card'));
            var _di = _cs.indexOf(_c);
            _entry.remove();
            if (_di >= 0) { _clearAllDayErrors(_di); calculateDayHours(_di); }
            DataManager.saveWeek();
        }
        return;
    }

    // ── Dark mode toggle ──────────────────────────────────────────
    if (target.matches('#darkToggle') || target.closest('#darkToggle')) {
        _toggleDarkMode();
        return;
    }
});

function _doExportToExcelWeek() {
    if (!window.XLSX) { _ensureXLSX(_doExportToExcelWeek); return; }
    if (typeof XLSX === 'undefined') { showToast('Export Excel indisponible hors-ligne'); return; }
    try {
        var company = (document.getElementById('companyName') ? document.getElementById('companyName').value : 'Entreprise').trim() || 'Entreprise';
        var name    = (document.getElementById('employeeName') ? document.getElementById('employeeName').value : 'Employe').trim() || 'Employe';
        var cLegal  = (document.getElementById('companyLegalName') ? document.getElementById('companyLegalName').value : '').trim();
        var cAddr   = (document.getElementById('companyAddress')   ? document.getElementById('companyAddress').value   : '').trim();
        var cPhone  = (document.getElementById('companyPhone')     ? document.getElementById('companyPhone').value     : '').trim();
        var cEmail  = (document.getElementById('companyEmail')     ? document.getElementById('companyEmail').value     : '').trim();
        var wb      = XLSX.utils.book_new();
        var endDate = new Date(state.currentWeekStart); endDate.setDate(endDate.getDate() + 6);
        var isV     = function(t) { return t && t !== '--:--' && t !== ''; };

        // Styles
        var sHdr  = { font:{bold:true,sz:13,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'DC3240'}}, alignment:{horizontal:'left',vertical:'center'} };
        var sInfo = { font:{bold:true,sz:8,color:{rgb:'FFFFFF'}},  fill:{fgColor:{rgb:'282838'}}, alignment:{horizontal:'left'} };
        var sIVal = { font:{sz:8,color:{rgb:'FFFFFF'}},            fill:{fgColor:{rgb:'282838'}}, alignment:{horizontal:'left'} };
        var sCH   = { font:{bold:true,sz:8,color:{rgb:'FFFFFF'}},  fill:{fgColor:{rgb:'1C1C2E'}}, alignment:{horizontal:'center',wrapText:true} };
        var sA    = function(bold) { return { font:{bold:!!bold,sz:9}, fill:{fgColor:{rgb:'FFFFFF'}}, alignment:{vertical:'center',wrapText:false} }; };
        var sB    = function(bold) { return { font:{bold:!!bold,sz:9}, fill:{fgColor:{rgb:'F5F5FA'}}, alignment:{vertical:'center',wrapText:false} }; };
        var sSp   = { font:{sz:8,color:{rgb:'999999'},italic:true}, fill:{fgColor:{rgb:'FFF0F0'}}, alignment:{vertical:'center'} };
        var sHrs  = function(p) { return { font:{bold:true,sz:9,color:{rgb:'DC3240'}}, fill:{fgColor:p===0?{rgb:'FFFFFF'}:{rgb:'F5F5FA'}}, alignment:{horizontal:'center'} }; };
        var sTH   = { font:{bold:true,sz:9,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'1C1C2E'}} };
        var sTL   = { font:{bold:true,sz:9}, fill:{fgColor:{rgb:'EEEEEE'}} };
        var sTV   = { font:{bold:true,sz:9,color:{rgb:'DC3240'}}, fill:{fgColor:{rgb:'EEEEEE'}}, alignment:{horizontal:'right'} };

        var ws   = {};
        var COLS = 10; // Jour | Date | Periode | Client | Description | Lieu | Debut | Fin | Heures | KM+Frais
        var r    = 0;

        var setCell = function(row, col, value, style) {
            var addr = XLSX.utils.encode_cell({r:row,c:col});
            ws[addr] = { v: value, t: typeof value === 'number' ? 'n' : 's', s: style };
        };
        var mergeC = function(r1,c1,r2,c2) {
            if (!ws['!merges']) ws['!merges'] = [];
            ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});
        };

        // En-tete
        setCell(r,0,company.toUpperCase(),sHdr);
        for (var c=1;c<COLS;c++) setCell(r,c,'',sHdr);
        mergeC(r,0,r,COLS-1); r++;

        setCell(r,0,'Employe',sInfo); setCell(r,1,name,sIVal); mergeC(r,1,r,4);
        for (var c=2;c<=4;c++) setCell(r,c,'',sIVal);
        setCell(r,5,'Semaine',sInfo); setCell(r,6,formatDateFull(state.currentWeekStart)+' - '+formatDateFull(endDate),sIVal);
        mergeC(r,6,r,COLS-1); for (var c=7;c<COLS;c++) setCell(r,c,'',sIVal); r++;
        setCell(r,0,'Export',sInfo); setCell(r,1,new Date().toLocaleDateString('fr-CH'),sIVal);
        mergeC(r,1,r,COLS-1); for (var c=2;c<COLS;c++) setCell(r,c,'',sIVal); r++;

        if (cLegal||cAddr||cPhone||cEmail) {
            setCell(r,0,'Entreprise',sInfo);
            setCell(r,1,[cLegal,cAddr].filter(Boolean).join(', '),sIVal); mergeC(r,1,r,6);
            for (var c=2;c<=6;c++) setCell(r,c,'',sIVal);
            setCell(r,7,[cPhone,cEmail].filter(Boolean).join(' '),sIVal); mergeC(r,7,r,COLS-1);
            for (var c=8;c<COLS;c++) setCell(r,c,'',sIVal); r++;
        }

        r++; // vide

        // En-tetes colonnes
        // 0:Jour | 1:Date | 2:Periode | 3:Client | 4:Description | 5:Lieu | 6:Debut | 7:Fin | 8:Heures | 9:KM/Frais
        ['Jour','Date','Periode','Client','Description','Lieu','Debut','Fin','Heures','KM / Frais']
            .forEach(function(h,c) { setCell(r,c,h,sCH); });
        r++;

        var parity = 0; // alternance couleur par jour

        for (var i = 0; i < 7; i++) {
            var date   = new Date(state.currentWeekStart); date.setDate(date.getDate() + i);
            var jourStr = C.DAYS_FR[date.getDay()];
            var dateStr = formatDateFull(date);
            var vhDiv  = document.getElementById('vehicule_' + i);
            var kmTotal = vhDiv ? Array.from(vhDiv.querySelectorAll('[data-km-amount]'))
                .reduce(function(s,inp){ return s+(parseFloat(inp.value)||0); }, 0) : 0;
            var _rActEl = document.getElementById('repasActive_'+i);
            var _rAmt   = _rActEl && _rActEl.checked ? (parseFloat((document.getElementById('repasAmount_'+i)||{value:0}).value)||0) : 0;
            var hasAnyRow = false;
            var firstRowOfDay = r; // pour merge vertical jour+date

            var sR    = function(bold) { return parity===0 ? sA(bold) : sB(bold); };
            var sRHrs = sHrs(parity);

            // Entrées de travail (v3 DOM — AM + PM)
            var _xlsAllBlocks = [];
            ['am','pm'].forEach(function(per) {
                var c = document.getElementById('entries_' + per + '_' + i);
                if (c) c.querySelectorAll('.entry-block[data-entry-id]').forEach(function(b) { _xlsAllBlocks.push(b); });
            });
            if (_xlsAllBlocks.length > 0) {
                var _xwRaw=0;
                _xlsAllBlocks.forEach(function(b2){var s2=(document.getElementById('start_'+i+'_'+b2.dataset.entryId)||{value:''}).value,e2=(document.getElementById('end_'+i+'_'+b2.dataset.entryId)||{value:''}).value;if(isV(s2)&&isV(e2)){var m=timeToMinutes(e2)-timeToMinutes(s2);if(m>0)_xwRaw+=m;}});
                var _xwActive=(document.getElementById('pauseActive_'+i)||{}).checked;
                var _xwPL=_xwActive?Math.min(_getDayPauseMins(i),_xwRaw):0;
                _xlsAllBlocks.forEach(function(block) {
                    var eid = block.dataset.entryId;
                    var cl = (document.getElementById('client_'  +i+'_'+eid)||{value:''}).value.trim();
                    var st = (document.getElementById('start_'   +i+'_'+eid)||{value:''}).value;
                    var en = (document.getElementById('end_'     +i+'_'+eid)||{value:''}).value;
                    var de = (document.getElementById('desc_'    +i+'_'+eid)||{value:''}).value.trim();
                    var lo = (document.getElementById('location_'+i+'_'+eid)||{value:''}).value.trim();
                    if (!cl && !isV(st) && !de) return;
                    var mins = 0;
                    if (isV(st)&&isV(en)) { mins=timeToMinutes(en)-timeToMinutes(st); if(mins<0) mins+=1440; }
                    if(mins>0&&_xwPL>0){mins=Math.max(0,mins-_xwPL);_xwPL=0;}
                    var hStr = mins>0 ? Math.floor(mins/60)+'h'+String(mins%60).padStart(2,'0') : '';
                    var kmStr = !hasAnyRow && kmTotal>0 ? kmTotal+' km' : '';
                    setCell(r,0,jourStr,sR(false));
                    setCell(r,1,dateStr,sR(false));
                    setCell(r,2,'',sR(false));
                    setCell(r,3,cl,sR(false));
                    setCell(r,4,de,sR(false));
                    setCell(r,5,lo,sR(false));
                    setCell(r,6,isV(st)?st:'',sR(false));
                    setCell(r,7,isV(en)?en:'',sR(false));
                    setCell(r,8,hStr,sRHrs);
                    setCell(r,9,kmStr,sR(false));
                    r++; hasAnyRow=true;
                });
            }

            // Frais (v3 — fournitures + divers)
            ['fournitures'].forEach(function(dtype) {
                var dCont = document.getElementById(dtype + '_' + i);
                if (!dCont) return;
                dCont.querySelectorAll('.depense-item').forEach(function(item) {
                    var txts = item.querySelectorAll('input[type="text"]');
                    var cv = (txts[0]?txts[0].value:'').trim();
                    var dv = (txts[1]?txts[1].value:'').trim();
                    var av = (item.querySelector('input[type="number"]')?item.querySelector('input[type="number"]').value:'').trim();
                    if (!dv && !av) return;
                    var descFrais = cv ? dv + ' [' + cv + ']' : dv;
                    var catLbl = dtype === 'fournitures' ? 'Fournitures' : 'Divers';
                    setCell(r,0,jourStr,sSp); setCell(r,1,dateStr,sSp);
                    setCell(r,2,catLbl,sSp); setCell(r,3,descFrais,sSp);
                    for(var c=4;c<=7;c++) setCell(r,c,'',sSp);
                    setCell(r,8,'',sSp); setCell(r,9,av?parseFloat(av).toFixed(2)+' CHF':'',sSp);
                    r++; hasAnyRow=true;
                });
            });



            if(hasAnyRow) parity=1-parity;
        }

        r++;
        setCell(r,0,'TOTAUX',sTH); for(var c=1;c<COLS;c++) setCell(r,c,'',sTH); mergeC(r,0,r,COLS-1); r++;
        [
            ['Total heures',    document.getElementById('weekHours')?document.getElementById('weekHours').textContent:'0h00'],
            ['Kilometres',      (document.getElementById('weekKm')?document.getElementById('weekKm').textContent:'0')+' km'],
            ['Total frais',     (document.getElementById('weekExpenses')?document.getElementById('weekExpenses').textContent:'0.00')+' CHF'],
        ].forEach(function(pair) {
            setCell(r,0,pair[0],sTL); for(var c=1;c<COLS-1;c++) setCell(r,c,'',sTL);
            setCell(r,COLS-1,pair[1],sTV); r++;
        });

        ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r-1,c:COLS-1}});
        ws['!cols'] = [{wch:11},{wch:11},{wch:15},{wch:22},{wch:26},{wch:18},{wch:7},{wch:7},{wch:9},{wch:14}];

        XLSX.utils.book_append_sheet(wb, ws, 'Semaine');

        var fileName = company.replace(/\s+/g,'_')+'_'+name.replace(/\s+/g,'_')+'_'+formatDateFull(state.currentWeekStart).replace(/\./g,'-')+'.xlsx';
        var wbBlob   = new Blob([XLSX.write(wb,{bookType:'xlsx',type:'array'})],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        var xlsxFile = new File([wbBlob],fileName,{type:wbBlob.type});
        var btn      = null; try { btn=event&&event.target?event.target.closest('.btn-export'):null; } catch(e) {}
        var _fb      = function() { if(btn){var o=btn.textContent;btn.textContent='Ok';setTimeout(function(){btn.textContent=o;},1500);} };

        if (navigator.canShare && navigator.canShare({files:[xlsxFile]})) {
            navigator.share({files:[xlsxFile],title:'Rapport '+company,text:'Semaine '+formatDateFull(state.currentWeekStart)})
                .then(_fb).catch(function(err){if(err.name!=='AbortError'){XLSX.writeFile(wb,fileName);_fb();}});
        } else {
            XLSX.writeFile(wb,fileName); _fb();
        }

    } catch(e) { showToast('Erreur export Excel'); }
}
